body:
  text: 聞唱善來即證羅漢輔行云如佛自言善來比丘自然得具足戒當於言下鬚髮自落袈裟在身鉢盂在手猶如五歲知法比丘如䟦陀羅波楞伽者是大論俱舍七種般輔行云六種那含位在其中者大論三十三云五那含者謂中生行不行上流復有六種五如上加現復有七種六如上加無色俱舍不立現般但取無色般并五為六頌曰此中生有行無行般涅槃上流若雜修能往色究竟超半超徧沒餘能往有頂行無色有四住此般涅槃釋曰不還有五一中謂欲界沒於無色中而般涅槃二者生般生色界而般涅槃三者有行生色界已長時修行而般涅槃但有勤修無速進道四者無行生色界已不經久修無功用行而般涅槃勤修速進二道俱無五者上流於色界中要轉經於四禪天處方般涅槃上流又二一者雜修即是樂慧二無雜修即樂定是有雜修者往色究竟無雜修者往於有頂頌中餘字是不雜修復有三種一全超謂在欲界於四禪中已徧雜修遇緣退失從梵眾沒生色究竟中間盡超故名全超二者半超梵眾沒已中間漸受十四天處或超一二乃至十三後乃方生色究竟天皆名半超非全超故通受半名全不能超名為徧沒無雜修者生無色界唯不能生五淨居天從廣果沒生三無色後生有頂方般涅槃故此那含縱生無色猶屬色攝若欲界沒生無色天即無色攝復有九種中生上流各三種故如釋籤引此六九中未入般前或得名為羅漢向攝在色界時或有勤修速進故也開三般為九釋籤引論云中般為三者謂速非速久住凖俱舍論總為九種謂三各分三謂中生上流也有行無行生色界已方般涅槃竝生般攝言中三者謂速非速經久如迸火星以喻三義思之可知竝於中論速非速等生有三者一生約速立二有行約非速立三無行約經久立竝生色界已論速等也上流三者一全超約速立二半超約非速立三徧沒約經久立從初色至色末始終有此三人不同如是三九由業惑根異言業異者造順現業成中般造順生業成生般造順後業成上流般言惑三者下品惑成中般中品惑成生般上品惑成上流般言根別者上根中般中根生般下根上流般一萬二千九百六十種般釋籤引雜阿毘曇云阿那含者或五及七八五謂中生有行無行上流七謂於中般更分三如迸火星喻八者謂五上加現無色及不定且從五種說謂色五種從根分十五謂上中下各五故約地成二十四禪各五故約性有三十謂退思護住進不動謂種性各五故處有八十梵眾至尼吒十六處各五故每一種那含有二千五百九十二何者約十六處成十六人約種性六成六倍增之合九十六約根有三三倍增之成二百八十八更以九離欲人九倍增之成二千五百九十二人一人既爾五那含又五倍增之成一萬二千九百六十種言九離欲者謂離欲界九品惑以為九人也圖中引五差輔行云生五含者然由修熏禪有五階差大品九定通熏九地此中唯熏第四禪地先修得已更以多念無漏相續現起從此引生多念有漏從此復生多念無漏如是後後漸漸減少乃至最後二念無漏次復引生二念有漏無間復生二念無漏名熏加行成相次唯一念無漏次復唯有一念有漏無間復生一念無漏名根本成故俱舍云成由一念離言五差者謂下中上上勝上極一品有三後品兼前故第五品合成十五如是五品如其次第三六九等生五淨居羅漢名含三義文句云比丘者肇師云秦言淨命乞食破煩惱能持戒怖魔等天竺一名含此四義秦無以飜故存本稱什師云始出妻子家應以乞食自資清淨活命終出三界家必須破煩惱持戒自守具此二義天魔怖其出境也釋論云怖魔破惡乞士魔樂生死其既出家復化餘人俱離三界乖於魔意魔用力制飜被五繫但愁懼而已故名怖魔出家人必破身口七惡故言破惡夫在家三種如法一田二商三仕用養身命出家人佛不許此唯乞自濟身安道存福利檀越三義相成即比丘義也涅槃寶梁皆舉破惡名比丘者不具說也今名此三義應通初後如初出家時白四羯磨無作戒力徧一切境飜無作惡初修禪定發定共戒防伏意地貪瞋不起初修觀慧發相似道共戒能伏煩惱初心亦稱破惡何獨後心耶怖魔者初剃髮稟戒已令魔愁修定欲伏煩惱修慧欲破煩惱初心亦令魔怖何獨後心耶乞士者初離邪命以乞自活修禪歷境求定修慧緣理求無漏皆是乞士何況相應而非乞士具此義故通名比丘觀經云比丘者因果六義因名乞士怖魔破惡果號應供殺賊無生鈔云因三果三一一主對釋論淨目問舍利弗乞士者有四種食合藥種植田園名下口食仰觀星宿名仰口食四方巧語名方口食呪術卜𮅕名維口食比丘不作此四名清淨乞士也鈔云今舉身子答彼淨目乞士之義須離上下方維之食常行乞食清淨活命故名乞士至果乃成應供德也怖魔者若發心出家地行夜叉唱飛行空中展轉乃至六天魔王聞之怖畏失人眾也鈔云魔主生死在家受欲增長生死出家離染趣向無生是故魔王聞之生怖染欲破戒魔還快樂勤修三學果證無生破惡者能破煩惱九十八使悉皆破斷故名破惡鈔云見思二使共九十八名惡名賊修觀推竆名為破惡證智斷盡名為殺賊金剛三昧妙玄云時解脫羅漢是信行鈍根待時及眾緣具方得解脫位居無學羅漢有五種隨信行生退法思法護法住法升進法也得盡智無學等見也若用金剛三昧於非想九品惑盡次一剎那證非想第九解脫成盡智次一剎那得無學等見也或彼時退故不說得無生智此五種阿羅漢是性種性根鈍因中修道必假衣食牀具處所說法及人隨順善根增進不能一切時所欲進也是五種各有二種不得滅盡定但是慧解脫得滅盡定即是俱解脫若不得滅盡定是人因中偏修性念處若得滅盡定是人因中修性共也證果時三明八解一時俱得故名俱解脫也重空三昧妙玄云不時解脫羅漢即法行利根名不動法阿羅漢也此人因中修道能一切時隨所欲進修善業不待眾具故名不時解脫是人不為煩惱所動故名不動不動是不退義成就三智謂盡智無生智無學等見能用重空三昧擊聖善法以定捨定故言能擊是不動羅漢亦有二種一不得滅盡定但名慧解脫二得滅盡定即是俱解脫若聞佛說三藏教門修緣念處即發四辯名無疑解脫是名波羅蜜聲聞能究竟一切羅漢功德也名沙門那沙門那者沙門果也釋籤云空空三昧無相無相三昧無作無作三昧空是聖法復修於空擊前聖法故名為重電光三昧輔行云稱電光者彼論云七依定外更有定發無漏否答有欲界定能發無漏無漏發疾倐如電光若不發無漏住時則久遺教云若見電光暫得見道如阿難策心不發放心取枕即入電光電光亦是金剛金剛不孤因欲界入無漏無漏發疾譬如電光非欲界定得此名也住欲界定或經年月定法持心無懈無痛連日不出亦可得也九想法界次第云此九通名想者能轉心轉想故名為想所謂能轉不淨顛倒想故此九法皆言想也一脹想若觀人死屍䏺脹如韋囊盛風異於本相是為脹想二青瘀想若觀死屍皮肉黃赤瘀黑青黤是為青瘀想三壞想若觀死屍風吹日曝轉大裂壞在地是為壞四血塗漫想若觀死屍處膿血流溢污穢塗漫是為血塗漫五膿爛想若觀死屍膿流出皮肉壞爛沱在地是為膿爛想六噉想若觀死屍蛆唼食鳥挑其眼狐狗咀嚼虎狼𭺙裂是為噉想七散想若觀死屍禽獸分裂身形破散筋斷骨離頭手交橫是為散想八骨想若觀死屍皮肉已盡但見白骨筋連或分散狼籍如貝如珂是為骨想也九燒想若觀死屍為火所焚爆裂烟臭薪盡形滅同於灰土假令不燒亦歸磨滅是為死想八念通言八念者內心存憶之異名也專心存憶八種功德故名為八念一念佛二念法三念僧四念戒五念捨六念天七念阿那八念死十想通言想者能轉心轉想也能轉計常樂等諸顛倒等想故名為想前三想為斷見諦惑說中四想為斷思惟惑說後三想為修無學道者說是以壞法之人修此十想能斷三界結使證無漏之聖果也一無常想二苦想三無我想四食不淨想五世間不可樂想六死想七不淨想八斷想九離想十盡想八背捨此八通名背捨者大智度論云背是淨潔五欲捨是着心故名背捨若發真無漏慧斷三界結業盡即名解脫也一內有色相外觀色內有色相者不壞內色不滅內色相也外觀色者不壞外色不滅外色相以是不淨心觀外色所以然者為修流光故不應初背捨中壞滅內身骨人也欲界結使難斷故須以不淨心觀外色也此初背捨位在初禪能捨自他及下地故名背捨二內無色相外觀色內無色相者壞內色滅內色相也外觀色者不壞外色不滅外色相以是不淨心觀外色所以然者行者為入二禪內淨故壞滅內骨人欲界結使難斷故猶觀外不淨之相也三淨背捨身作證淨者緣淨故名淨行者除外不淨相但於定中練八色光明清淨皎潔猶如妙寶之色故名淨緣身作證者以無受着心而受三禪中徧身樂故名身作證也四虗空處背捨若滅根本四禪色及三背捨四勝處八一切處中色一心緣無邊虗空而入定即觀此定依入界故有無常苦空無我虗誑不實心生厭背而不受着深入一向不廻是為虗空處背捨五識處背捨若捨虗空一心緣識入定時即觀此定依入界故有無常苦空無我虗誑不實心生厭背而不受着深入一向不廻是為五識處背捨六無所有處背捨若捨識一心緣無所有入定時即觀此定依入界故有無常苦空無我虗誑不實心生厭背而不受着深入一向不廻是為無所有處背捨也七非有想非無想背捨若捨無所有處一心緣非有想非無想入定時即觀此定依入界故有無常苦空無我虗誑不實心生厭背而不受着深入一向不廻是為非有想非無想背捨也八滅受想背捨背滅受想諸心心數法是為滅受想背捨所以者何諸佛弟子患厭散亂心欲入定休息似涅槃法安着身中故云身證而想受滅也八勝處名勝處者亦名八除入一內有色相外觀色少若好若醜是名勝知勝見二內有色相外觀色多若好若醜是名勝知勝見三內無色相外觀色少若好若醜是名勝知勝見四內無色相外觀色多若好若醜是名勝知勝見五青勝處若觀青色轉變自在少能多多能少光色照曜勝於背捨所見青相亦不起法𢜤是名青勝處也六黃勝處類如青勝處中分別七赤勝處類如青勝處中分別八白勝處亦類如青勝處中分別今用四色為勝處依大智度論也若纓絡經中則以四大為四勝處也十一切處通稱一切處者皆從所觀境徧滿得名也亦名十一切入一青一切處二黃一切處三赤一切處四白一切處五地一切處六水一切處七火一切處八風一切處九空一切處十識一切處九次第定通言次第定者若入禪時深心智慧深利能從一禪入一禪心心相續無異念間襍故名次第定也初禪次第定離諸欲惡不善法有覺有觀離生喜樂入初禪定時是中初禪定觀均齊自識其心其心次第而入無有剎那襍念間入初禪定是為初禪次第定二禪次第定若從初禪入二禪時是中二禪定觀均齊自識其心其心次第而入無有剎那襍念間入二禪定是為二禪次第定三禪次第定意類如初禪二禪中明四禪次第定亦類如初禪二禪中明五虗空處次第定六識處次第定七無所有處次第定八非有想非無想處次第定等俱如上初禪二禪中明九滅受想次第定若從非有想非無想入滅受想定時於是定前自識其心要期心利心心次第而入無有剎那襍念間入滅受想定是為滅受想次第定也師子奮迅三昧所言師子奮迅者潛譬以顯法也如世師子奮迅為二事故一為奮𨚫塵土二能前走𨚫走㨗疾異於諸獸此三昧亦爾一則奮除障定細微無知之惑二能入出㨗疾無間異上所得諸禪定也故名師子奮迅三昧一入禪奮迅師子奮迅入三昧者離欲惡不善法有覺有觀入初禪如是次第入二禪三禪四禪空處識處無所有處非有想非無想處滅受想定是為奮迅入也二出禪奮迅師子奮迅出者從滅受想定起還入非有想非無想非有想非無想起還入無所有處如是識處空處四三二禪初禪乃至出散心中是為奮迅出超越三昧所以名超越者能超過諸地自在入出故名超越一超入三昧云何名超入三昧離諸欲惡不善法有覺有觀離生喜樂入初禪從初禪起超入非有想非無想處非有想非無想處起入滅受想定滅受想定起還入初禪從初禪起入滅受想定滅受想定起入二禪二禪起入滅受想定滅受想定起入三禪三禪起入滅受想定滅受想定起入四禪四禪起入滅受想定滅受想定起入空處空處起入滅受想定滅受想定起入識處識處起入滅受想定滅受想定起入不用處不用處起入滅受想定滅受想定起入非有想非無想非有想非無想處起入滅受想定是為諸佛菩薩超入三昧相若聲聞人但能超入一而不能超二況能如上所明自在超也是中明超入有三種一順入超二逆入超三順逆入超也細心約義自作可解二超出三昧云何名超出三昧從滅受想起入散心中散心中起入滅受想定滅受想定起還住散心中散心中起入非有想非無想處非有想非無想處起住散心中散心中起入無所有處無所有處起住散心中散心中起入識處識處起住散心中散心中起入空處空處起住散心中散心中起入四禪四禪起住散心中散心中起入三禪三禪起住散心中散心中起入二禪二禪起住散心中散心中起入初禪初禪起住散心中是為諸佛菩薩超出三昧之相若聲聞人超出但能超一禪出而不能超二何況能自在超出也是中超出有三種一順超出二逆超出三順逆超出足前三種超入合為六種超越三昧如來於此六三昧而入涅槃也齊此明三乗行行共禪竟也觀練熏修止觀云觀者謂九想八背捨八勝處十一切處通攝觀禪九想為破行人淫火必須增想純熟能除世間貪𢜤破六種欲此九既除於欲亦薄嗔癡九十八使山動雖是不淨初門能成大事八背捨云云背淨潔五欲捨離着心故名背捨修者行人持戒發誓端身正心諦觀足大指黑脹𭽹起進觀從足至頭唯見腫脹心生厭離復觀膿爛次卻皮肉諦觀白骨八色流光如是次第乃至八背捨發相具如禪門八勝處者前背捨緣中多少不得自在是故勝處更深細觀察少多好醜悉使勝知勝見如快馬能破陣亦能自制其馬十一切處者以八色兩心更相淡入廣普徧滿轉變無礙具如禪門練者即九次第定也上來雖得八禪入則有間今欲純熟今從初淺極至後深次第而入中間無有垢滓間穬令不次第者次第故名次第亦是無漏練於有漏除諸間穬故名練禪熏者即師子奮迅三昧也前是次第無間入今亦是次第無間入亦能次第無間出除麤間及法受味塵猶如師子能卻能進奮諸塵土修者超越三昧也近遠超入近遠超出近遠超住是功德最深故名頂禪於諸法門自在入出壞法不壞法止觀云若壞法人修九想一脹想二壞想三血塗想四膿爛想五青瘀想六噉想七散想八骨想九燒想此人但求斷苦燒滅骨人急取無學不欣事觀既無骨人可觀便無禪定神通變化願智頂禪雖言燒滅實有身在例如滅受想而身證若不壞法人九想者初從脹想來住骨想不進燒想得有流光背捨勝處觀練熏修神通變化一切功德具足成俱解脫人也約性共揀判慧俱四教義云五種羅漢各有二種不得滅盡定但是慧解脫得滅盡定即是俱解脫若不得滅盡定是人因偏修性念處觀不修共念處觀若得滅盡定者是人因中修性念處觀亦修共念處觀約正助判慧俱斷結四教義問若諸𢿘隨起即是共義答曰諸𢿘隨起有三種一但是緣理之慧諸𢿘任運隨起此說性念處二修諸𢿘作助道善法故說共念處斷結故佛說善法積聚屬共念處助正道共斷結故雜心偏說共念斷結然利根人用性念處非不斷結也光明句亦名慧行行行緣空直入名為慧行𭘧事兼修名為行行亦名正道助道空觀順理名為正道不淨破貪名為助道小乗修正道斷結名慧解脫人修助道斷結名俱解脫人得滅盡定出前五卷身證中十四變化文句云十四變化初禪二變化一初禪化二欲界化二禪三變化一二禪化二初禪化三欲界化三禪四變化一三禪化二二禪化三初禪化四欲界化四禪五變化一四禪化二三禪化三二禪化四初禪化五欲界化無而歘有有而歘無故名變化四禪俱有上能化下下不能化上故至𢿘增減十四種色五根四大五塵十八變化文句云十八變化一震動二熾然三流布四示現五轉變六往來七卷八舒九眾像入身十同類往趣十一隱十二顯十三所作自在十四制他神通十五能施辯才十六能施憶念十七能施安樂十八放光普動一切界身上出火身下出水流光徧照隨所欲示佛土惡趣於地起氷解令成水於火亦然山石中往來無碍能舒卷雪山王等以見前大眾大地內己身中能往彼同其色𢿘或隱或顯不可得往來去住無碍他現通悉能制伏能與一切有情辯才有情於法失念者能與之令聽法人身心安樂身放光明作諸佛事如次對之依四禪十四變化依觀練熏修十一切無漏事禪能作十八變三種念處四教義云三種念處成三種羅漢者一若單修性念處成慧解脫羅漢二共念處成是俱解脫羅漢三緣念處成無疑解脫羅漢所以者何性念處即是緣理之智慧念處相應發真無漏即成慧解脫羅漢也共念處共善五成就背捨乃至超越三昧願智頂禪如此助道共正道合發真無漏即得三明六通具八解脫成俱解脫羅漢也若緣念處即緣佛言教所詮一切入界性共二種念處能觀所觀名義若在禪定觀此名義即發四無礙辯名為無疑解脫大羅漢四念處云謂觀總別念處知身受心法是知苦不起倒惑是知集厭苦息集是修道苦集寂然是知滅共念處者毘曇有門觀生空名為法空修心不淨以不淨心觀外色入二背捨乃至八背捨八勝一切處九次第師子奮迅超越欲界初禪皆不淨破淨顛倒以事助道名共念處緣念處者大論云一切色法名身一入及十入少分既是色色屬身也六受為受六識為心想行兩及無為法名法通一切境界皆名緣念處四教義云一自性念處者說不顛倒慧也如佛說修身觀身觀者是慧念處者所作事不妄受緣故除自性過故說念處言共念處者與慧相共法如佛說此比丘善法積集謂四念處是為正說也又能發諸禪神通也緣念處者一切法如佛說比丘一切法四念處是為正攝受具足故及畧緣故南嶽師云還是性共二種念處能觀之智所觀之境合辯具一切法義也若能觀察分別即發四無礙辯也四韋陀典輔行云一阿毘陀此云方命謂養生繕性二殊夜陀祭祀祈禱三婆夜摩陀禮義占卜軍陣兵法四阿達婆陀異能技𢿘禁咒醫方又摩登伽經載初人名梵天造一韋陀次人名白淨變一為四讀誦祭祀歌咏禳灾果性退否考論祖誥妙玄云是信解雖是動根性不同謂退護思住進也若證阿那含各有五及七種般八種般見得但是不動根性若證那含亦有五種七種八種不同也止觀云初從住訖至非想通有四退護住進退又二一任運退二緣觸退緣有內外外諸方便二十五種吐納失所是為外緣觸退於靜心三障四魔而生憂𢜤是名內緣觸退後或更修得或修不得此人甚多護分者善以內外方便將護定心不令損失住分者或因守護安隱不失或任運自住即是住分進分者或任運進或勤策進各有橫竪橫竪各有頓漸若十二門一一而進是名漸進若一時具足是名頓進特勝通明品品而發是名橫漸一時俱發是名橫頓又於四分分分皆有四分具如修證中說輔行云禪門中名達分此中云護以達自防故名為護餘三名同言退者有因緣退名緣觸退無因緣退名任運退二十五法等是外緣觸退於靜心下內緣觸退三障四魔通論既各攝十境故得以三障攝三魔加天子即四魔也禪門中云退分中退分者從九品至初品併退失也退住者至初品便住也退進者至初品已更能策進至二品乃至九品亦能更進退護者退己將護使從初品以至九品勿使更退餘之三分例說可知此生之中必得無疑釋籤云若退果者牽於斯那二果亦失至初果住法爾然也此生之中必得不疑猶如勝人平地顛墜四顧遠望不有他人見我倒不即能自起極至臨終亦得無學故也信法利鈍止觀云若論根利鈍者法行利內自觀法故信行鈍藉他聞故又信行利一聞即悟故法行鈍歷法觀察故或俱利俱鈍信行人聞慧利修慧鈍法行人修慧利聞慧鈍通辯四果退不退止觀云此人好退如毘曇有退相四果如沙住井底阿含云三果退戒還家毀失律儀不失道共俗人生言無聖法佛言欲飽起厭不久當還更求出家諸比丘不度佛即度之便得羅漢阿難問言大德是學退無學退答言學退若然即是世智斷惑慧解脫人故得有退非無漏智斷一品惑進一品解而有退也輔行云此人下辯壞法人有退無退如毘曇等者婆沙中問阿羅漢退不應二三兩果亦退答阿羅漢退牽二果退猶如沙井上下有甎中間唯砂上甎若穨從上至下其中間砂豈得不穨四果如上甎二果如中沙初果如底下若至底竟不復得去問若至初果亦應言退第二第三答如人墮於三層之屋彼亦如是雖即不言退第二三二三實退復次二三是第四因其果既退其因亦退若爾初果亦是第四果因亦應說退答初果之前更無有果若彼退時更無住處若許初退則有多妨本是見諦今非見諦本是得果今非得果本是决定今非决定本是聖人今非聖人離如是過故不說退問退經幾時答經少時乃至自不知退若自知退當修勝進方便復次彼煩惱現在前時心生慚愧速作方便如明眼人晝日平地顛蹶尋即還起四方顧視無見者不彼亦如是若佛若聖弟子善人無見我者不亦如煖身體人有小火墮在身上尋即除卻問既退兩果兩果不應作者為作不耶答不作也果人所行異凡夫故然慧解脫亦不併退有退義故故說有退阿含下引第三果退以為類例亦是不得事禪之人此人雖退不失道共此生還得故知阿含與婆沙意同既言欲飽自來即是於初果身中作初果人所作事也皆不失道共故得為例若然下判無事禪成慧解脫竝依世道用欣厭斷故名世智若無漏道隨依一地斷自上下三界諸惑兼得滅定是故不退無作之業至未來世輔行云性戒清淨為諸戒因舊名作無作成論云教無教新名表無表作謂為作教謂教示表謂表彰名異意同彼此無在無作一發無捨失緣終訖一一形相續恒起如初受時作白已後入餘心者尚名得戒故成論云若人入不善心無記心無心亦名持戒律疏云四心三性始末恒有三性加無心為四又云無作之業至未來戒是有為色法定是有為心法命朽之時形俱無作戒體雖謝無作戒業得得不滅以隨業道至未來故由諸事定能伏結惑如殘藏由伏故斷如害命以無漏慧得初果已慧道勢分流至未來經於七生以滅盡惑是故當知以戒例慧小乗事法尚至無漏經生不失孤調解脫輔行云若入滅定等者既有身在名為法身受想心所識智不行名無般若故云無智羅漢在無色等者無色般含於彼無色得有餘般名為羅漢唯有心智而無色身似有般若而無法身若入無餘等者灰身故無身滅智故無智獨一解脫故云孤調辟支迦羅四教義云一飜名者辟支迦羅是天竺之言此土飜為緣覺此人宿世福德神根勝利學十二因緣以悟道也二解釋者大智論云緣覺有二種一獨覺二因緣覺一明獨覺辟支迦羅者若佛不出世佛法已滅是人先世因緣能獨出智慧不從他聞自以智慧得道故名獨覺二明因緣覺者是人道根淳熟藉小因緣而能覺悟也如見林壞因此覺悟成辟支佛大智論意似用此為因緣覺也飜譯名義亦開二名一辟支迦羅孤山云此飜緣覺觀十二緣而悟道故亦飜獨覺出無佛世無師自悟故今楞嚴云復有無量辟支者將非他方無佛之土大權引實而來此會乎霅川云或佛知此眾當獲大益威神攝受不亦可乎獨覺稱麟喻者名出俱舍名為犀角出大集經檇李云獨覺亦觀十二因緣亦可名為緣覺但約根有利鈍值佛不值佛之殊分二類也一畢勒支底迦此云各各獨行音義云獨覺正得其義也義鈔中問獨覺為有戒耶解云亦得雖出無佛世緣於別等得脫亦得別解脫也若爾此戒佛世有既出無佛世云何得有戒答別解脫有二一在家諸戒二出家別解脫又善見云五戒十戒一切時有乃至無佛出世辟支輪王亦有教受妙玄云今明三藏三乗無別眾不得別有菩薩緣覺之戒也獨覺三類文句引華嚴云菩薩下𫥢率放光照之覺即捨身不覺徙之大經云彗星中論云支佛出世佛法已滅此是獨覺人也願生佛世者先得初果十四生未滿值佛即成羅漢不值佛即成獨覺其既值佛亦不捨壽亦不被移願見佛故二果三果例然二辟支三義分大小輔行引大論云迦羅此飜因緣覺亦云獨覺出值佛世聞因緣法名為緣覺出無佛世自然得悟名為獨覺此二各有大小之別若七生初果值無佛世名小迦羅百刼種相名之為大種相不同或三十相二十九八乃至一相此獨覺大小也又若七生盡值佛出世名之為小種相修福值佛聞教名之為大此緣覺大小也又兩大中各有現通不現通現通者大不現通者小現通說法者大不說者小二者大辟支迦羅於二百刼中作功德增長智慧得三十二相分或三十一相或三十相二十九相乃至一相於九種阿羅漢中智慧利勝於諸深法總相別相能知能入久修習定常樂獨處有如是相名大辟支迦羅也皆歷三種十二因緣十種十二因緣分別大小也若因緣覺分大小亦如是明宿緣者今此小大二種獨覺辟支迦羅宿值不同或於前世若偏修性念處觀十二因緣善根淳熟生無佛世因於遠離自然獨覺成小辟支迦羅也若於宿世修性共二種念處理事善根淳熟獨覺自悟具足三明八解脫及六神通成大辟支迦羅也迦舍利弗等是辟支根性四教義云而其不發四無碍辯者禪定是內證習因符慧而發名義是外法故雖有宿習而不得發皆約三種十二因緣十種十二因緣分別宿習因緣也若生佛世聞生滅十二因緣三藏之教即發四辯還名羅漢在聲聞眾𢿘猶如迦葉舍利弗等皆是辟支根性人也亦名辟支佛若不爾者那得次為求辟支佛乗說十二因緣此人設不值佛亦自得道故法華經云若人有福曾供養佛志求勝法為說緣覺皆因緣覺也支佛是法行文句云辟支佛求自然慧者辟支是法行人從他聞法少自推義多故取譬鹿鹿不依人自然者從十二因緣門入此門本自有之非佛天人所作名自然慧不從他聞名自然慧也妙樂云辟支是法行人者一往且對聲聞憑教所以支佛自思為法然支佛必自證聲聞具信法信法具如止觀第五記引婆沙等文聞法少者支佛或聞教墮在聲聞者亦是因信但云聞少四教義云二種辟支迦羅皆有大小不同今明獨覺辟支迦羅具有二種一者本是學人在人間生是時無佛佛法已滅或須陀洹七生既滿不受八生自悟成道是人不名為佛亦非羅漢名曰小辟支迦羅若論其道力或有不如舍利弗等大阿羅漢也四流法𢿘云欲流欲界惑有流上二界惑除見癡見流三界見無明流三界癡亦名四軛隨母氣息上下出入輔行中問云壽煖識三與身息心既其不同由義何在答煖即是身以由煖故精血不壞從功能說故名為煖壽名風息初託胎時有一毫氣但根未具時隨母氣息根具氣分名為兒息由有息故連特此身從能持說故息名壽識即是心從當體說四教義云歌羅邏時氣息入出有三種道所謂隨母氣息上下七日一變息入出者名為壽命是名風道不臭不爛是名為煖是中心意名之為識三十八個七日輔行云初入母胎如風雨入舍等諸相不同入已若不壞者七日一變初七名歌羅邏如薄酪二七名阿浮陀如厚酪三七名閉手如短小藥杵四七名伽那如溫石五七名波羅奢呵五皰開張六七現膝相七七現手足相八七手指相九七眼耳鼻口大小便道相十七堅實有風門吹胎如囊十一七七孔開徹母性改常十二七生大小腸如𮈔綖有三支節一百孔穴十三七生饑渴想母食資潤十四七生九脉交絡纏繞十五七生二十脉一邊各十又四十脉脉八萬名十六七氣息通十七七眼得光十八七諸根明十九七諸根具二十七生諸骨二十一七生肉二十二七生血二十三七生皮二十四七生膚二十五七血肉長二十六七生髮二十七七以業力故分別端醜男居母左女居母右男面向內女面向外皆手掩面蹲踞而坐二十八七生八種想謂座榻園林等二十九七生光潤三十七長髮爪三十一七至三十五七人相具足三十六七生厭離心不樂三十七七生穢獄想三十八七風力所轉頭向產門申兩臂出產門每於一七各有一風吹令變異風各有名具如彼經生已八萬戶䖝從身而生縱橫飲噉左右各五百諸節各有若干戶長大衰老常與居是則三十八七計日成二百六十六計成九月所以少四以半小故推因知果止觀云於坐中忽然思惟心所緣處或緣善心或緣惡心能緣所緣即是有支有能含果此有由取以心取善惡而得有有若不取者亦無此有故知有從取生復知取從𢜤起𢜤故可取如𢜤色死取不𢜤則不取𢜤因受生由領受善惡所以𢜤生若無領受𢜤則不生又觀受由於觸六塵來觸六根故得有受無觸則無受經云六觸因緣生諸受故受由於觸又知觸由諸入門若無六識統六根則不能涉入諸塵而生於觸觸由於入入由名色若但有色色不能觸如死人若但有名名亦無觸如盲聾人色心合故則有於觸色即色心即四了別此色名識領納此色名受行起貪嗔名想行兩五具足故有覺觸當知觸由名色名色由初託胎識由識託胎故有凝酥薄酪六皰開張名色和合當知名色豈不由識識由業行過去持五戒善業業使人中受名色過去破五戒惡業業使三塗受故知識由於業業即行也行由無明癡𢜤造作眾行使識流轉從過去來今從今𢜤取緣有有能含果招未來生死推果知因輔行云觀十二緣凡有二種一者推果知因如先推受以至無明既知無明生於受等則不起𢜤等起於當果具如玄文釋因緣境二者推因知果即如今文文明發得還寄修辯於定心中所緣善惡能所和合得名為業業必招果故名為含業即有因故有能含果次推此業還由於取取於善惡乃至無明故息現因令滅當果約十二支觀𢜤觀見四念處云十二因緣觀者初從受支為首一推尋二觀破推尋者是人聞正因緣生滅之法信解分明知一切屬𢜤煩惱皆是十二因緣觀之入空息心達本源求自然慧樂獨善寂修五停心得諸禪定於定中知屬𢜤煩惱即是無明逆順推尋見十二因緣推此貪𢜤因何而生即知此貪因受而生受因何生即知因觸乃至無明因過去一切煩惱又順推此𢜤能生取取生有有生未來二十五有生死因生有老憂悲苦聚輪𢌞無際云云二觀破屬𢜤十二因緣者即是性念處歷別觀十二緣也性念如前說觀𢜤是汙穢五性四念處若觀𢜤觸六入名色即是果報無記五性四念處若觀無明即過去汙穢煩惱五性四念處若觀於取即是汙穢煩惱五性四念處若觀有即善不善五性四念處若觀未來生死即果報生死無記性四念處是名逆順觀察四顛倒顛倒滅是無明等一切皆滅二明破屬見十二緣又二一推尋二觀破尋者若見神我及世間常無常等四句是則現在生身邊四見四見因此身邊四見生十四難六十二見此身邊四見即四取逆順尋此四取因四𢜤乃至四行因四無明復順尋四取四取生四有四有生一切二十五有生死憂悲苦聚二名觀破四取身邊四見如是次第乃至無明破過去如去不如去四句身邊二見汙穢五也又順觀四取乃至未來生老死破有邊無邊四句身邊二見汙穢五能如是用性念處觀破見𢜤等諸煩惱滅是名觀十二因緣入涅槃也華飛釧動釋籤云華飛者如大智論明有一國王出園遊戲清旦見樹林華果鬱茂甚可𢜤樂時王食已即便臥王諸婇女皆競採花毀折林樹時王覺已見林毀壞內覺悟一切世間無常變壞皆亦如是思惟是已無漏道心朗然開發斷諸結使成辟支迦羅具六神通即飛到閑靜處山林清曠入深禪定受無為樂釧動者禪經云有國王令宮女摩身為鐶釧閙令漸漸減釧乃至唯一則不復聲因思此聲從因緣生悟辟支佛亦如獼猴見支佛坐禪後於餘處見諸外道種種苦行乃教外道跏趺而坐手捻其口合其眼諸外道云必有勝法外道受教皆證支佛三家二即三家者見思家習塵沙家習無明家習二即者塵沙即習無明即習今所斷者見思家習耳
