body:
  text: 入體之門四教四門妙玄云明入實門者夫實相幽微其理淵奧如登絶壑必假飛梯欲契真源要因教行故以教行為門門名能通此之謂也而門有得失若於門生著則成邪見般若如大火𦦨四邊不可取邪見火燒故若不觸火門則能通也若以佛教為門者教略為四藏通別圓若於一教四句詮理即是四門有空雙亦雙非四四合為十六門門門十乘妙玄云一入實觀者上已知圓四門今依有門修觀觀則為十一明不思議境對前十二思議之門名不思議境不思議境即是一實四諦先苦滅相對謂生死苦諦不可思議即空即假即中即空故方便淨即假故圓淨即中故性淨三淨一心中得名大涅槃亦是集道次集道相對謂煩惱集諦不可思議即空即假即中即空故名一切智即假故名道種智即中故名一切種智三智一心中得名大般若亦是苦滅故名不思議一實四諦也二發真正心者一切衆生即大涅槃云何顛倒以樂為苦即起大悲興兩誓願令未度者度令未斷者斷一切煩惱即是菩提云何愚癡以道為非道即起大慈興兩誓願令未知者知令未得者得無緣慈悲清淨誓願慈善根力任運吸取一切衆生也三安心者修行之要不出定慧體生死即涅槃名為定達煩惱即菩提名為慧於一心中巧修定慧具足一切行也四破法遍若生死即𣵀槃者分假變易苦諦皆破若煩惱即菩提者四住五住集諦皆破雖無能破亦不有所破何者生死即涅槃等故無所破也五識通塞者知生死過患名為塞即涅槃名為通煩惱惱亂名為塞即是菩提名為通始從外道四見乃至圓教四門皆識通塞節節執著即是塞節節亡妙名為通六善識道品者觀生死即涅槃十界生死色隂皆非淨非不淨乃至識隂非常非不常能破八倒即法性四念處念處具道品三解脫及一切法即非枯非榮住大涅槃也七善修對治若正道多障應須助道觀生死即涅槃治報障也觀煩惱即菩提治煩惱障業障也八善知位次者生死本即涅槃理涅槃也解知生死即涅槃名字涅槃也乃至盡生死底即究竟涅槃也觀煩惱即菩提亦如是九善安忍者若觀生死即涅槃不為隂入境病業魔禪二乘菩薩境所動壞也若觀煩惱即菩提不為諸見慢境所動壞也十無法愛者既過障難諸功德生相似三德順理而生喜起順道法愛生名法愛不上不退名為頂墮此愛若起即當速滅愛若滅已破無明開佛知見證實相體無上寶聚如意圓珠衆法具足是名有門入實證得經體餘三門亦如是方便名善巧輔行云回向令成妙因故名善巧言善巧者從初發心權實不二以不二解調停事儀能使一行一切行成三軌真解一發一切發入圓初住功由善巧大論云小善能作大果者如求佛果讚嘆一偈稱一南謨燒一捻香奉獻一華如是小行必得作佛問云菩薩云何少施答夫施在心不在物菩薩或貧或聞他説施無多少或畏多集財物損他財失善心或惱衆生惱衆生故而供養佛佛所不許是故少施回向菩提故知善巧名方便者由回向故由智導力遠近方便輔行云次明今文二十五法於向所列圓教遠近之前更論方便者以為五品作方便故於六即中是名字即故云假名故知今意並在四教內外凡前通為四教遠方便也言十種者即十境也若觀若發入品非遙故名為近二十五法去真遙故故名為遠問隂是正修餘九待發如何以此而名方便答今論十境皆是方便者咸是所觀若能觀之方屬正行是故前八但在凡夫後二名為聖人方便故知十境並是圓行近方便也若前三教差降不同別於菩薩但觀二教通但觀一三藏全無但觀九境通二乘觀八境半三藏三乘觀八境全通論雖爾今意在圓橫豎該羅輔行云橫豎下明觀境功能十境橫豎如第五初十雙互發由境發故觀發縱橫復名橫豎至第五卷當更委明橫豎相止觀云互發有十謂次第不次第雜不雜具不具作意不作意成不成益不益久不久難不難更不更三障四魔九雙七隻又橫具橫不具豎具豎不具例如發四禪至非想是豎具至不用處是豎不具發通明背捨等是橫具止發七背捨是橫不具又發初禪至四禪是豎具三禪來是豎不具又初禪九品是豎具八品來是豎不具又一品五支足是橫具四支已來是橫不具其餘例此可知方等夢王輔行云方等至尊不可聊爾若欲修習神明為證先求夢王若得見一是許懺悔經云佛告文殊為信男女廣説九十二億諸陀羅尼一一陀羅尼復九十二億陀羅尼門佛告華聚勿𡚶宣傳當以神明為證何者神明有十二夢王見一王者乃可為説此陀羅尼云何名為十二夢王昔雷音比丘為九十二億魔之掩蔽生大苦惱即發大聲稱於十方三世三寶十方諸佛同發聲言誰能救此菩薩苦惱者有寶王如來重舉聲問諸菩薩有華聚菩薩白佛言當以何法而往救之佛言當以摩訶袒持陀羅尼章句伏彼魔王華聚往彼調伏魔已令諸魔受持此陀羅尼諸魔各各脫衣供養已至佛所白言我等十二大王當受持之華聚問何名十二乃説十二王名至夢行品中名十二夢相佛告文殊若求此法教求十二夢王若得見一授七日法一名袒茶羅二名斤提羅三名茂持羅四名乾基羅五名多林羅六名波林羅七名檀林羅八名禪林羅九名窮林羅十名迦林羅十一名伽林羅十二名婆林羅如犯刑者從他求脫如是念念歸求夢王若不感者雖行無益應竭力破慳而修供養世多直行終成無益五科陶師譬止觀云譬如陶師若欲得器先擇良處無砂無鹵草水豐便可立作所次息餘緣務務際不靜安得就功雖息外緣身內有疾云何執作身雖康壯泥輪不調不成器物上緣雖整不專於業不相續永無辦理止觀五緣亦復如是有待之身必假資藉如彼好處呵厭塵欲如斷外緣棄絶五蓋如治內疾調適五事如學輪繩行於五法如作不廢世間淺事非緣不合何况出世之道若無弄引何易可階故歷二十五法約事為觀調粗入細檢散令靜故為止觀遠方便也引證道定復以律儀為根本止觀云定共戒無作者與定俱發有人言入定時有出定時無有人言無作依定定在不失定退即謝也道共戒無作者此無作依道道無失故此戒亦無失戒定道共通是戒名説通以性戒為本故經云依因此戒能生禪及滅若智慧即此意也輔行云引證道定復以律儀而為根本十戒五支戒通大小乘止觀云列戒名者經論出處甚多且依釋論有十種戒所謂不不破不穿不雜隨順無著智所讚自在隨定具足戒聖行既從始淺以至於深今仍判其粗妙禁淨善三戒屬律儀律儀通攝衆故定尊卑位次緒雖有菩薩佛等不別立衆故戒法是同但以佛菩提心為異耳故知律儀等三戒三藏攝不是定共根本禪是事亦屬三藏攝是故為粗不析戒是體法道共即通教攝大乘不退等別教攝亦兼於通通有出假隨機順理於道不退然依真諦不及別人別人為妙也隨順畢竟具足等圓教攝不起滅定現諸威儀不捨道法現凡夫事故名隨順唯佛一人具淨戒餘人皆名汙戒者故名畢竟戒戒是法界具一切佛法衆生法到尸彼岸故名具足波羅密戒玄義釋籤云大經十戒對大論十戒文稍參互今具對録論不即經禁戒屬根本業支論不破不穿即經清淨戒善戒屬前後眷屬支故文中云從根本眷屬等兩支中出禁等三論不雜戒即經不戒屬非諸惡覺清淨支論隨道戒無著戒即經不析戒屬護持正念支論自在戒智所讚戒隨定戒具足戒即經大乘戒不退戒隨順戒畢竟戒具足諸波羅密戒屬回向無上道支從五支出文雖如前若但以論十對經十者論不戒即經禁戒論不破戒即經清淨戒論不穿戒即經善戒論不雜戒即經不戒與論不名同意別論取壞不任故對根本經取微有壞故對不雜論隨道戒無著戒即經不析戒論所讚戒即經大乘戒論自在戒即經不退戒隨順戒論隨定戒即經畢竟戒論具足即經具足波羅密戒但依此對即見誤文亦不須改此十種戒攝一切戒不戒者即是持於性戒乃至四重清淨守護如愛明珠若毀犯者如器已無所堪用佛法邊人非沙門釋子失比丘法故稱為不破者即是持於十三無有破損故名不破若毀犯者如器破裂也不穿者是持波夜提等也若有毀犯如器穿漏不能受道故名為穿不雜者持定共戒也雖持律儀念破戒事名之為雜定共持心欲念不起故名不雜如大經云雖不與彼女人身合而共言語嘲調壁外釧聲見男女相追皆汙淨戒十住婆沙云雖制其事而令女人洗拭按摩染心共語相視或限爾許日持戒或期後世富樂天上自恣皆名不淨若持不雜戒悉無此等念也隨道者隨順諦理能破見惑無著戒者即是見真成聖於思惟惑無所染著也以此兩戒約真諦持戒也智所讚戒自在戒則約菩薩化他為佛所讚於世間中而得自在是約俗諦論持戒也隨定具足兩戒即是隨首楞嚴定不起滅定現諸威儀示十法界像導利衆生雖威儀起動而任運常靜故名隨定戒前來諸戒律儀防止故名不具足中道之戒無戒不僃故名具足此是持中道第一義諦戒也用中道慧遍入諸法故經云式叉式叉名大乘戒也涅槃明五支戒及十種戒義勢略同設諸經論更明戒相終不出此十科束前三種戒名律儀戒秉善防惡從初根本乃至不穿纖毫清淨束名律儀戒凡夫散心悉能持得此戒也次不雜一戒定法持心心不𡚶動身口亦寂三業皎鏡此是定共戒入定時任運無雜出定身口柔軟亦不雜凡夫入定則能持得也隨道戒初果見諦發真成聖聖人所持非凡夫能持也無著戒則三果人所持亦非初果所持也智讚自在此乃菩薩利他須持此戒則非二乘所持也隨定具足此是大根性所持則非六度通教菩薩所能持也况復凡夫二乘耶向判位高下事義不同理觀觀心論持戒者具能持得上十戒也先束十戒為四意前四戒但是因緣所生法通為觀境次二戒即是觀因緣生法即空空觀持戒也次兩戒觀因緣即是假假觀持戒也次兩戒觀因緣生法即是中中觀持戒也止觀輔行云列戒名者具如大品念戒中及大論二十一與賢護經同大經數等名異義同華嚴十無盡藏品亦列十戒望此仍闕彼云一利衆生戒二不受外道戒唯受三世佛淨戒三無著戒不回向三有故四安住戒不犯一切戒故五不諍戒不非先制不更造立不因此戒惱亂衆生六不惱害戒不以咒術惱衆生故七不雜戒離六十二見但觀緣起故八離邪戒不作持相欲使他知內無實德現有德相九不惡戒見破戒人不輕蔑故十清淨戒捨十惡持十善此十種中二四六八十此屬律儀三七屬隨道無著五九屬出假之由第一正當利他菩薩元以饒益為本是故此十利生居初彼經有事及以空假仍闕自在八中全無諸經列戒論十攝盡六物圖法數云僧伽胝此云復衣嗢呾囉僧伽此云上衣安呾婆娑此云內衣波嗢囉此云鉢尼師壇那此云坐臥具鉢哩薩囉伐拿此云濾水纙又云九條七條五條濾水囊應量器隨坐具頭陀抖擻分衛自資輔行云頭陀中五種食法謂常乞一坐節量中後不飲漿次第乞今此且舉五中之一居阿蘭若必須乞食墾植耕種舂礱碓磑不受壞生貯宿殘煮畜八不淨事涉四邪汙染檀越非蘭若行近代所置彌隔聖言男女往來兼招譏醜倘依佛教利益不輕乞食十利十住婆沙云乞食有十利一自用活命自屬不他屬二施我者令住三寶然後當食三常生悲心四隨順佛教五易滿易養六破憍慢法七無見頂善根八見我乞食餘者效我九不與男女大小有諸事故十次第乞生平等心蘭若十利輔行云雪山為上即如前説頭陀為中即十二頭陀中處有四也謂蘭若間樹下露坐依此四處必須常坐蘭若有十利一自在去來二無我所三隨喜無障四心樂蘭若處五少欲少事六不惜身命具足功德七離衆閙語八雖行功德不求恩報九易得一心十易生無障礙想慶弔俯仰等輔行云弔凶慶吉俯下仰上低曲昂申造往聘迎亦就也問也一弔一慶已損高風終日追尋何道之有外護善知識輔行云母雖慈養子必策虎雖猛𠾑子必寬外護知識如母如虎將護行者如勿舉勿惱舊行道人等者若未親行暗於可否一向混俗不了開又何但專令外護護已亦應善須將護外護同行善知識輔行云同行者佛言人根不同善與善共惡與惡共智與智共等日新者若二日功齊則一朝空過故今修昨行名之為故加行勝昨乃名日新如切如磋道學也如琢如磨自修也教授善知識輔行云夫為導者必具目足若解行不均安能利他又行解具足德在於彼謂我但在於解道前方便復有內外二十五法為外十境為內又於二十五中而分內外具緣一向在外呵欲棄蓋義兼內外調五事亦內亦外眠食在外餘三屬內五法一向在內方便得所為通方便背行為塞説法轉心此取解也五欲過患止觀云呵五欲者謂色聲香味觸十住婆沙云禁六情如縶狗鹿魚蛇猿鳥狗樂聚落鹿樂山澤魚樂池沼蛇樂穴居猿樂深林鳥樂依空六根樂六塵非是凡夫淺智弱志所能降伏唯有智慧堅心正念乃能降伏總喻六根今私對之眼貪色色有質像如聚落眼如狗也耳貪聲聲無質像如空澤耳如鹿也鼻貪香如魚也舌引味如蛇也身著觸如猿也心緣法如鳥也今除意但明五塵五塵非欲而其中有味能生行人須欲之心故言五欲譬如陶師人客延請不得就功五欲亦爾常能牽人入諸魔境雖具前緣攝心難立是故須訶色欲者所謂赤白長短明眸善𮋳素頸翠眉皓齒丹脣乃至依報紅黃朱紫諸珍寶物惑動人心如禪門中所説色害尤深令人狂醉生死根本良由此也如難陀為欲持戒雖得羅漢習氣尚多况復具縛者乎國王耽荒無度不顧宗廟社稷之重為欲樂故身入怨國此間上代亡國敗家多從欲起赫赫宗廟褒姒滅之即其事也經云衆生貪狼於財色坐之不得道觀經云色使所使為恩愛奴不得自在若能知色過患則不為所欺如是呵已色欲即息緣想不生專心入定聲欲者即嬌媚妖詞聲染語𮈔竹絃管釧鈴珮等聲也香欲者即是鬱茀氛氳蘭馨麝氣芬芳酷烈郁育之物及男女身分等香味欲者即是酒肉珍肴肥腴津膩甘甜酸辣酥油鮮血等也觸欲者即是冷暖細滑輕重強軟名衣上服男女身分等此五過患云云金石𮈔竹等輔行云自古有樂不出八音土曰塤今童子猶吹之匏曰笙皮曰鼓竹曰管𮈔曰絃石曰磬金曰鐘木曰柷所以作樂調八音改人邪志全其正性移風易俗今之樂者鄭衛之聲增狂逸壞正性是故須呵仙人聞舍脂語失通輔行云佛未出時帝釋常詣提波延那仙人所聽法舍脂念云帝釋捨我欲詣餘女隱形上車到仙人所帝釋見乃語言仙人不欲見女汝可還去苦不肯去帝釋以荷莖打之舍脂乃以軟語謝帝釋諸仙聞聲起欲螺髻落地失通因五欲招過輔行云如頻婆娑羅王以色欲故身入敵國獨在女阿梵婆羅房中優填王以色染故截五百仙人手足聲欲如五百仙人雪山中住聞甄迦羅女於雪山浴而歌聞其歌聲即失禪定心醉狂逸香欲如一比丘在蓮華池邊聞華香氣心生愛樂池神即大訶責何故偷我香氣以著香故令諸結使臥者皆起味欲如一沙彌染著酪味命終後即生酪中受於身師得羅漢僧分酪時云徐徐莫傷愛酪沙彌人問其故答言此本是我沙彌以愛酪故生此酪中觸欲如劫撥仙人得五神通王所敬重飛行往反王自捧足布髮與行積有歲年王有務遠行有女端正無比王告女言吾今遠行汝供如我彼仙飛至王宮王女以手擎坐著案上觸女柔軟即起欲意因觸欲故退失神通步行出宮為王説偈訶之三世九惱輔行云文通列三謂一惱我二惱我親三讚我三世各爾故合為九問過去已去未來未至云何名惱答惱雖過未境實現在與時相值則生於惱及以過去曾惱於我若離嗔者雖有惱境惱心不生眠名增心數法輔行云此中總説睡眠之法能令心數增長不息彼俱舍頌中約法相者云睡眠遍不違若有皆增一以通三性故也善心所有二十二法俱起十大地十大善地及尋伺有時增惡作不善心應有二十謂大地十大煩惱地六大不善二尋伺二四煩惱忿等惡作二十一有覆有十八無覆許十二如前心品中若有皆增一掉悔蓋輔行云掉動也掉之為法破出家心攝猶不定況更掉散大論云汝已剃髮著袈裟執持瓦鉢行乞食云何樂著戲論法放逸縱恣失法利所言悔者二種一掉後生悔二如重罪人常懷怖畏悔箭入心堅不可今亦具二猶豫輔行云猶豫者不決之總名猶者爾雅云如麂善登木尸子言五尺大犬曰猶説文云隴右謂犬子為猶亦貜屬言此犬子或隨人行時前後不定故名猶豫疑雖有過善須思擇於自身心決不應疑師法二疑須曉其時若未入三昧來於此二法若不疑者或當復著邪師邪法故應熟疑善思擇之疑為解津此之謂也師法已正依法修行爾時三疑永須棄捨五蓋棄法輔行云此五蓋中三事各立謂貪嗔疑二事共立謂睡眠掉悔俱舍云食治用同故貪欲以妙欲為食不淨觀為治嗔恚以可憎相為食慈心觀為治疑以三世相為食緣起觀為治故各立一昏沉睡眠以五法為食一懵憒二不樂三嚬欠四食不平等性五心羸劣性以毗鉢舍那治掉舉惡作以四法為食一親里尋二國土尋三不死尋四念音事尋以奢摩他治調食輔行云波斯匿王食噉太過身重懈怠現在未來於身失利又養生法云人欲常勞食欲常少勞無過極少不至虛去肥膩節醎酸俗養生法尚令自勞豈志道者過食懈怠非唯失利而已亦乃增病損生眠是眼食輔行云佛説法時阿那律眼睡佛説偈言咄咄何為睡螺螄蚌蛤類那律誓曰自今已後形融體爛終不眼睡因達曉不眠眼根便失佛令耆域治之耆域曰若少不眠治之可差此不可治也佛告那律汝當寢息一切由食存眼以眠為食乃至意以法為食涅槃以不放逸為食我無放逸得至涅槃那律云我不敢違後因得天眼眠是欲界報法既未得禪但可調停而已三事合調止觀云調身調息調心此應合用不應別説但有初中後方法不同是則入住出相有異調三事者行人欲入三昧調身之宜若在定外行住進止動靜運為詳審若所作粗獷則氣隨粗以氣粗故則心散難録兼復坐時煩憒心不恬怡是以雖在定外亦須用心逆作方便坐法如文舉要言之不寬不𢚩是身調相第二調息息凡有四一風二喘三氣四息前三不為調相後一為調相守風則散守喘則結守氣則勞守息則定前三不調心亦難定若欲調之當依三法一者下著安心二者寬身體三者想氣遍毛孔出入通同無障若細其心令息微微然息調則衆患不生其心易定舉要言之不澀不滑是息調相第三調心有二義一者調伏亂念不令越逸二者當令沉浮寬𢚩得所何等為沉相若坐時心中昏暗無所記録頭好低垂是為沉相爾時當繫念鼻端令心住在緣中何等為浮相若坐時心神飄動身亦不安念在異緣此是浮相爾時宜安心向下係緣制諸亂念心則定住此則心易安靜舉要言之不沉不浮是心調相欲入定時從粗入細身為粗息居中心最細此則入定初方便也欲出定時應先放心異緣開口放氣想息從百脈隨意而散然後微微動身云云此為出定調身息心方便以從細出粗故是名善入出住偈云進止有次第粗細不相違譬如善調馬欲去而欲住行五法合譬輔行云行五法者謂欲進念巧慧一心前喻師衆事悉整而不肯作作不殷勤不存作法作不巧便作不專一則事無成初文先反合無五法則所作不成初不肯作譬無樂欲作不殷勤譬無精進不存作法譬無念也作不巧便譬無慧也作不專一譬無一心則事不成譬正行不成今注中若無兩字總冠於下次第反合無五法若能兩字下五句正合有五法十法通名乘輔行云法華大車以譬十法且順經文次第不復依於十法次第大車高廣不思議境也幰蓋慈悲寶繩交絡即發心也安置丹枕枕有內外若車內枕休息衆行即安心也若車外枕或動或靜動靜秪是通塞義也破塞存通即塞而通其疾如風即破無明是破遍義也始自白牛終至平正道品義也又多僕從即正助也遊於四方即次位也安忍秪是忍於五品違順二境令入六根離愛秪是離六根中相似法愛是知前七正明車體及以具度後三秪是乘之所涉若無所涉運義不成是故十法通名乘也現前隂𡚶一剎那心讀教記云定境用觀一家宗要必先詳於解行之文解行詳境觀明矣文詳解云止觀一部其要在乎解之與行解則解於諸法本真行則立行定境用觀正用觀時的觀現前一念𡚶心具三千法三千即一念一念即三千不縱不橫不前不後觀之不已則隂境轉成不思議矣不思議境境即是觀兩重能所歷歷分明詳夫祖師之意説有次第用在一心稱性而觀絶待而照焉有初重次重之分因示之曰不思議境是能觀觀法即是所顯法門揀思議心取不思議心亦性德境止觀云一觀心不可思議境者此境難説先明思議境令不思議境易顯思議者小乘亦説心生一切法謂六道因果三界輪環若去凡欣聖則棄下上出灰身滅智乃是有作四諦蓋思議法也大乘亦明心生一切法謂十法界也若觀心是有有善有惡惡則三品三途因果也善則三品修羅人天因果觀此六道無常生滅能觀之心亦念念不住又能觀所觀悉是緣生緣生即空並是二乘因果法也若觀此空有墮落二邊沉空滯有而起大慈悲入假化物實無身假作身實無空假説空而化導之即菩薩因果法也觀此法能度所度皆是中道實相之法畢竟清淨誰善誰惡誰有誰無誰度誰不度一切法悉如是是佛因果法也此之十法邐迤淺深皆從心出雖是大乘無量四諦所攝猶是思議之境非今止觀所觀也不可思議境者如華嚴云心如工畫師造種種五隂一切世間中無不從心造種種五隂者如前十法界五隂也法界三義十數是能依法界是所依能所合稱故言十法界又此十法各各因各各果不相混濫故言十法界又此十法一一當體皆是法界故言十法界夫一心具十法界一法界又具十法界百法界一界具三十種世間百法界具三千種世間此三千在一念心若無心而已介爾有心即具三千亦不言一心在前一切法在後亦不言一切法在前一心在後例如八相遷物物在相前物不被遷相在物前相不被遷前亦不可後亦不可袛物論相遷祗相遷論物今心亦如是若從一心生一切法者此則是縱若心一時含一切法者此即是橫縱亦不可橫亦不可祗心是一切法一切法是心故非縱非橫非一非異玄妙深絶非識所識非言所言所以稱為不思議境意在於此揀境及心文句觀心釋山結文云即別圓二觀云云妙樂釋云云者亦應於此以辨二觀同異之相方便正修簡境及心并對前二以辨權實等乃至四觀亦須開顯去思議取不思議光記中僻執云唯止觀中從行觀法得揀隂境諸事觀法不得揀隂斯是胸情自立規矩諸文觀法既不出隂揀有何妨况妙樂中觀隂須明方便正修揀境及心揀境豈非去尺就寸揀心豈非去思議取不思議耶安得固違執不揀隂即於境種而生於果輔行云且如十境只一念心行之地也二顯示境相不同行之種也一一起於十乘觀法行之雨也一一轉成不思議境行之芽也一一發心行之幹也一一安心行之葉也一一破遍乃至正助行之華也一一次位以至離愛行之果也若無六事道樹不端次第雖爾若從人説上根即於境種而生於果故文云直聞是言病即除愈為中下根更須後法是故文云至長者所為合衆藥修德境推本具心離四性計輔行云問心起必託緣為心具三千為緣具為共具為離具若心具者心起不用緣若緣具者緣具不關心若共具者未共各無共時安有若離具者既離心離緣那忽心具四句尚不可得云何具三千耶答地人云一切解惑真𡚶依持法性法性持真𡚶真𡚶依法性也攝大乘云法性不為惑所染不為真所淨故法性非依持言依持者阿黎耶是也無沒無明盛持一切種子若從地師則心具一切法若從攝師則緣具一切法此兩師各據一邊若法性生一切法者法性非心非緣非心故而心生一切法者非緣故亦應緣生一切法何得獨言法性是真𡚶依持耶若言法性非依持黎耶是依持離法性外別有依持則不關法性若法性不離黎耶黎耶依持即是法性依持何得獨言黎耶是依持又違龍樹龍樹云諸法不自生亦不從他生不共不無因乃至云當知四句求心不可得求三千法亦不可得既橫從四句生三千法不可得者應從一念心滅生三千法耶心滅尚不能生一法云何能生三千法耶亦滅亦不滅其性相違非滅非不滅非能非所云何能生三千法耶亦縱亦橫非縱非橫求三千法亦不可得言語道斷心行處滅故名不可思議境化他境解離四性無妨四説輔行云當知第一義中一法不可得况三千法世諦中一心尚具無量法况三千耶龍樹云不自不他不共不無因生大經生生不可説乃至不生不生不可説有因緣故亦可得説謂四悉檀因緣也但推本具理心輔行云次明修德不思議境即是自行須明行相故以問答推檢而為行體如前理性本無性過約修門説須明離計故約四性以為徵問然此問中且約所起對理自具而為研核其實但推本具理心恐生計故故須此核故下答文但離縱橫等四句執竟還歸本理一念三千初心依理生解與起教後心不同輔行云若聖若凡凡欲利他皆須四句橫豎破執乃可四句慈悲為他然此為他與後起教其義不同彼唯實報八相被物發起權實施開廢等此唯初心依理生解無性執已為他四説亦通後心仍在習果無生忍位四執實破赴物説四不得而得三諦𭓩然輔行云問前理性境及前章安料揀文中皆云一心任運具足今此何得對緣推耶答今此正推一念起心已具三千故推此具為心為緣若推此起起不可得念與三千並不可得不得而得三諦𭓩然境前發心輔行云五略中初發大心次行大行云何發大心衆生昏倒不自覺知勸令醒悟上求下化又五略秪是十廣初五章秪是發菩提心一意耳方便正觀秪是四三昧耳重發誓言止觀云誓言衆生無邊誓願度生死即涅槃故煩惱無數誓願斷煩惱即菩提故法門無量誓願學即惑成智故佛道無上誓願成即生成滅故縱橫俱破止觀云破法遍為三一無生門從始至終盡其源底豎破法遍二歷諸法門當門從始至終盡其源底橫破法遍三橫豎不二從始至終盡其源底非橫非豎破法遍豎則論高橫則論廣豎來入橫無橫而不高橫來入豎無豎而不廣一無生門破法遍又為三一從假入空破法遍二從空入假破法遍三兩觀為方便得入中道第一義諦破法遍如此三觀實在一心法妙難解寄三以顯一耳橫豎通塞輔行云通相通塞是即空假兩觀能破見思塵沙於當位中雖得為通望於中觀仍具無明故名為塞若後中觀勝下二觀雖得名通隔於空假故名為塞橫中通塞尋文可知別相通中之塞橫豎法相已有通塞况復於通起著成塞當知橫豎通別並塞故云皆塞無復有通一心具三破輔行云初破橫豎中破豎者豎通漸入雖屬一人前後次第三時各異故故非一三今一心具三破等如本文云云乃至如此橫豎一一諦中具諦緣度若通若塞橫豎若破諦緣度中通塞隨破故不煩破諦等通塞通塞止觀云有橫通塞有豎通塞橫者具約三法苦集為塞道滅為通無明十二因緣為塞無明滅為通六蔽覆心為塞六度為通豎通塞者見思分假生死為塞從假入空觀為通無知方便生死為塞從空入假觀為通無明因緣生死等為塞中道正觀為通於通起塞能破如所破止觀云若同外道愛著觀空智慧宜以四句遍破能破如所破令衆塞得通若不執著觀空智慧則能破不如所破但破塞存通如除膜養珠破賊護將輔行云一者通途通塞則以所破為塞能破為通二別相通塞則以於能起著為塞破塞無著為通故下文云法相淺深任有通塞節節檢校通塞輔行云一橫通塞二豎通塞三橫別通塞四一心通塞一一皆須四句檢校若於四通而起塞著皆須破塞以存於通如是展轉以破為期故於一一能一一所皆悉檢校復須四句分別一者塞中有通二者通中有塞三者塞是自塞四者通是自通初二句即是別相通塞後二句即屬破遍應須七科次第調試止觀云上來雖破法遍識通塞若不調停道品何能疾與真法相應真法名無漏道品是有漏有漏能作無漏方便方便失所真理難會大論云三十七品是行道法涅槃城有三門三門是近因道品是遠因為是義故應須道品調停也圓理不開須修事助止觀云根利無易入清涼池不須對治根利有但專三脫門不能障亦不須助道根鈍無但用道品調適即能轉鈍為利亦不須助道根鈍重者以根鈍故不能即開三解脫門以重故牽破觀心為是義故應須治道對破障則得安隱入三解脫門大論稱諸對治是助開門法即此意也初入外凡外招名利止觀云始觀隂入至識位次障轉慧開或未入品或入初品神智爽利若鋒刃飛霜觸物斯斷初心聰睿有逾於此但錐不處囊難覆易露或見講者不稱理或見行道不當輒慈悲示語即被圍繞即説一兩句法或示一兩節禪初對一人馳傳漸廣初謂有益益他蓋微廢損自行當縮德露玼云云三術止觀云若被名譽羅利養毛繩眷屬集樹妨蠧內侵枝葉外盡者當早推之莫受莫著推若不去被粘繫者當縮德揚玼揚狂隱實密覆金貝莫令盜見若遁不脫當一舉萬里絶域他方無相諳練快學得道若名利眷屬從外來破憶此三術齧齒忍耐雖千萬請確乎難讓哉隱哉去哉似愛頂墮止觀云行上九事過內外障應入真而不入者以法愛住著而不得前大論云三三昧是似道位未發真時喜有法愛名為頂墮譬如同帆一去一停停即住著又雖不著沙亦不著岸風息故住不著沙喻無內障岸喻外障而生法愛無住風息不進不退名為頂墮
