front:
  text: 儀注僃簡序雲棲大師為宗教總持祕宗顯教獨以淨土一門遍攝羣機稱為永明復生天如再出非虗語也於時諸大弟子有得其宗者有得其教者俱指不勝屈而教則最初為紹覺慧文兩師紹師性嚴冷居土橋顓以弘法為事數十年如一日慧師性蕭散無定居晚乃居桐塢揮麈之暇時以山水為適亦遂老而疲兩師生平趨向若水火不相入而相得甚歡海內學者參土橋未有不參桐塢者一時如兩龍門焉雲棲著述多宗賢首兩師願獨精天台兼精相宗土橋會下得法如雲今四方登座諸名宿強半皆出其門而初現居士身後現比丘相者則為靈源法師靈師弱冠即有志大法抱本環聽入室請益至曉夜疲寒暑不輟者幾二十年盡得紹師閫奧以去游都門落髮受具稱人天師余友太和蕭大行伯玉淹通內外典特精相宗嘗語余曰靈師如許作唯識解願為潤文伯玉眼孔高門庭峻乃肯執筆以俟靈師則師之卓識淵抱為世所宗蓋可知矣一日自都門還將為住山計余先大衆齊沐請曰佛法得人而傳全賴英絶領袖之者力為唱導即如方今法席之盛遡流窮源假使當日無雲棲則無土橋桐塢無土橋桐塢則無吾師暨諸師而法堂外草深一丈為日久矣今吾師盡得紹師閫奧不為接引後學計而徒守其硜硜者以老高則高矣回思土橋桐塢以及雲棲數十年諄諄弘法付囑之意母乃剌謬不倫師抑何忍也靈師於是翻然許可有寶方上人者發廣大心延至菴居擇上根弟子得二十許人為傳台宗三大部餘暇兼及相宗從師得法者復指不勝屈儼如土橋會下焉嗚呼盛矣𮨇三大部多引諸經論以為證而諸經論散在大藏學人隨閲隨簡不勝其勞每有舉一廢百之嘆師特從大藏拈出成帙名曰僃簡豫及家倩沈子澤民時供筆札抄寫讀者便之余又慮僅為諸大弟子帳中祕不能公之人人也力請流通師復許可今先刻儀注僃簡一種餘當從檀波次第乞成焉師曰居士不可無一言志其顛末余不能辭遂為述吾師得法之源及結集僃簡之因如此若師之戒行精嚴道德淳僃種種足為人天師表者異日自有如椽大筆曲為寫生非區區一時筆墨所能縷及也崇禎丙子中秋日雲棲弟子聞啓祥大晙敬書於吳山鳥窠簡序板藏昭慶寺貝葉齊流通夫勞苦而㓛高者莫著書若也其事有二寫有伐山者有庀材者何謂伐山日南之答朔漠之參豫章踰嶺梨棗亂河披𠛼鑿險而求之者有人矣而用彡者𮨇不能于需用之際而且北且南且山且水僕孫道途也能之必迂日煩神或未及用而顛者有之又為人寫不憚以其身羅四方之物而致之通邑大都以供人不時之需是所謂庀材者也內典台宗如智者大師章安𠛼溪四明諸尊宿所著最為廣無涯讀者目眩神駭浩汗莫知其端倪五味八教罔不該括吾沼其功在伐山而當今靈源法師所集備簡志書吾謂其㓛在庀材或曰台宗闡教則有玄籤文句記用觀則有止觀輔行撮其大綱又言四教儀集注以至其他部帙不可勝舉其詞奧澀使人目瞪而不淂下口呿而不淂吟後人涉獵稍闖其藩而慮遠畏難至有葛藤之𮗸注束之高閣奚以益為余曰是不然正以其繁不淂不于繁中求捷徑也夾其所著詳引本教旁及他宗就一書中已動各書百十部呈覽者未𢿘頁即須覔他書以補其所引而他書又浩渺一時不獲現前則一日所幾何簡則隨其所引若經若注若內外諸書無不循序次列凡所欲購盡在案頭不必出門跬步而日南朔漢踰嶔亂河之物森然羅致百城南面樂莫大為庀材之㓛與伐山之亡為異而𮨇可少之乎故有佛教不可無台宗也有台宗不可無簡也繇簡以通台宗繇台宗而三觀圓修吾知未散靈山必為點首有如是捷徑之書而不思翻吾末如之何也雖然著書者之勞苦而㓛高自在也崇禎丙子六月望日雲栖菩戒弟子南五陳昌遇廣㴨和南題儀注僃簡目録第一卷天台此本俗名今依釋典此山即大師棲身入寂之所頓等四教古師亦用四河入海四姓出家約時破古華嚴處會三十九品昔生垂化之地譬喻一釋格他譬法不周勝鬘經五種不翻圓教八義如來乘如實道來成正覺華嚴後無等覺法報不分二三莫辨上品相好下品尊特約二現釋三品相好境本定身華嚴三照涅槃五味十二部經華梵名義如聾若啞領解如來擬宜之時後分則有等木樹草座皆表三藏詮生滅故一酬釋尊行因本願二赴五人本願先悟三報今日侍奉之勞最先得度在一切人天羅漢之前方便四大弟子齊已分領二乘各有十智彈偏折小嘆大褒圓修空觀用事識見生身住權理等事業二識為見相之本恣殃掘之譏任淨名之折四無常偈三根解源長者十德法身無病隨機權示十八空第二卷置毒發毒金光明等別為一緣一音當分跨節考彼問辭自見五味半滿相成二鳥俱遊雖復俱遊行藏得所妙法蓮華迹門三喻本門三喻開權同體異體之辨權實之語非獨今經時人謂華嚴勝開示悟入四意消之不妨高位不棄衆生四種四諦四不可說八不淨贖常住命之重寶二經教意起盡是同十六意揀二經別教復有四別圓知人法不可灰斷藏通且須順於二諦生酥益相熟酥益相密成通益密成別益華嚴頓乳通則至後三藏通亦至後方等至法華後證昔通記第三卷一淨當名任運有常樂我影𠊓經論立此藏通別圓正教小乘𠊓教菩薩靜法苑師毀之於前清涼觀師讚之於後舊醫戒定慧三人亦通諦緣度三聲聞總相智緣覺別相智菩薩總別相智三界分九地梵語象胥通四方之語十六遊增獄內障外障無障三類鬼阿修羅毗摩質多生舍脂酒能昏性起過性戒莫問受不受等性戒即舊戒第四卷世出世間禪支林功德娑婆世界主梵天王尸棄大梵離喜而純樂受無想天無煩雜無熱惱等四空定滅三種色無色界色合經墻壁譬色是無教法五衰相四空瘡癰病箭觀等百八見等五利使五鈍使二十五𡨋諦六諦見中思推利思背上思十纏三結六度攝三十七當分道品相攝道品道品通正助漏無漏等通大地𢿘九心𢿘等四如意足定力若成能於諸禪互無妨礙藏別不即通圓談即四諦分對真俗第五卷空門二十七賢聖賢人有二聖人有二十五信行法行身證俱舍則無身證賢者善直五停心通於四教五停心對圓五品五停心名五門禪轉兼具治三種貪九想觀治貪欲六種欲三種嗔慈悲喜捨四無量心四師𢿘息用息明六妙門謂𢿘隨止觀還淨一念十二因緣剎那十二因緣束十二為三道輪轉相生業道三種障念三身治觀體非念觀是其慧七賢位人明識四諦從此生暖法等四句暖頂忍世第一各有三品世第一三品中忍減緣行所留一行隨行者所宜十六行義八番減緣行盡是色界法住定地法第六卷聞唱善來即證羅漢大論俱舍七種般開三般為九一萬二千九百六十種般圖中引五差羅漢名含三義金剛三昧重空三昧電光三昧九想八念十想八背捨八勝處十一切處九次第定師子奮迅三昧超越三昧觀練熏修壞法不壞法約性共揀判慧俱約正助判慧俱斷結得滅盡定十四變化十八變化三種念處四韋陀典果性退否考論祖誥此生之中必得無疑信法利鈍通辨四果退不退無作之業至未來世孤調解脫辟支迦羅獨覺三類二辟支三義分大小迦葉舍利弗等是辟支根性支佛是法行四流隨母氣息上下出入三十八個七日推因知果推果知因約十二支觀𢜤觀見華飛釧動三家二即第七卷令生事善故作是說雖修性念處而不斷結無脂肥羊會釋二論斷伏不同證四真諦方斷塵沙十種小劫拂石芥子劫從古釋迦緣不生三惡道位不退等既云斷惑故知通佛行因之相三祇等義種相不拘前後福義多途六度滿相三十二相道樹已前四波羅密滿彌勒值佛必有超劫八相三轉十二行法輪度三根性老比丘三百由旬諸般若有二乘得道通有三義藉通開導總相別相等智當教三乘共位三乘共借一教菩薩借別一教別為菩薩立忍名三處初𦦨三地據斷見初四地據斷見後通雖二地斷時仍促等聲聞位齊七地十力四無所畏通教諸位布施攝衆生等通教有合身義一金剛土臺成道四機所見不同八相稍異三藏三種意生身一生實相二生法界列八二諦章安作七二諦消之七種二諦風流二諦一真含二中寄三法以示三根解源四地為上六七為中八九為下約證道邊唯明一接巧拙論體析對破外道汝析非正朱雀門中何妨庶民出入第八卷別教八義無量四諦華嚴正當歷別之行十住多明圓義等六輪五行隨機明位增減不同今家借用教證二道華嚴十地論師不分圓別四教俱論三根出假別教因緣假名十信通伏諸惑正伏四住五忍判別圓此十通名住塵沙譬無知𢿘多一切智身子六住有退十行從空入假觀無量四諦若住於空與二乘何異等道種智此十通名回向方便有餘土實報無障礙土六地斷思與羅漢齊別人不知本覺之性具染惡德因果三法縱橫圓教詮因緣即中道等三諦圓融圓信圓行等三因開發即初住位天女訶身子圓位淺深仁王十四般若大品四十二字三漸次第九卷一塵有大千經卷十法成乘十心成就法者謂衆生心表法約理心佛衆生三無差別三法各有二造能破三諦相著能立三諦之法能妙三諦之法唯法華別約六時五悔懺悔法後一雖可獨修不進須假前二三懺功能五石五芝坐法扇𢮎十惡彌勒五悔天台建立解行了修即性全性起修法藏華嚴皆有別願懺悔義廣位位橫論各有三障讀誦品南嶽為他損已天台為他損已三術三軌四安樂行圓家五品擬對三藏五停心四信伏忍諸教初心無此氣分獲旋陀羅尼十信有百橫竪十乘別圓即離不可一混謂成妙覺謬之甚矣一切種智龍女成佛權實從智證法五眼洞照斷最後窮源微細無明道窮妙覺位極於茶無上士弒無明父斷貪𢜤母境智寂滅隱前三相六即六種即名皆是事理體不二義世間常住無情佛性唯色唯聲貧女寶藏力士額珠三障理全是佛相似即喻始似本稱隨分覺修善修惡性善性惡第十卷入體之門四教四門門門十乘方便名善巧遠近方便橫竪該羅方等夢王五科師譬引證道定復以律儀為根本十戒五支戒通大小乘六物頭陀抖擻分衛自資乞食十利蘭若十利慶吊俯仰等外護善知識同行善知識教授善知識五欲過患金石𮈔竹等仙人聞舍脂語失通因五欲招過三世九惱眠名增心𢿘法掉悔蓋猶豫五蓋棄法調食眠是眼食三事合調行五法合譬十法通名乘現前妄一剎那心揀思議心取不思議心亦性德境揀境及心去思議取不思議即於境種而生於果修德境推本具心離四性計化他境解離四性無妨四說但推本具理心初心依理生解與起教後心不同不得而得三諦宛然境前發心重發誓言縱橫具破橫竪通塞一心具三破通塞於通起塞能破如所破節節撿挍通塞應須七科次第調試圓理不開須修事助初入外凡外招名利三術似𢜤頂墮儀注僃簡目録終儀注僃簡山家後學大惠集
