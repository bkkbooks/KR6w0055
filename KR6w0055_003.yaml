body:
  text: 一淨當名任運有常樂我光明記中云法身配常我解脫配樂般若配淨三身即一而三即淨豈不攝餘三耶涅槃疏中云法身配常樂般若配我解脫配淨又涅槃四法身配常般若配樂解脫配淨我三一圓融例知影𠊓經論立此藏通別圓妙玄引云月燈三昧經第六明四種修多羅謂諸行訶責煩惱清淨私釋會之諸行是因緣生法即三藏義也訶責是體知過罪即通教義也煩惱者不入巨海不得寶珠若無煩惱則無智慧即別教義也清淨者既舉一淨當名任運有我常樂等即圓教也又一一教具四修多羅諸行即集諦諸行果即苦諦諸行對治對治煩惱即道諦諸行清淨即滅諦此三藏中具四修多羅也又訶責諸行即集諦訶責諸有即苦諦訶責煩惱對治即道諦訶責清淨即滅諦此通教中具四修多羅也又煩惱諸行是集諦煩惱諸有是苦諦煩惱行被訶責即道諦煩惱清淨即滅諦此別教中具四修多羅又涅槃即生𣦸苦諦清淨也菩提即煩惱集諦清淨也煩惱即菩提道諦清淨也生𣦸即涅槃滅諦清淨也此圓教中四修多羅地論第七云一念心具十波羅密四攝三十七品四家釋四家云般若家諦家捨煩惱家苦清淨家私釋者約苦諦為初門修道品令苦清淨者即三藏義也捨煩惱家者即無相體達為捨如色是空以空捨無相論修道品者此即通教義也般若家者般若智照諸法明了恆沙法門皆悉通達而修道品此即別教義也諦家者諦即實相之理即是圓教約實相而修道品也具如彼說云云籤云今借四釋以對四教若借高位念念具法以成初心具法之意以證圓門不二故得用也亦可一一教皆具四家既引月燈經地論故云影𠊓經論正教小乘𠊓教菩薩四教義云問佛於三藏初開三乘大乘最勝何不以大乘為正小乘為𠊓耶答鹿苑初說四諦法輪拘鄰五人見諦成道八萬諸天得法眼淨但有小乘得道未有大乘故以小乘為正也大論云佛於阿含中雖為彌勒受記亦不說種種菩薩行故大乘為𠊓也靜法苑師毀之於前清涼觀師讚之於後華嚴疏云此師立義理圓僃但三藏教名義似小濫以餘三教亦有三故鈔云以名濫故靜法與作四種過一濫涉大乘失以大乘亦有三藏應名三藏教故二大無三藏失以彼不名三藏故三特違至教失彼云不得親近小乘三藏學者有小乘言揀異大乘故明知三藏不唯屬小四有不定失以小乘諸部有不立三故如經量部但立經律二藏故有立五藏成實三外立於雜藏及菩薩藏故以有此四失故總許其破故云名似小濫正許初失然下皆以通失疏云所以爾者良以智論之中多詺小乘為三藏故成實論中亦自說云我今欲說三藏中實義故鈔云此出其所據通違教之失及濫涉大乘失謂大小乘論同立此名故濫涉之失不在於己若有難言智論之內小乘之名隨自宗語三藏之稱隨他宗言非共名也故今釋云智論是隨他名成論小乘云何亦名三藏豈隨他宗耶即由上義不違至教以羅什譯經多依智論小乘三藏為欲成文二言雙舉小乘之過不在三藏但責其小心耳故訶小乘不責所詮三藏疏云初對舊醫戒定慧故立此三事迢然不同異後三教鈔言此立三藏所以以四教之初敵對舊醫之三故須特立三藏三又迢然不同故無濫涉大乘所以偏從立號亦猶五塵皆色而色獨得總名故三藏雖通標總名便為小乘別教言三事迢然不同者上對舊醫下對通別圓教由不同故立三藏名即由此義諸部多名三藏從多立名非不定失疏云通教意融三故別教依一法性而顯三故圓教三一無障礙故鈔云此明後三不名三藏所以即正通大無三藏失謂大乘雖有三藏各有融拂等義故不立名非無其體疏云所以不名小乘教者此教亦有大乘六度菩薩三十四心斷結成真佛故鈔云謂有難言何以不名小乘強立三藏而招多失故今通云以有大乘故不得名小彼教之中立有菩薩謂是大乘大乘望之皆稱三藏小教疏云故藏通別圓之義四教互有而核其定實餘三不成唯成當教中義耳舊醫戒定慧四教義云問曰外人亦說戒定慧此有何異答外人所說戒定慧即是舊醫如彼道舊戒有二一邪二正一邪者即是雞狗等戒二正者即是十善道也舊定有二一邪二正一邪者即是九十六種道經所說鬼神邪定能知世吉凶現神變相也二正者即是四禪四定四無量心及發五神通也舊慧有二一邪二正一邪者即是身邊見心發諸邪智撥無因果食糞裸形等也二正者即是因身邊見心發諸世智說有因果修諸善法也今佛說三藏教所明客醫戒定慧即是新醫從遠方來曉八種術初說四枯正術即是三藏教門明戒定慧也一戒者即是十種得戒發一切律儀無作如毗尼所明身口諸善法也二定者即依八背捨入九次第定師子奮迅超越三昧等也三慧者是生滅四諦破身邊二見六十二見發真無漏成十一智三無漏根也此三外人尚不聞其名況有少分然此三法通名藏者以含藏為義但解者不同有言文能含理故名為藏又言理能含文故名為藏今言三法之名各是一句三名各含一切文理故名藏也三人亦通諦緣度三妙玄云小乘四諦以生滅為體大乘以無生為體十二因緣還是別相細觀四諦耳約苦集即有無明老𣦸約道滅即有無明滅乃至老𣦸滅也又三人通觀十二因緣二乘生滅十二緣菩薩無生十二緣無生十二緣本不生今不滅相生則相生傳傳滅又三乘亦通論四諦二乘有量四諦為菩薩無量四諦又六度亦通三人大品發趣品云阿羅漢支佛因六波羅密至彼岸攝大乘云凡夫二乘有六度但不同耳阿毗曇有六足六足即六度聲聞總相智緣覺別相智菩薩總別相智釋籤云藏教聲聞總相一門析色成空緣覺別相一門析色成空菩薩亦總相別相於四門析色成空總相等者總謂但作苦集觀耳別謂觀苦七支觀集五支以自行故但依一門菩薩為他故於四門也三界分九地瑜伽云一欲界五趣雜居地二色界開四初禪離生喜樂地二禪定生喜樂地三禪離喜妙樂地四禪捨念清淨地無色開四初空無邊處地二識無邊處地三無所有處地四非非想處地梵語釋籤言胡音者自古著述諍兢未生但從西來以胡為稱應云梵音元梵天種還作梵語及以梵書輔行云譯者前朝諍輕未多紛兢但是西語咸曰胡音後因黃冠虗構僞制近代方始胡梵甄分蔥嶺已西竝屬梵種鐵門之左皆曰胡鄉言梵種者光音初下展轉出生是五天竝云梵種近代著述特諱胡音象胥通四方之語輔行云寄等四皆官名寄言能寄寓風俗之異於此象言能倣象風俗之異於彼鞮則欲別服飾之異譯則辨其言語之異周官通謂之象胥而世俗通謂之譯也十六遊增獄俱舍頌云此下過二萬無間深廣同上七捺落迦八增皆十六謂煻煨糞屎鋒刃烈河增各住彼四方無間四門既各有四上七亦然十六遊增地獄四門門門有四東門四獄饑餓銅鍑多鍑石䃺南門四獄膿血量灰灰河鐵丸西門四獄斤斧豺狼劒樹寒氷北門四獄黑砂沸屎鐵釘焦渴新婆沙云八熱獄名有四門一一門有遊增獄有情遊彼其苦增故正法念云阿鼻苦千倍過前七獄內障外障無障蘭盆疏云水到化為膿血是內障咽如針腹為癭為外障飲啖糞穢燒然等是無障三類鬼正理論云無財者無福德不得食少財者少得淨妙飲食多財者多得淨妙飲食三各三品成九種鬼阿修羅楞嚴云三界中復有四種阿修羅若於鬼道以護法力乘通入空此阿修羅從而生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝毗摩質多生舍脂妙樂云毗摩質多此云淨心亦云種種疑波海水出聲名毗摩質多即舍脂父也觀佛三昧經云光音天生此地地使有欲入海水洗不淨墮泥變為卯八千歲生一女千頭少一二十四手此女戲于水水精入身八千歲生一男二十四頭千手少一海水波音名為毗摩質多索乾闥婆女生舍脂帝釋業力令其父居七寶殿納為妻酒能昏性起過大論云夫酒為不善諸惡之根本能生三十六種之失招於五百世中無手慢刑無禮發出伏匿眠臥糞穢搪揬水火頌曰財虛招病諍三裸露醜名彰二無智得者失二說匿廢事業二醒愁身力少二色壞慢父母二沙門婆羅門二及叔伯尊長二不敬佛法僧三黨惡遠賢善二破戒無慚愧二不守情縱色二人憎親屬棄二行惡捨善法二智人所不信一遠涅槃狂癡二命終墮惡道一若得人常騃一酒失三十五大論之所明性戒莫問受不受等止觀中性戒下輔行云料揀三學無作有無初戒無作者性戒不受故無無作止觀中若受戒下輔行云明受得戒即有無作故性罪之上加違無作出家等戒無作別生是故持則功等虗空破乃隨對一支一境舉持勸受加罪違況犯已法除復本清淨止觀云如伐草害畜罪同對首懺二罪俱滅大論解云違無作罪同滅耳而償命猶在故知受得之戒與性戒有異也止觀中如伐草下略出性同異之相如草畜俱有違制之罪作單提悔二俱滅然於害畜仍有性愆故大論云償命猶在故知受得之戒與性戒有異也性戒即舊戒輔行云論不等義兼性制故且初引論釋於性戒因此對辨客舊三學初明舊三學有無所言性者即舊戒也不待佛制性是善惡故名為性并舊定慧名舊三學舊戒通為十戒根本故論十戒即客三學何者初之三戒即是客戒義兼於舊次一即是客定次六即是客慧初引論二文或八或十竝是性戒論十戒者一不戒二不破三不穿四不雜五隨順六無著七智所讚八自在九隨定十具足
