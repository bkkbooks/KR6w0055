body:
  text: 別教八義四教義云別者不共之名也此教不共二乗人說故名別教此教正明因緣假名無量四聖諦理的化菩薩不涉二乗故聲聞在座如聾若啞法華經迦領解自述往昔聞方等大品淨佛國土成就眾生心不喜樂即其義也所言別者義乃多途畧名有八一教別佛說恒沙佛法別為菩薩不通二乗二理別藏識有恒沙俗諦之理三智別道種智也四斷別塵沙無知界外見思斷也五行別塵沙刦諸波羅蜜自行化他之行也六位別三十心伏無明是賢位十地發真斷無明是聖位七因別無碍金剛之因也八果別解脫涅槃四德異二乗也無量四諦玄義云無量者迷中重故從事得名苦有無量相十法界因果不同故集有無量相五住煩惱不同故道有無量相恒沙佛法不同故滅有無量相諸波羅蜜不同故大經云知諸隂苦名為中智分別諸隂有無量相非諸聲聞緣覺所知我於彼經竟不說之三亦如是是名無量四聖諦又云無量四諦凡有四種有無量四諦不伏破塵沙亦不伏破無明有無量四諦伏破塵沙不伏破無明有無量四諦正伏破塵沙亦伏無明有無量四諦正伏破塵沙亦伏破無明云何無量不伏破無明若三藏伏道有十六諦觀明障真之惑有無量種此乃伏於見思何關塵沙例如外道分別世智非伏見思云何無量是伏破若通教七地出假分別藥病此助滅界內非正伏破云何無量正伏破塵沙此是別教分別內外四諦有無量種即是伏破塵沙亦伏無明乃有破無明義今從事得名伏無明者為便也云何無量伏破無明若圓教三諦俱照法界事理無不明了破自地無明伏上地無明別教無量四諦非前二非後一正就恒沙佛法當名籤釋云先舉四數次列四法三釋四法意者所以四教斷伏皆明無量若斷若伏相狀非一故通明之此中皆約菩薩故也初三藏伏見通即指菩薩今明無量多在出假故且置二乗次通教亦指出假助謂助別三別教內外四諦者當知別人具四四諦言乃有斷無明義者若據始終雖登地斷既證道同圓當知教道有斷義耳故今從事且判地前屬於別教則回向中伏望於圓理故得事名四圓教圓人破無明位長故指初住去以為無量四判也華嚴正當歷別之行別玄云別教者別異通也別明不共般若故言別也此教雖明中道為鈍根人方便說中次第顯理廣明歷刦修行故大品云有菩薩從初發心遊戲神通淨佛國土次第習恒沙法門助顯中理前𨚫四住次破塵沙後破無明十信通伏諸惑而正伏四住十住亦是通伏諸惑而正斷四住成一切智十行出假斷無知成道種智兼伏界外塵沙十回向斷界外塵沙成道種智正修中道伏無明十地斷無明見佛性成一切種智玄記云詮中故異通次第故異圓故名為別不共般若不共二乗全別前教圓亦不共故未別後不明不共意在於茲雖說眾生見聞覺知體是佛性而全起作三種之惑故湏用此覺知之性觀空破有觀假破空待二均平方照本性中道之覺故名方便次第顯理既此迂廻故經塵刦從初標志次第修學恒沙觀智破恒沙惑顯如來藏恒沙性德故緣無量四諦發心十住多明圓義等釋籤云始從住前至登住來全是圓義從第二住至第七住文相次第又似別義於七住中又辯一多相即自在第七重會普光明殿說十地勝進行有十一品第七品不思議法明佛果德十普賢行等此皆屬圓餘品是別六輪瓔珞經云銕輪銅輪銀輪金輪琉璃輪摩尼輪以對信住行向地等妙五行玄義明別五行別者如涅槃云五種之行謂聖行梵行天行病行嬰兒行聖行有三謂戒定慧戒者菩薩欲苦集而起大悲興兩誓願欲與道滅而起大慈興兩誓願發誓願已次則修行棄家捨欲白四羯磨持性重戒息世譏嫌等無差別回向具足無上道戒等是名戒聖行定者一世間禪二出世禪三上上禪如前四卷初慧聖行者謂四種四諦慧生滅無生無量無作等也梵行者梵淨也即是無緣慈悲喜捨菩薩以大涅槃心修於聖行得無畏地具二十五三昧無方大用具一切功德莊嚴故名梵行三天行者第一義天天然之理此語道前由理成行此語道中由行理顯此語道後今約由理成行故言天行菩薩雖入初地二地不應住以有所得故修上地智慧十重發真修慧即智慧莊嚴上求佛道故有聖行天行下化眾生故有梵行病行嬰兒行也四嬰兒行者若福慧轉增實相彌顯雖不作意利益眾生任運能有冥顯兩益天行力有冥益梵行力有顯益眾生雖有小善之機無菩薩開發不得生長慈善根力和光利行能令眾生得見菩薩同其始學漸修五戒十善人天果報楊葉之行乃至示同別教歷別次第相似中道之行皆是慈心之力俯同群小提引成就從慈心與樂起嬰兒行五病行者此從無緣大悲起若始生小善必有病行今同生善邊名嬰兒行同煩惱邊名為病行以眾生病則大悲熏心是故我病或遊戲地獄或作畜生形化身作餓鬼等悉是同惡業乃至同別教寂塲初斷塵沙無明之病是故菩薩悉同彼病徧於法界利益眾生隨機明位增减不同四念處云眾經諸門列位位數增减華嚴初無十信後無等覺於十住中多明圓義於登地中多明別義若住若地皆說界外行位不語界內云云方等前分對緣散說得道而已未論地位至瓔珞總結階級明五十二地前後數整界內亦分明諸般若前分亦對緣散說亦未有階次勝天王但明十地前無三十心後無等覺新金光明無前無後但明十地仁王般若明五十一位無等覺推諸經意如軍師蕩𡨥竟方敘功勳定其爵祿所以前散後結今家借用教證二道輔行云前兩教教證俱權圓教教證俱實此竝易明但別教中教權證實意稍難曉人多迷之使此別教其義壅隔是故今家借用地論教證二道以消別門於中應湏先知二意一者約行則地前為教登地為證何者地前仰信登地現前豈有親證復存隔歷二者約說為地前說始終屬教何者如云真如為惑所覆或將十度以對十地互不相收或云須離二邊修真如觀或云等覺入重玄門或云五地習學世法或云八地入無功用等覺一位或有或無斷十二品稱為妙覺如是等例不可具載悉是權施為引凡下為入地方便入地自證權門自開故云初地即是初住入證道也又云初地不知二地菩薩舉足下足若約理說名字觀行尚有知圓豈有初地不知二地若云下位不測於上圓亦展轉迭不相知何但別人教門方便今文非專判教優劣但存次第及不次第迷之尚寛若讀玄文善須曉此教證二道則別門可消妙玄云地持明地相明義說相似法地實明義說真實法又教門方便即教道明義說所證法即證道明義今借用之釋籤云有兩番意者前文約行次文約教地相謂地前回向位中道觀雙流地相現前登地已去明真實法稱為地實初地即是初住故也又教下依教道義以四悉檀說登地法名為教道故知初地已上仍存教道若說十地已證之法即證道也凡釋別義多用此意華嚴十地論師不分圓別釋籤云第七重會普光明殿說十地勝進行有十一品一十定二十通三十忍四阿僧祗五壽量明菩薩報生淨土隨時壽量六菩薩住處七不思議法明佛果德八相海九隨相光明功德十普賢行十一如來出現如是處會所明位行不出別圓又一一位皆有普賢行布二門故知兼用圓文接別四教俱論三根出假止觀云三藏菩薩第三阿僧袛正入假位利益眾生此下根也中根二僧袛已伏煩惱功德身肥即能化物豈待三也上根初發心時為度眾生誓求作佛初心即能入假不待至二袛也通教出假位下根斷惑盡方能出假佛於法中破其取涅槃心勸發無上道二乗既然極鈍菩薩亦同此說中根者斷見惑已生死少寛思任運斷第二地名菩薩神通從此以去即能入假上根者初心聞慧即能體達見思即空已為眾生作依止處何須七地方出假也別教出假十住後心十行之位修假方便下根也十住初心即能入假已得無漏一受不退即能出用何須至十行方起大悲中根也又別教初心不愚於法達解一切功德猶如幻化具五因緣以益眾生上根也圓教十信六根淨時即徧見聞十法界事既言六根互用即是入假位也又五品弟子正行六度廣能說法既是入假之位何待六根耶又初心之人能知如來秘蜜之藏圓觀三諦尚能即中豈不即假又六即料揀便有出假之義何須待至五品耶別教因緣假名妙玄云出假對十二因緣者如寶性論云羅漢支佛空智於如來身本所不見二乗雖有無常等四對治依如來身復是顛倒顛倒故即是無明住無漏界中有四種障謂緣相生壞緣者謂無明住地與行作緣也相者無明共行為因也生者謂無明住地共無漏業因生三種意生身也壞者三種意生身緣不可思議變易死也是為界外不思議生滅十二因緣相十信通伏諸惑正伏四住別玄記云十信緣中道伏三惑心正著有要先觀空伏斷四住方袪滯有復偏著空故觀六界藥病成體柝八門道種又觀四聖惑智因緣無量無作八門道種二觀既成故照中道此時三觀只在一心別向圓修斯之謂矣五忍判別圓仁王䟽云地前三賢未得無漏未能證但能伏不能斷故為伏忍智也以有智故能伏煩惱初地二地三地得無漏信名信忍四五六地趨向無生名順忍七八九地諸念不生名無生忍十一二地得菩薩果名寂滅忍以初地得無漏信此別教意也妙宗云圓位五品伏忍六根清淨信順二忍初住至等覺無生忍妙覺寂滅忍此十通名住四教義中引仁王云入理般若名為住此即體假入空觀成發真無漏見通教真諦之理斷界內見思九十八使故名發心住也塵沙者譬無知數多輔行云他解唯二一染污二不染污不染即習氣今家意者小乗習氣即別惑是故今釋之分界內外一十六門知病識藥及授藥也一切智玄記云內法內名者謂理內所詮法相及能詮名字外法外名者即理外所詮法相及能詮名字空觀若成於此名相悉能體達無我我所故佛言摩訶迦葉婆羅門法皆知沙門法皆知故云內外能知能解身子六住有退戒䟽云舊云法才王子六心中退即云十住第六心難云十住云性地性以不改為義云何退作二乗其繇一答性是不作一闡提不妨退大向小終是難通止觀師說是十法信中六心退耳比釋論師及金剛般若論師皆作此解是信習十心中六心耳七心已上永離二乗教行錄中日本師問譬喻品記云身子於十住中第六心退恐是爾前見思俱斷至六心時見猶未盡六心尚退近代疑者云別教初住界內見惑皆已斷盡豈有第六住見猶未盡退作凡夫逆罪人耶答若常程別教皆云初住斷見更不起諸重過也况見惑名數雖多乃一位頓斷思斷乃經諸位方盡此常所談別教分齊也今記主見云身子六住尚退復起重罪遂以義求恐有教門見思俱斷至六心時思猶未盡見亦餘殘所以牽惡道也此是記主約義斟酌之辭不可將現行別教難也若據起信唯云不退乃剋就圓人辯之若論迹示亦須示其階位約惑分齊方有退義十行從空入假觀無量四諦四教義引如大涅槃經說知諸隂苦名為中智分別諸隂有無量相悉是諸苦非諸聲聞緣覺所知是名上智是名無量苦諦知諸入者名之為門名為苦諦分別諸入有無量相悉是諸苦即是無量苦聖諦也知十八界名之為分亦名為性即是苦諦分別諸界有無量相悉是諸苦是名無量苦聖諦所言無量集聖諦者知愛因緣能生五隂名之為集一人起𢜤無量無邊况一切眾生所起諸𢜤如是等𢜤無量無邊即是無量集聖諦也所言無量滅聖諦者知滅煩惱名為滅諦分別煩惱不可稱計滅亦如是不可稱計即是無量滅聖諦也所言無量道聖諦者能斷煩惱名為道諦分別道相無量無邊所離煩惱亦無量無邊即是無量道聖諦也如是四諦大涅槃經說悉云非諸聲聞緣覺所知故知此屬別教菩薩之所學也菩薩住此無量道諦學十波羅蜜一切諸道斷塵沙無知中品十行成就從空入假平等觀成也得道種慧法眼清淨相似中道之解轉更分明即是別教頂法之位菩薩住此位中遊戲神通淨佛國土成就眾生也若住於空與二乗何異等者妙宗云先斥住空墮二乗地若修假觀能成佛法能益眾生觀空欲作入中方便故於空智證而不住三界惑著須蕩令空諸法因緣須究本末見思重數如塵若沙以大悲心徧觀徧學名為知病諸法諸門破性破相一一對治無不諳練是名識藥隨惑淺深知機生熟神通駭動智辯宣揚四悉當宜各令獲益如此授藥方肯服行皆由證空能入此假故此觀名從空入假觀道種智玄記云然其空智但能總達諸法無生不能別知諸法緣起故不能用諸佛道法發起眾生一切善種假觀能爾故以道種而名其智此十通名回向四教義云十回向中正修中道第一義觀從無量四諦學無作四諦也約實說四實不作四故名無作之四觀四得實故名四實因名無量果名無作證果斷苦集有道滅非圓教之無作也今立無作四實諦名義意在於此菩薩深觀如來藏破無量取相破無量塵沙破無量無明破無量身相破無量受相無量心相無量法相識無量病相知無量藥作此觀時即入十回向回因向果回事向理回己濟他故名回向此位正是解行終心麤惑已融似中慧淨斷界外下品塵沙伏無明轉強如向山趨前漸易見相似中道見恒沙佛法斷恒沙煩惱入相似是自行出界假是化他方便有餘土妙宗云修方便道等者九種行人合生彼土藏二通三別住行二既修空假皆方便道別向圓信所修雖實猶居似道判為方便不生分叚盖除四住約此修斷得名方便斷通餘別故曰有餘實報無障礙土妙宗云行真實道等者圓人從初別人十向能於諸法稱實觀中也中理今開即感妙報色心不二毛剎相容純是法身菩薩所居尚簡圓似况七方便收簡語寛宜善分別六地斷思與羅漢齊止觀云若借此別名判三人通位者則初地斷見惑二地斷欲一兩品思三地斷六品思四地斷七八品五地斷九品思六地斷七十一品思七地斷七十二品思八地以上更侵習斷無知等舊云六地斷思盡齊羅漢或用仁王七地齊羅漢但六地名離欲止離欲界九品秪可與那含齊縱令𢃄果行向猶有非想第九品在亦不得與羅漢齊若七地是已辦就果可爾今若取釋義便者約十度明義以第六般若入空之慧斷惑盡與羅漢齊第七方便般若出假化用此名目為便若取七地齊羅漢約諸地對果向七地正與第四果齊此皆一往主對經綸不定復須斟酌不可苟執云云別人不知本覺之性具染惡德釋籤明三點不縱橫云雖一點在上不同點水之縱三德亦爾雖法身本有不同別教為惑所覆雖二點在下不同烈火之橫三德亦爾以二德修成不同別人理體具足而不相收文畢輒出其意別教法身為惑覆者良由不知本覺之性具染惡德是故染惡非二德也故別惑通惑業識事識煩惱結業三乗六道變易分叚此等一切迷中二法非二佛性既非佛性乃成定有能覆之惑是故但有法身本覺隨於染緣作上一切迷中之法以是名曰為惑所覆應知覆義不同泥土覆彼頑石既覆但中佛性之理如淳善人一切惡事非本所能為惡人逼令作眾惡故說善人為惡所覆應須還用隨緣覺性別緣真諦及以俗中次第別修空假緣了或中邊緣了種種二因或初緣次了或初了次緣次第番破一切迷法顯於法身本覺之性是故覆理成於縱義圓人不爾以知本覺具染惡性體染惡修即二佛性故通惑別惑事業識等一切迷法當處即是緣了佛性豈有佛性更覆佛性如君子不器善惡俱能或同惡人作諸惡事則彰己能何覆之有故即二迷以為緣了顯發於正緣了二德體迷而得義當所發元是修德復當能顯雖分修性皆本具故義不成縱言別人理體具足而不相收者亦為不知本覺之性具染惡德不能全性起染惡修乃成理體橫具三法言不相收者以其三法定俱在性皆是所發猶如三人各稱帝王何能相攝是故不知性中三法二是修者二乃成橫圓人不爾元知本覺具染惡性故使迷中一切染惡當處即是緣了佛性以此二修顯於一性如一主二臣主攝於臣臣歸於主三德相收亦復如是因果三法縱橫文句釋六種震動舊云動三乗人因果六執此破三藏家六執未破通教六執乃至別無三乗之名則無六執舊所不破今明別家因時三法縱橫果時三法亦縱橫此則須破今釋六動表圓家六番破無明圓教詮因緣即中道等玄義云不思議不生不滅十二因緣者為利根人即事顯理也大經云十二因緣名為佛性者無明𢜤取既是煩惱煩惱道即是菩提菩提通達無復煩惱煩惱既無即究竟淨了因佛性也行有是業道即是解脫解脫自在緣因佛性也名色老死是苦道苦即法身法身無苦無樂是名大樂不生不死是常正因佛性故言無明與𢜤是二中間即是中道無明是過去𢜤是現在若邊若中無非佛性竝常樂我淨無明不生亦復不滅是名不思議不生不滅十二因緣也三諦圓融始終心要云夫三諦者天然之性德也中諦者統一切法真諦者冺一切法俗諦者立一切法舉一即三非前後也含生本具非造作之所得也圓信圓行等止觀云云何圓聞聞生死即法身煩惱即菩提結業即解脫雖有三名而無三體雖是一體而立三名是三即一相其實無有異法身究竟般若解脫亦究竟般若清淨餘二亦清淨解脫自在餘二亦自在聞一切法亦如是皆具佛法無所减少是名圓聞法云何圓信信一切法即空即假即中無一二三而一二三無一二三是一二三而一二三是照一二三無無照皆究竟清淨自在聞深不怖聞廣不疑聞非深非廣意而有勇是名圓信云何圓行一向專求無上菩提即邊而中不餘趣向三諦圓修不為無邊所寂有邊所動不動不寂直入中道是名圓行云何入圓位入初住時一住一切住一切究竟一切清淨一切自在是名圓位云何圓自在莊嚴彼經廣說自在相或於此根入正受或於彼根起說出或於一根雙入出或於一根不入出餘一一根亦如是或於此塵入正受或於彼塵起說出云云云何圓建立眾生或放一光能令眾生得空假中益得入出雙入出不入出益歴行住坐臥語默作作亦如是云云三因開發即初住位觀經䟽云分證佛者初發心住一發一切發發一切功德發一切智慧發一切境界不前不後亦不一時鈔云位名發心發本覺心也常寂常照寂照雙融是本圓覺即一而三不發而發故成三發皆言一切者法界無外攝法不遺諸佛眾生色心依正同一覺體全體為緣全體為了全體為正緣因發故了正亦發了因發故緣正亦發正因發故緣了亦發盖三法圓融發則俱發緣發名功德能資成故了發名智慧能觀照故正發名境界是真性故是所顯故天女訶身子維摩經云時維摩詰室有一天女見諸天人聞所說法便現其身即以天華散諸菩薩大弟子上華至諸菩薩即皆墮落至大弟子便著不墮一切弟子神力去華不能令去爾時天問舍利弗何故去華答曰此華不如法是以去之天曰勿謂此華為不如法所以者何是華無所分別仁者自生分別想耳若於佛法出家有所分別為不如法若無所分別是則如法觀諸菩薩華不著者已斷一切分別想故譬如人畏時非人得其便如是弟子畏生死故色聲香味觸得其便也已離畏者一切五欲無能為也結習未盡華則著身耳結習盡者華不著也乃至舍利弗問天汝於三乗為何志求天曰以聲聞法化眾生故我為聲聞以因緣法化眾生故我為辟支佛以大悲法化眾生故我為大乗舍利弗如人入簷蔔林不嗅餘香如是若入此室但聞諸佛功德之香不樂聲聞辟支佛功德香也圓位淺深妙玄云然平等法界尚不論悟與不悟孰辯淺深既得論悟不悟何妨論於淺深籤云約理則證法無名約事則不無諸位故知悟即初住未悟即住前既許有悟與不悟何妨兩位俱有淺深乃成五十二耶仁王十四般若經云五忍是菩薩法伏忍上中下信忍上中下順忍上中下無生忍上中下寂滅忍上中下名為諸佛菩薩修般若波囉蜜乃至云是諸佛菩薩本所修行五忍中十四忍具足䟽云地前三賢未得無漏未得證但能伏不能斷故為伏忍智也以有智故能伏煩惱初地二地三地得無漏信名信忍四五六地趨向無生名順忍七八九地諸念不生名無生忍十一二地鈔云疑䟽文多一二字得菩薩果名寂滅忍以初地得無漏信此別教意也七地得無生忍即別接通意也乃至云今佛與十地菩薩同用寂滅忍入金剛三昧也云云下忍即法雲上忍即佛地薩婆若此云一切智又無碍道因位攝名下忍解脫道果攝故名上忍又法雲與佛入金剛三昧前心名菩薩後心名佛無有中間故但上下前之四忍俱是因位故有三品問諸經有等覺何故此中不立答若依餘經即合三品下品十地中品等覺上品妙覺今般若附通不同別教故論法雲即及佛地大品四十二字補註頌曰阿囉波那邏陀婆茶沙和多夜吒迦娑磨伽佗闍簸䭾奢呿乂哆若柂婆車摩火嗟伽佗拏頗歌醝吒茶三漸次楞嚴經云云何為三漸次一者修習除其助因二者真修刳其真性三者增進違其現業云何助因是故眾生求三摩提當斷世間五種辛菜是五種辛熟食發生啖增恚云何正性如是眾生入三摩提要令嚴持清淨戒律永斷心不餐酒肉云何現業如是清淨持禁戒人心無貪於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨
