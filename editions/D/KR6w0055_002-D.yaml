body:
  text: 置毒發毒妙玄云大經第二十七卷云譬如有人置毒乳中則能殺人乃至醍醐亦能殺人此譬兩用一通約漸頓明不定教處處皆得見佛性也二約行不定行人心行譬之如乳實相智譬之以毒毒有殞命之能此智有破無明之力久遠刼來說實相毒置於凡夫心乳毒慧開發不可為定或於初味發或於後味發不得次第往判故言置毒乳中乃至醍醐徧五味中悉有殺義若眾生始於凡地得聞華嚴即便見理入佛慧者此是血乳殺人若先得十住今華嚴得悟即是酪中殺人十行悟者是生蘇殺人十廻向悟者是熟蘇殺人諸地更悟是醍醐中殺人若過去先是圓教中假名相似之位今聞華嚴得悟者亦是乳中殺人亦是酪生熟等蘇中殺人若先是諸住諸行等位今更聞華嚴得增道損生即是於醍醐中殺人云云金光明等別為一緣妙玄云南師以金光明勝鬘楞伽殃掘之流以別為一緣為偏方不定教以不定於頓不定於漸故一音輔行云言一音者名通大小言小乗者如毘曇云佛為四王作聖語說於四諦二解二不解佛又作毘陀羅語說一解一不解佛又作𥠖車語說四王俱解問若聖語說二天不解佛若能者豈有不解若不能者偈云何通偈云佛以一音演說法而現種種若干義眾生皆謂獨為我解說諸法不為他答一音者梵音也若大會中有多貪等皆謂世尊獨為我說以此四天各念不同故佛三說以赴彼念復破眾生謂佛獨能聖語說法復有眾生須變形言而受化者有不須變是故不同大乗一音言大乗者如起信等圓音一演異類等解又如八十好中一音能報眾聲殊方異類莫不獲益如來本非一切音辭而能徧赴一切音辭竝與不定義同當分跨節妙玄云當分者如三藏佛赴種種緣說種種教緣異故教別主一故教通依此教教行有能契所契種種名理理無種種通別圓為例亦爾跨節者若開方便門示真實相即向身是圓常之身向法是圓常之法向理是真實之理考彼問辭自見釋籤云問華嚴鹿苑大小永隔纔說方等則同座竝聞者何答若以秘密橫被無時不徧若約橫論竪則隱顯在機私釋籤云祕密橫被無時不徧者言通意別也此意但在三時中不通第五何以知然考彼問辭秪約前三對問謂說華嚴時小不堪大聾啞不解則大隱於小在鹿苑時唯談生滅大所不樂則小隱於大纔說方等大小同座顯然竝聞者何也答云秘密橫被無時不徧者意謂豈前二時彼此相隱而有祕密當知方等四教相對亦有秘密故云無時不徧此約味味橫論若約此橫以論三時之竪前二味彼此相隔隱也方等同聞顯也此乃在機非關教也五味半滿相成釋籤云若直用五味猶同南師無慧方便雖有方便無實慧故故名為縛若直用半滿猶同北師無方便慧雖有實慧無方便故故名為縛次正明相成中意則不爾互相成益五味則一道竪進味味有半滿相成復於味味皆有祕密及以不定是則慧得方便故慧解方便得慧則方便解權實俱遊於茲明矣二鳥俱遊釋籤云二鳥鴛鴦鳥也遊止共俱不相捨離取其雌雄共遊止息今言俱遊者以喻生死涅槃俱有常無常在下在高雙遊竝息事理相即二即中中即二非二中而二中事理雌雄義竝成也故雙遊俱約六即雖復俱遊行藏得所妙玄云今明五味不離半滿半滿不離五味五味有半滿則有慧方便解半滿有五味有方便慧解權實俱遊如鳥二翼雖復俱遊行藏得所若華嚴頓滿大乗家業但明一實不須方便唯滿不半於漸成乳三藏客作但是方便唯半不滿於漸成酪若方等彈訶則半滿相對以滿斥半於漸成生酥若大品領教𭘧半論滿半則通為三乗滿則獨為菩薩於漸成熟酥若法華付財廢半明滿若無半字方便調熟鈍根則亦無滿字開佛知見於漸成醍醐如來殷勤稱嘆方便者半有成滿之功意在此也妙法妙序云但法有麤妙若隔歷三諦麤法也圓融三諦妙法也今經正直捨方便但說無上道故建立此經名之為妙當知華嚴兼阿含但方等對般若𭘧今經專是正直無上之道故稱妙法也妙玄云南岳舉三種謂眾生法佛法心法眾生法妙者如經為令眾生開示悟入佛之知見若眾生無佛知見何所論開當知佛之知見蘊在眾生也佛法妙者如經止止不須說我法妙難思佛法不出權實是法甚𣸧妙難見難可了一切眾生類無能知佛者即實智妙也及佛諸餘法亦無能測者即佛權智妙也如是二法唯佛與佛乃能究盡諸法實相是名佛法妙心法妙者如安樂行中修攝其心觀一切法不動不退又一念隨喜等又諸佛解脫當於眾生心行中求華嚴云心佛及眾生是三無差別破心微塵出大千經卷是名心法妙也蓮華妙玄云譬蓮華者例有麤妙云何麤狂華無菓喻外道空修梵行無所尅獲或一華多菓喻凡夫供養父母報生梵天或多華一菓喻聲聞種種苦行止得涅槃或一華一菓喻緣覺一遠離行亦得涅槃或前菓後華喻須陀洹𨚫後修道或前華後菓喻菩薩先藉緣修生後真修皆是麤華不以為喻蓮華多奇為蓮故華華實具足可喻即實而權又華開蓮現可喻即權而實又華落蓮成蓮成亦落可喻非權非實如是等種種義便故以蓮華喻於妙法也迹門三喻本門三喻妙玄云一為蓮故華譬為實施權文云知第一寂滅以方便力故雖示種種道其實為佛乗二華敷譬開權蓮現譬顯實文云開方便門示真實相三華落譬廢權蓮成譬立實文云正直捨方便但說無上道又蓮譬於本華譬於迹從本垂迹迹依於本文云我實成佛已來久遠若斯但教化眾生作如是說我少出家得三菩提二華敷譬開迹蓮現譬顯本文云一切世間皆謂今始得道我成佛來無量無邊那由他刼三華落譬廢迹蓮成譬立本文云諸佛如來法皆如是為度眾生皆實不虗是以先標妙法次喻蓮華開權同體異體之辯釋籤云所開法體即前四味中所談藏通別之法也能開之妙即今法華純圓之妙法也有謂圓與三教彼此歷別故開權者開此三教之異體也若今圓與昔圓無二無別是同體者故不須開也此約教別與之意也有謂不但開異體亦開同體此亦約部通奪之意也故曰同體異體之辯然約下有佛意機情兩意不同而開權的開異體之三教不開圓也權實之語非獨今經妙樂云諸經說權智等者權不即實令教法皆非自在諸機不融故教主別爾諸經明實智等者竝是權外之實故破疑不徧尚不及此經說施權意已破諸惑故云即實而權況復今經本為顯實有疑皆斷故云即權而實所以權實之語非獨今經相即之言出自於此不收於小是故異也文句釋廣開權顯實偈文云於諸菩薩中正直捨方便但說無上道之文也時人謂華嚴勝釋籤云自古弘經論師不曉佛意唯見華嚴事廣文長菩薩請而謂華嚴加勝法華近代已來讀山門教者仍有此說而人師偏着人師但以請主勝劣相形不云法門觀智勝此而近代匠者更以教體謂勝法華豈非悞耶開示悟入四意消之文句云開者即是十住破無明開如來藏見實相理示者惑障既除知見體顯法界眾德顯示分明悟者障除體顯法界分明事理融通更無二趣入者事理既融自在無礙流注任運從阿到茶入薩婆若一道慧見道實性實性中得開佛知見也二道種慧知十法界諸道種別解惑之相一一皆示佛知見也三一切智知一切法一相寂滅寂滅即悟佛知見也四一切種智知一切法一相寂滅相種種行類無不皆知即入佛知見也空門一空一切空即開佛知見也有門一有一切有即示佛知見也亦有亦空門一切亦空亦有即悟佛知見也非空非有門一切非空非有即入佛知見也能通則四所通則一開示悟入是能通之門所知所見是所通之理也觀於心性三諦之理不可思議此觀明淨名開雖不可思議而能分別空假中心宛然不濫名示空假中心即三而一即一而三名悟空假中心非空假中而齊照空假中名入是為一心三觀而分開示悟入之殊也不妨高位不棄眾生妙樂云問若入初住方名開者當知此經凡夫絕分何故不許他從高位何故論文云為凡夫答四釋之中約智約位唯聖方開約觀約門乃通名字況為令之語令凡入聖結緣之益凖此可知所以四釋方顯今意不妨高位不棄凡夫法華論四句文句云論明證不退轉地今作四位釋論知如來能證實今作四智釋論明同義今作觀心釋論明不知究竟處今作四門釋籤云論有三釋一番約二乗又一番約菩薩三番約凡夫今於初釋乃離為四即成三番各有四釋但舉二乗以例餘二亦是舉難況易二乗難故二乗既然菩薩凡夫例皆如此是則三類皆須圓教教門以為能通入觀修智方能到位知見佛境若作餘釋為令之說徒施佛之知見何在四種四諦妙玄云藏教生滅通教無生別教無量圓教無作四不可說涅槃經云生生不可說生不生不可說不生生不可說不生不生不可說如次泯四教也八不淨涅槃經云一田宅二種植三貯稻四畜奴婢五養六畜六積金寶七象犀等八釵釧等贖常住命之重寳釋籤云疑云法華既以顯實涅槃何復施權故即釋之釋言贖命重寳涅槃十四云如人七寳不出外用名之為藏是人所以藏積此寳為未來故所謂貴賊來侵國值遇惡王用為贖命財難得時乃當出用諸佛祕藏亦復如是為未來世諸惡比丘畜不淨物為四眾說如來畢竟入於涅槃讀誦外典不教佛經如是等惡出現世時為滅諸惡為說是經是經若滅佛法則滅今家引意指大經部以為重寳二經教意起盡是同釋籤云法華以本迹二門為初後二分初則開權顯實斷奠聲聞後明本門增道損生重更辯前開權化主久遠成佛故涅槃正說開為四叚初純陀品去明涅槃施斷奠三修二長壽品去十四品明涅槃義三現病品去五品明涅槃行四師子吼品去三品明涅槃用故知初已斷奠聲聞後但明於涅槃義用是故二經起盡同也十六意揀二經妙樂中問前會三云說法華今還引大經云出涅槃云何得同答一家明義多處說之無煩廣辯欲重論者更述大猷判味同時而有部異約理名別咸歸常住約機彼稱捃拾約法彼存三權論意彼𭘧律儀語證彼兼小果受益彼無廣記說時長短永殊談常過未不同論譬大陣餘黨現瑞表彰各別破執難易不同領解遠近迹乖述成被根不等用治生死不同付囑有下有此得十六意凖此畧知事異意同不可失㫖失斯同異講授殊難豈唯兩經餘亦不易別教復有四妙玄云別教十住修生無生十行修於無量十向修於無作登地證無作故云有四又十行中習諸佛法具足習於一十六門亦名為四問住以習八何故行中更習十六答前是自行隨用一門後是化他是故行中更習前八是故十六俱須廣習問十行無作與十向無作若為同異答十向無作可云實道十行無作且順權方別圓知人法不可灰斷別行玄記云人即假名所成之人法即五能成之法能成是實所成是假此之假實就大小教辯常無常小明人法終歸無常大說假實究竟常住如藏通教始從凡地至有餘涅槃皆有假實若入無餘身智既假人安寄若別圓教二惑二死盡淨之時人之與法常住自在假人是尊極眾生實法名常住五以要言之若云惑盡人法永無斯是小乗亦稱權教若言惑盡人法不滅斯是大乗亦稱實教凡言別圓初後知常蓋知人法不可灰斷藏通反是故曰不知藏通且須順於二諦別行玄記云觀音人普門法約相非相即作四句人非法法非人人即法法即人句雖有四義實唯二不出相非及相即故如此二義皆通大小欲示名言須將理定所辯人法若其不以二諦中道甄其權實但言即離何能的顯今之相即故以部對句明法即離華嚴別教實相法觀行人不即圓則人法相即三藏空有二門雖談即離俱非中道方等四教藏通唯二諦別圓同華嚴般若鈍同前二諦利同前別圓涅槃四教云云生酥益相熟酥益相釋籤云鹿苑已成藏人於其不復須藏故但說通即於此座復以別圓而接通者竝對而說彈斥而說即當相入意也令其耻小慕大即明說意意欲令其轉成生蘇謂受彈斥令嘆大自鄙即其益相通教利根及別圓人自於一邊得益無妨是時如轉酪成生酥亦舉譬次心漸等者至般若中不復同前悲泣之時故云通泰即為隨情等三意說別圓入別等者前於方等義已成通故至般若唯須此二乃至長者之宅不思議業付與諸子皆使令知即熟酥益相得此益已即成別人即於此座以圓入之令堪入法華密成通益密成別益輔行云鹿苑正用三藏方等用三藏正用三教以斥二乗令二乗人密成通益故云三人同一念處次至般若用通教正用別圓加於二乗密成別益故指大品為不共華嚴頓乳通則至後妙玄云以般若亦得名華嚴故法華佛慧不殊初故又像法决疑經云今日坐中無央𢿘眾各見不同或見如來入涅槃或見如來住世一刼若減一刦若無量刼或見如來丈六之身或見小身或見大身或見報身蓮華藏世界海為百千億釋迦牟尼佛說心地法門或見法身同於虗空無有分別云云釋籤云彼經既有住世無量刼之言又見報身蓮華海藏說心地法門等故知華嚴至涅槃後以彼像法决疑經結涅槃故三藏通亦至後釋籤云二人雖於法華得記此後猶作三藏結戒之緣故知三藏至後迦留陀夷者由非時入聚落為俗所疑遂被打殺埋馬糞中佛令諸比丘求覓不得從馬糞出便入滅度因斯佛制白入聚落文在涅槃故知涅槃共結小藏又如身子於法華中而為請主至滅度已帝釋供養已收取三衣付沙彌沙彌持和尚三衣奉佛帝釋以事白佛若有所說當受持先至阿難所問已阿難共來至佛所佛問汝和尚戒身滅否答言不滅乃至解脫知見身滅不答言不滅阿難言彼恒說法教化無我故憶此耳佛言止止阿難過去諸佛可非滅耶而五分不滅何所憂愁耶雖云五分不滅終是小乗中意故三藏至後當知聲聞雖得受記小機未悟終自見小方等至法華後釋籤云言至法華後者即指王城授記同於法華舍衛國記即指方等在法華後彼經下文又云舍利弗聞文殊得記問文殊師利於汝意云何文殊語舍利弗汝意云何猶如枯樹更生華不亦如山水還本處不蕉種生芽不舍利弗言不也文殊言若不可得云何問我得記生歡喜不授記無形無相無我無有言語無去來今猶如野馬如是觀者乃名得記此文是文殊破舍利弗得記之相亦同彈訶仍似般若亦可云般若在前意也證昔通記釋籤云通記者昔日授記佛意不壅小乗情隔自無悕取況約秘密以記二乗據斯以論通至鹿苑
