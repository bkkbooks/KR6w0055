body:
  text: 一塵有大千經卷輔行云言微塵有大千經卷者寶性論云有神通人見佛法滅以大千經卷藏一塵中後有人破塵出卷華嚴如來性品云佛子譬如有一經卷如大千界所有一切無不記錄二千小千須彌山王乃至色欲天宮等大皆記其事文廣時有一人出興於世具足天眼見此經卷在一塵內作是念言云何經卷在一塵內而不饒益一切眾生我勤方便破塵出卷彼人即以方便出卷佛子如來智慧具足在於眾生身中為惑所覆不見不知如來天眼觀已言曰善哉善哉云何如來在於身中而不覺知我當教彼覺悟聖道令離顛倒見如來性即時令彼修八聖道見如來性十法成乗十心成就妙玄云畧言為十謂識一念平等具足不可思議傷已昏沉慈及一切又知此心常寂常照用寂照心破一切法即空即假即中又識一心諸心若通若塞能於此心具足道品向菩提路又解此心正邪之法又識己心及凡聖心又安心不動不墮不退不散雖識一心無量功德不生染着十心成就法者謂眾生心起信論云摩訶衍者總有二義一者法二者義所言法者謂眾生心是心則攝一切世間出世間法依於此心顯示摩訶衍義何以故是心真如相即示摩訶衍體是心生滅因緣相能示摩訶衍自體相用故表法約理輔行云今珠義者第一義天天然理體即勝寶也性無雜染名之為淨無非佛法故名為妙在一剎那故云芥粟珠中所雨不增人欲生一切願從悕須邊故名為欲又理為四弘所緣之境故名悕須七寶金銀等寶不出七故竝舉之即譬無作道品寶炬陀羅尼也真寶名琳似寶名瑯真似二寶皆生於珠即正助二門不出於理非自性故非內畜非他性故非外入既無自他即無共離故但兩句不云三四從不謀去有化他用非縱故不謀前後非橫故不擇多少任運施為名為不謀稱機設逗名為不擇雖五味不同而秘密不定故縱而不縱雖諸教不同而適時增减故非多非少若機若應竝非權非實故云不作粗妙觸緣斯現故云稱意豐儉多名為豐少名為儉益物不窮故降雨穰穰穰穰福也乃至依正珠亦雨之非本無今有故不添非本有今無故不盡若自若他皆不出三諦下之二喻擬此可知單銷譬事意則可見故直對理以明體用珠是色法世福所感尚能如是况復心神不思議境心佛眾生三無差別妙玄云南嶽師舉三種謂眾生法佛法心法如經為令眾生開示悟入佛之知見若眾生無佛知見何所論開當知佛之知見蘊在眾生也又經但以父母所生眼即肉眼徹見內外彌樓山即天眼洞見諸色而無染着即慧眼見色無錯謬即法眼雖未得無漏而其眼根清淨若此一眼具諸眼用即佛眼此是今經明眾生法妙之文也佛法妙者如經止止不須說我法妙難思佛法不出權實是法甚深妙難見難可了一切眾生類無能知佛者即實智妙也及佛諸餘法亦無能測者即佛權智妙也如是二法唯佛與佛乃能究盡諸法實相是名佛法妙心法妙者如安樂行中修攝其心觀一切法不動不退又一念隨喜等普賢觀云我心自空罪福無主觀心無心法不住法又心純是法淨名云觀身實相觀佛亦然諸佛解脫當於眾生心行中求華嚴云心佛及眾生是三無差別破心微塵出大千經卷是名心法妙也三法各有二造指要舉華嚴心如工畵師等偈引輔行釋云心造有二種一者約理造即是具二者約事即三世變造等心造既有二造經以心例於佛復以佛例於眾生故云如心佛亦爾如佛眾生然是則三法各具二造方無差別能破三諦相着拾遺記云非獨空觀於法破相假中亦能於法破相何者以空破相即真破俗以假破相即俗破真以中破相雙二邊此三頓破名畢竟空能立三諦之法拾遺記云非獨假觀能立於法空中二觀亦能立法何者以空立法即俗而真以假立法即真而俗以中立法雙照二諦此三頓立名為妙假能妙三諦之法拾遺記云非獨中觀於法絕待空假亦能當處絕待何者以空中故真諦絕待以假中故俗諦絕待以中中故雙雙照俱待俱絕此三頓絕名為圓中唯法華別約六時五悔止觀云若四種三昧修習方便通如上說唯法華別約六時五悔重作方便今就五悔明其位次相先知逆順十心而繫緣實相是第一懺常懺悔無不懺時但心理微密用觀輕微黑惡覆障卒難開曉重運身口助發意業使疾相應更加五悔耳輔行釋云若修四種三昧至重作方便者明方便來意四種四昧通用二十五法為通方便若行法華別加五悔不通餘行故云唯也若方等中以求夢王為別方便常行常坐及隨自意直爾行之逆順十心一切通具懺悔法光明句云懺者首也悔者伏也如世人得罪於王伏欵順從不敢違逆不逆為伏順從為首行人亦爾伏三寶足下正順道理不敢作非故名懺悔普賢觀云端坐念實相眾罪如霜露慧日能消除我心自空罪福無主是名大懺悔是名莊嚴懺悔是名無罪相懺悔小乗作法者如毘尼中發露與學二十僧行摩那埵或半月作法或對首作法或責心但令作法成就不障僧事即清淨也記云然對治有四法一治覆藏情過謂行波利婆沙此云覆藏或云別住謂別住一房不得與僧同處設入眾中不得談論亦不得答行此法者湏滿一百日不憶元覆藏日數故乃以百日為限二治覆藏罪謂犯已覆藏得吉罪不覆藏得殘罪若覆藏者先懺吉罪後與別住三治僧殘情過罪謂六夜行摩那埵此云意喜前雖自意歡喜亦使眾僧歡喜由前喜故與其少日即六夜也故名意喜僧眾歡云此人改悔成清淨故云眾僧喜也四治僧殘謂二十僧中以白四羯磨出罪然覆藏不經明相直行摩那埵然後入眾出罪或半月作法者謂行別住時每至半月說戒須白眾僧云我犯僧殘對首作法者懺重吉也責心懺輕吉也摩夷論云故作者對首一說誤作者責心而悔句云大乗作法或八百日虚空藏塗廁是也或九十日般舟是也或四十九日大悲懺是也或二十一日法華是也或七日方等是也灰湯等淨身辛酒禁口慚愧勤心旋誦各有遍數等皆作法懺攝也取相者如方等求十二夢王菩薩或見光見華摩頂虚空藏中唱聲印臂相起罪滅雖不正明作法兼得事用也無生者端坐念實相如日照霜露觀空緣理無相最上雖不正作事相兼上兩懺也後一雖可獨修不進須假前二要旨云法雖三種行在一時寧可闕於前前不得𧇊於後後無生最要取相尚寬盖妙觀之宗是大乗之主滅罪如大地草木皆枯顯德如照澄江森羅盡現以此理導於事儀則一禮一旋罪消塵刼一燈一水福等虚空故口說六根罪時心存三種懺法三懺功能光明句中初約性釋作法懺成違無作罪滅而性罪不除如犯殺生作法懺成違無作罪去而償命猶在取相懺能滅性罪性罪去違無作罪亦去觀無生懺能滅無明如覆大地根枝葉等悉盡無餘記云無作罪者昔受佛戒由作法故發無作體若毀犯者得違逆罪今由作法破此罪言性罪者即十惡也不論受與不受犯之性自是罪大論云斬草殺畜二罪同懺二種違制俱除而殺畜償命猶存由以定心想成勝相熏修力彊能轉惡業是故能滅性二罪如伐下枝葉喻性罪根本喻無明心也二約三學釋又作法滅違戒上罪取相滅犯定上罪無生滅犯慧上罪記云作法防非故滅戒罪取相專意故滅定罪無生觀照故滅慧罪事非是戒家罪散亂是定家罪惑暗是慧家罪三除三報釋又作法滅三惡道報障取相滅人道報障無生滅三界有漏報障記云雖俱報障而有苦樂三惡唯苦違法而得故作法能除人道之報半苦半樂散善所招故取相能滅三界天報望人皆定無苦唯樂三漏所感故無生能滅別煩惱釋又作法滅怖畏憂愁之煩惱亦是破煩惱取相滅四住之煩惱無生滅無明之煩惱記云怖畏屬思憂愁屬見今作法成位在五品能伏此惑指伏為破取相懺成在七信位故滅四住既見真諦望中名相故名取相無生觀成位登初住所除的在根本無明五石五芝光明句記云五石謂白瑛紫瑛石膏鍾乳石脂五芝謂五色芝也坐法禪波羅密云初至繩床即前安坐處每令安隱久久無妨次當正若半跏坐以左置右䏶上牽來近身令左指與右䏶齊右指與左䏶齊若欲全跏即上下右䟤置左上次解寬衣𢃄周正不令坐時脫落次當安手以左掌置右手上重累手相對頓置左上牽來近身當心而安正身先當挺動其身并諸支節作七八反如似按摩法勿令手足差異竟即正身端直令脊相對勿曲勿聳次正頭令鼻與臍相對不偏不邪不低不昂平正住次開口吐胷中穢氣吐法開口放氣自恣而出想身分中百脉不通處放息隨氣而出盡閉口鼻中內清氣如是至三若身息調和但一亦足次當閉口唇齒纔相拄舌向上齶次當閉眼纔斷外光而已當端身正坐猶如奠石無得四支竊爾搔動是為初入禪定調身之法舉要言之不寬不急是身調相扇𢮎輔行云五扇提羅等者昔五比丘懶惰懈怠不修經書時世榖貴為人所輕不供養之五人議曰夫人生計隨其形儀人命至重不可守死各共乞求辦具繩床坐曠野中掃洒莊嚴依次而坐外形似禪內思邪濁見者謂聖因此招供飽足有餘有一女人名曰提韋聞之心喜莊嚴往詣禮供請還五人便許提韋有十頃園林流泉浴池堂舍供養令住終身五人又念夫人生計種種方宜求覔財物雖受施主供給日富歲貧迭差一人遊諸聚落宣告眾人彼四比丘成阿羅漢種種稱嘆諸人聞已賫持供養如是多年提韋直心供養福故經八千刼償其施主雖復為人諸根暗鈍無男女根名為石女經爾所刼償施主已佛告匿王時提韋者今皇后是五比丘者隨從擔轝五人者是王曰何故秪四人耶佛言其一人者常在宮中修治厮溷夫人聞已身毛為竪夫人師者使令擔轝如牛馬耶佛言此是夫人福德所致善者受報惡者受殃佛解喻已夫人曰何當罪畢唯願說之佛令喚宮中除糞來湏將至佛前立已佛言安隱快樂無苦不耶五人怒曰佛不知時晝夜勤苦鞭打不息有何樂耶佛豈不知如此事耶為更問人佛言今身之苦為比前世苦耶罪猶未畢應當懺悔修善補過五人聞已忿怒背佛不聽佛語佛又化身向其前立如前慰喻如是四方四維上下皆見於佛稱冤大喚何見逼耶佛攝化已告眾人言夫罪有二種一者業障二者報障提羅具二故不受化夫人見已語五人曰自今已後任意東西五人曰我等何愆而被驅棄願恕使役再三不肯皇后白佛佛言時滿當去故知無德受供如彼提羅十惡法界次第云一殺生斷一切眾生命故名為殺生二偷盜盜取他財物故名為偷盜三邪於非妻妾而行欲事故名邪四妄語以言誑他故名妄語五兩舌閗搆之言間他令致得失分名為兩舌六惡口惡言加彼令他受惱名為惡口七𦂶語𦂶側語辭言道理名為𦂶語八貪欲引取順情塵境心無厭足名為貪欲九嗔恚若對違境心生忿怒名為嗔恚十邪見撥正因果僻信求福皆名邪見次此應出四重五逆七逆謗方等經用僧鬘物作闡提行十六惡律儀等諸輕重惡業科目皆從十惡中離合分別而說者今欲論諸入道要門具出彌勒五悔彌勒問經佛告阿難彌勒往昔不修苦行但修善巧方便安樂之道積習無上正等菩提阿難言云何名為善巧方便佛言彌勒昔行菩薩道時但晝夜六時勤修五悔而得菩提彼經悔文有二十三行亦無別列五悔辭句但數數請佛數數說悔餘三亦然如云有罪悉懺悔是福皆隨喜我今請諸佛願成無上智天台建立解行詳解云定境用觀一家宗要必先詳於解行之文解行詳境觀明矣止觀一部其要在乎解之與行解則解於諸法本真行則立行定境用觀故十章中前六章以生妙解第七方是正修了修即性全性起修不二門云性雖本爾藉智起修由修照性由性發修鈔云性雖具足全體在迷必藉妙智解了發起圓修故云性雖本爾藉智起修由此智行方能徹照性德而此智行復由性德全體而發若非性發不能照性若非徹照性無由顯故云由修照性由性發修法藏華嚴皆有別願輔行云法藏彌陀因名於自在王如來所聞說二百一十億佛剎發願又觀經云法藏比丘為欲攝取諸淨土故發四十八願發是願已地為六動為佛所記大阿彌陀經為菩薩時發二十四願云不得是願終不作佛願數不同部異見別不須和會華嚴者新經第十四歷事別願又如梵網發十大願十三誓等懺悔義廣位位橫論各有三障光明句云他師明懺悔位謂鄙濁凡夫應須懺悔離垢清淨者何用懺悔故今斥局也記云位位不出四土四土論三障分叚三障見思為惑障有漏業為業障界內生死為報障方便三障塵沙為惑障無漏業為業障變易為報障實報三障無明為惑障亦有漏亦無漏業為業障彼土變易為報障寂光三障約分證說無明為惑障非有漏非無漏業為業障變易生死為報障若究竟寂光則不論寂光無報則不說也讀誦品妙玄云行者圓信始生善須將養若涉事紛動令道芽破敗唯得內修理觀外則受持讀誦大乗經典聞有助觀之力內外相藉圓信轉明十心堅固金剛般若云一日三時以恒河身布施不如受持一句功德南嶽為他損己輔行云南嶽大師陳州項城武津人也傳中不云領徒太早但云有智斷師咨疑禪要思因為說十地法門驚異心目智斷曰恐師位階十地師曰吾是十信鐵輪位耳應是傳習者異聞天台為他損己天台別傳云今我最後策觀談玄最後善寂吾今當入智朗請云伏願慈留賜釋餘疑不審何位歿此何生誰可宗仰報曰汝等懶種善根問他功德如盲問乳蹶者訪路告實何益乃至云今更報汝吾不領眾必淨六根為他損己只是五品位耳三術止觀云一莫受莫着二縮德揚玼三一舉萬里內三術謂空假中外障是輭賊謂名譽等內障是強賊謂煩惱等是故內外用術不同三𮜿法華經云大慈悲為室柔和忍辱衣諸法空為坐處此為說法四安樂行別行安樂行義云復次四種安樂行第一名為正慧離着安樂行第二名為無輕讚毀安樂行亦名轉諸聲聞令得佛智安樂行第三名為無惱平等安樂行亦名敬善知識安樂行第四名為慈悲接引安樂行亦名夢中具足成就神通智慧佛道涅槃安樂行又南嶽師云一無着正慧二口不說過三敬上接下四大慈悲天台師云止觀慈悲導三業及誓願身業有止故離身麤業有觀故不得身不得身業不得能離無所得故不墮凡夫有慈悲故勤修身業廣利一切不墮二乗地有止行故着忍辱衣有觀行故坐如來座有慈悲故入如來室止行離過即成斷德觀行無着即成智德慈悲利他即成恩德恩德資成智德智德能通達斷德是名身安樂行餘口意誓願亦如是圓家五品擬對三藏五停心妙玄云𥝠謂五品是圓家方便初欲令易解准小望大如三藏之五停心初品圓信法界上信諸佛下信眾生皆起隨喜是圓家慈停心徧對治法界上嫉妬第二讀誦大乗文字文字是法身氣命讀誦明利是圓家數息停心徧治法界上覺觀說法品能自淨心亦淨他心是圓家因緣停心徧治法界上自他痴痴去故行去乃至老死去兼行六度品是圓家不淨停心六蔽初名貪欲若捨貪欲欲因欲果皆捨捨故無復報身非淨非不淨也正行六度品是圓家念佛停心正行六度時即事而理理不妨道事妨於道即事而理無障可論大意如此云云四信文句云云何四信畧解三人廣說二人觀成一人信通四人故言四信也四信者一一念信解未能演說二畧解言趣三廣為他說四深信觀成妙樂釋云云何四信者問意兩兼一問云何但立四數二問云何四俱名信畧解去釋也四人通名為信則二義俱成攝五成四不須至五又名從初得故俱名信畧解三人者去通從別則受別名廣及觀成必有畧故故畧通三人唯除初信初無解故廣說二人除畧解者廣局第三不通前二觀成一人復除廣解不通餘三除信一事餘不通四唯信解四名為四信若一念信解未有下三乃是初信最局畧具初信廣具初二觀必具三故後漸寛但後後者勝於前前故成後局伏忍諸教初心無此氣分妙玄云例如小乗伏煗佛法則有外道則無今此伏忍圓教則有三教則無獲旋陀羅尼妙玄云若大乗懺悔發初隨喜圓信之心獲一旋陀羅尼已不可向人說雖種種分別亦不可解况後諸位釋籤云旋假入空名之為旋旋空入假名百千萬億中道實相名為法音今舉三中之一以劣况勝故云一旋約教竪論雖在六根七信已前今通明之乃在初心妙玄云如經文云得三陀羅尼但名似道未得真道旋陀羅尼是旋假入真百千旋陀羅尼是旋真入假法音方便正是伏道未得入中釋籤云旋轉也轉一切法皆悉入空言百千萬億者以從數故故名為假中道法音能作內體方便故也此三秪是一心三觀持一切法通名總持此中即是相似三總持也十信有百橫竪十乗妙玄云以善修平等法界即入信心善修慈愍即入念心善修寂照即入進心善修破法即入慧心善修通塞即入定心善修道品即入不退心善修正助即入回向心善修凡聖位即入護法心善修不動即入戒心善修無着即入願心瓔珞云一信有十十信有百既由十乗入於十信故今文義理須具對橫竪二意先竪對次引瓔珞十信有百橫對一一信中言善修者由緣實相行於五悔策勤精進至五品得入十信名為善修由善修故相似解起是故十法在相似位轉名十信心乃至願心亦復如是何者不思議境以為信本慈悲弘誓藉念力持心安止觀功由精進破於三惑妙慧方徧於通無塞由决定力元修道品為求不退正助無闕回因向果不濫次位方能護法內外不動由善防非於法無𢜤由大願力故得至此名為信心乃至願心十法既許初心具修當知信信皆具十法是十信有百明矣別圓即離不可一混妙樂云起信論䟽釋真如門立二義一真如不變義二隨緣起滅義指要云隨緣對不變說不變即中道理本有不改之義隨緣乃全理成事轉變造作之義良由真如不守自性故受熏變隨於染淨二緣故名隨緣體相者別教不變以真如一性如來藏理為當體體無明差別為所依體圓教不變以理造三千為當體體隨緣以事造三千為當體體並以一念妄心為所依體不變即性具三千相相𭓩然為相隨緣則以真如無明互相熏習成染淨二用為相不同他宗一理隨緣但是合義不談理具單說真如隨緣仍是離義今家明三千之體隨緣起三千之用不隨緣時三千𭓩然故差別法與體不二謂成妙覺謬之甚矣妙玄云有師言頓悟初心即究竟圓極釋籤云然華嚴中位兼圓別人不通曉兩教位意又復不達圓位始終直指初心以為妙覺唯尚頓門成佛速疾乃成圓教後位徒施兼成出佛煩重之過故依舊判誠為未可一切種智別玄云一切種智能於一種智知一切道知一切種一相寂滅相種種行類能知能解名一切種智記云夫中觀智者則了一切皆是中道中則不偏絕待為義一法若中則一切眾生因種一切佛之道法無不咸趣一外有法不名中也一法既爾一切皆然故云於一種智知一切道知一切種一相等者結前所說而成照雙則一相寂滅雙照則種種皆知照同時故名一切種智龍女成佛權實妙樂云正示圓果中云龍女作佛者問為不捨分叚即成佛耶若不即身成佛此龍女成佛及胎經偈云何通耶胎經云魔釋女皆不捨身不受身悉於現身得成佛故經云法性如大海不說有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌答今龍女文從權而說以證圓經成佛速疾若實行不疾權行徒引是則權實義等理不徒然故胎經偈從實得說若實得者從六根清淨得無生忍應物所好容起神變現身成佛及證圓經既證無生豈不能知本無捨受何妨捨此往彼餘教凡位至此會中進斷無明亦復如是凡如此例必須權實不二以釋疑妨南方緣熟宜以八相成道此土緣淺秪以龍女教化此是權巧之力得一身一切身普現色身三昧也妙樂言權巧者不必一向唯作權釋秪龍女已得無生則約體用而論權巧非謂專約本迹為權巧也故權實二義經力俱成他人釋此或云七地十地等者不能顯經力用故也從智證法釋籤云意言從證者證不思議名住一切佛法證三種菩提名住慈悲普覆證寂照止觀名住成就萬行證破三惑徧名一心三智證於通無塞名住佛眼圓見證無作道滅名住法身冥益證助道萬行名住神通顯益證圓門實位名住開顯一乗證安忍內外名住嚴淨佛土證無諸法𢜤名住諸地功德此初住證轉似為真故也五眼洞照大論三十九云佛肉眼者見因緣麤色乃至亦過人所見名肉眼者見形顯色不異於人人見不遠所見又倒如近看小則大遠看大則小乃至諸色若遠觀者則但見於空一顯色大品云如來肉眼見於大千論問曰如來何故但見大千答若佛肉眼應過大千但以風輪為隔障故不見異界據理盡說佛肉眼見法界麤色天眼者如微塵名為細色諸天天眼下不見上梵王不過見於大千佛見過此名佛天眼大品云佛告須菩提佛天眼見於尼吒亦見十方恒沙世界死此生彼及善惡等論無修相如那律緣亦是其事言過天者諸天報得極如梵王今見十方尚過那律何况梵王是故淨名正呵那律旁折梵王慧眼者言如二乗所見者且約次第一徃而說據理亦應云過二乗二乗但見大千之內麤細色空佛見法界假中俱空大品云云何名菩薩摩訶薩慧眼淨佛告舍利弗慧眼菩薩不作是念有為無為世出世漏無漏一切知見論云肉眼見不遠故修天眼天眼虚誑故求慧眼論文既云一切知見是故即是過二乗也法眼者但云如菩薩所見者如別菩薩行向位中所見者是亦寄次第故云假名假名即是十六門法據理亦應云過菩薩任運真化究竟藥病名佛法眼大品云云何名菩薩摩訶薩法眼佛告舍利弗法眼人者隨信隨法三空五根此業此果受某身生某處某菩薩退不退得記不得記等皆當知之論云菩薩摩訶薩初發心時雖得肉天慧眼等以見眾生種種不同云何能得如是實法故求法眼引導令入故名法眼佛眼者但云見法實相從勝為名大品云云何佛眼佛告舍利弗菩薩摩訶薩求佛道時入金剛三昧得一切種智成就力無所畏十八不共知一切法云云是名菩薩摩訶薩得菩提時佛眼淨相論云有人言十住菩薩得佛眼與佛無別如徧吉文殊具佛功德而不作佛廣度眾生是故生疑故說佛眼徧見十方是菩薩於餘菩薩名大於佛猶不徧知徧聞等也斷最後窮源微細無明起信論云如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心性即常住名究竟覺道窮妙覺位極於茶妙玄云妙覺地者究竟解脫無上佛智故言無所斷者名無上士此即三德不縱不橫究竟後心大涅槃也一切大理大誓願大莊嚴大智斷大徧知大道大用大權實大利益大無住大即前十觀成乗圓極竟在於佛過茶無字可說云云故盧舍那佛名為淨滿一切皆滿也妙宗云究竟者始覺道窮本覺理極本始既冺無以名焉強稱妙覺大品般若四十二字字字互具諸位功德南嶽用對圓頓教中四十二位初住阿字中四十字對至等覺最後茶字當於妙覺今此極位乃究竟具諸功德云云無上士觀經䟽云次約喻稱嘆如十五日月圓滿具足眾星中王最上最勝威德特尊是名究竟佛義次以例諸號明難說佛有無量德應有無量號舉一蔽諸華嚴有萬號又經有萬號三世諸佛通有十號淨名三號以刦壽說不能盡何况諸號耶弒無明父斷貪𢜤母楞伽云云何五無間業所謂弒父母及害羅漢破壞眾僧惡心出佛身血云何眾生母謂𢜤更受生貪喜俱如緣母立無明為父生入處聚落斷二根本名害父母彼諸使不現如鼠毒發諸法究竟斷彼名害羅漢云何破僧謂異相諸隂和合積聚究竟斷彼名為破僧不覺外自共相自心現量七識身以三解脫無漏惡想究竟斷彼七識身名為惡心出佛身血境智寂滅四念處云能觀之智照而常寂所觀之境寂而常照境寂智亦寂智照境亦照一相無相無相一相即是實相實相即一實諦亦名虚空佛性亦名大涅槃如是境智無二無異如如之境即如如之智智即是境說境及智處皆名為般若隱前三相文句約四教釋佛佛者覺也身長丈六壽八十老比丘像三藏佛自覺覺他𢃄老比丘現尊特身通教佛自覺覺他單現尊特坐蓮華臺受職別教佛自覺覺他隱前三相等即圓佛自覺覺他妙樂云若隱前三相從勝而說非謂太虚而為圓佛別佛既云單論即是隱前二相如目連不窮其聲等若法華已前三佛離明隔徧小故來至此經從劣辯勝即三而一他迷一家所明四佛者以棄舊譯經論故也如四階成道三乗共位瓔珞賢聖華嚴融門此四成道不可孱齊以由設迹不同隱實覆本故開權顯本方曰不殊六即輔行云一顯圓銓諸法事理不二一切凡聖生佛體同免生退屈故明即字雖全體是迷悟因果其相有殊免生上慢故明六字二革文字暗禪之𡚁文字法師封文滯義唯守名相推功上人自甘退屈謂為絕分為此等故云全體即是暗證禪人撥棄修行唯云即心是佛不辯階位淺深多濫上聖起增上慢為救斯𡚁故明六位雖迷悟真似乍分當處無非理性本具故即不妨六六不妨即一一無異故事造三千始終不正由迷解當處點即也六種即名皆是事理體不二義妙宗云六種即名皆是事理體不二義而事有逆順名字等五是順修事唯理性一純逆修事此逆順事與本覺理體皆不二其逆順名自何而立以知不二事皆合理名之為順其不知者事皆違理故名為逆名字等五若淺若深皆知皆順若初理即唯迷唯逆而迷逆事與其覺理未始暫故名即佛世間常住妙宗云世本代謝而言常者以一切法即真實性性不改故故名為常若謂遷流不得言常斯謂情見良以生法即性故常住異滅法即性故常即性之常非常非無常不可思議言偏意圓故可得云一生一滅無非中道唯生唯住唯異唯滅無情佛性金剛錍云無情佛性惑耳驚心今且以十義評之使於理不惑餘則例之一者約身言佛性者應具三身不可獨云有應身性若具三身法身許徧何隔無情二者從體三身相即無時暫離既許法身徧一切處報應未嘗離於法身况法身處二身常在故知三身徧於諸法何獨法身法身若徧尚具三身何獨法身三約事理從事則分情與無情從理則無情無情別是故情具無情亦然四者約土從迷情故分於依正從理智故依即是正如常寂光即法身土身土相稱何隔無情五約教證教道說有情與非情證道說故不可分二六約真俗真故體一俗故分二二而不二思之可知七約攝屬一切萬法攝屬於心心外無餘豈復甄隔但云有情心體皆徧豈隔草木獨稱無情八者因果從因從迷執異成隔從果從悟佛性恒同九者隨宜四句分別隨順悉檀說益不同且分二別十者隨教三教云無圓教徧有又淨名云眾生如故一切皆如如無佛性理小教權教權理實亦非今意又若論無情何獨外色內色亦然故淨名云是身無知如草木瓦礫若論有情何獨眾生一切唯心是則一塵具足一切眾生佛性亦具十方諸佛佛性唯色唯聲四念處引天親唯識論唯是一識復有分別識無分別識分別識者是識識無分別者似塵識一切法界所有瓶衣車乗等皆是無分別識龍𣗳云一切法趣身念處即是一性色得有分別色無分別色分別色如言光明即是智慧也無分別色即是法界四大所成皆是無分別色是色心不二彼既得作兩識之名此亦作兩色之說若色心相對離色無心離心無色若不得作此分別色無分別色云何得作分別識無分別識耶若圓說者亦得唯色唯香唯聲唯味唯觸唯識若合論一一法皆具法界諸法等故般若等貧女寶藏力士額珠妙宗云初引大迦葉品云眾生即是佛何以故若離眾生不得三菩提故如來性品我者即是如來藏義一切眾生悉有佛性即是我義如是我義從本已來常為無量煩惱所覆是故眾生不能得見如貧女人舍內多有真金寶蔵家人大小無有知者時有異人善知方便乃至即於其家掘出金藏又云譬如王家有大力士其人眉間有金剛珠與餘力士捔力相撲而彼力士以頭觸之其額上珠尋沒膚中都不自知是珠所在其處有瘡即命良醫欲以療治乃至時醫執鏡以照其珠在鏡中明了顯現如來藏經十喻彼經十文一法九喻一是所喻九是能喻以所從能故云十喻一法者經云佛告金剛慧菩薩我以佛眼觀一切眾生貪瞋癡諸煩惱中有如來智如來眼如來身結跏趺坐儼然不動善男子一切眾生雖在諸趣煩惱身中有如來藏常無染污德相具足如我無異於此文後即舉九事以喻其法一萎華佛身喻二巖峰淳密喻三糠糩粳米喻四糞穢真金喻五貧家寶藏喻六庵羅內實喻七𡚁帛金像喻八貧女貴胎喻九焦模鑄像喻𡚁帛者經偈云譬如持金像行詣於他國以穢𡚁物棄之在曠野天眼見之者即以告眾人去穢現真像一切大歡喜我天眼亦爾觀彼眾生類惡業煩惱纏生死僃眾苦又見彼眾生無明塵垢中如來性不動無能毀壞者土模者經偈云譬如大冶鑄無量真金像愚者自外觀但見焦黑土鑄師量已冷開模令質現眾穢既已除相好劃然現我以佛眼觀眾生類如是煩惱淤泥中皆有如來性闇室下涅槃經云如暗室中井及種種寶人亦知有闇故不見有善方便燃大明燈照之得見是人終不生念是水及寶本無今有涅槃亦爾本自有之非適今也大智如來以善方便然智慧燈令諸菩薩得見涅槃須知諸喻理兼圓別若言三障定覆佛性破障方顯此猶屬別若全性成障障即佛性以不思議德障消者則諸喻皆圓方是今文理即之喻三障理全是佛金光䟽云凡明觀法初多就易易處觀成無難不曉大師得意故以惑業苦三皆是三因佛性三障輪𢌞之法謂實則三障確爾情虚則三德圓融於三德境不損毫微此三修惡乃名性三全為妙境即惑業苦一一通徹法界邊底是名三道欲顯此三圓融義故名從勝立故云法身般若解脫但轉其名不轉其體其實秪是當體通徹耳相似即妙宗云相似即是菩提者以其逾觀逾明逾止逾寂如勤射隣的名相似觀慧一切世間治生產業皆與實相不相違背所有思想籌量皆是先佛經中所說如六根清淨位中說圓伏無明名止似中道慧名觀喻始似本起信論云本覺義者對始覺義說以始覺者即同本覺始覺義者依本覺故而有不覺依不覺故說有始覺稱隨分覺起信論云又以覺心源故名究竟覺不覺心源故非究竟覺此義云何如凡夫人覺知前念起惡故能止後念令其不起雖復名覺即是不覺故如二乗觀智初發意菩薩等覺於念異念無異相以捨麤分別執着相故名相似覺如法身菩薩等覺於念住念無住相以離分別麤念相故名隨分覺如菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心性即常住名究竟覺修善修惡性善性惡詳解中問修性善惡其相如何答性具佛界為性善性具九界為性惡修中佛界為修善修起九界為修惡四明云本具三千為性善性惡緣起三千為修善修惡文問緣起三千為修善修惡則三千法體不可斷破指要云煩惱生死既是修惡全體即是性惡法門故不須斷除及轉也若云不斷別行玄又云闡提斷修善盡佛斷修惡盡北峰曰今言斷者約即論斷四明云障體即德無障可論斯為斷義文
