body:
  text: 令生事善故作是說妙玄云今明漸道之初即三藏教教云求佛當三阿僧祗劫修六度行百劫種相乃可得佛欲令生事善故作是說欲求佛者改惡從善善立教廢即便破曰豈有菩薩不斷結惑而得菩提毒器不任貯食此教即廢雖修性念處而不斷結四教義云生𫥢率院天者捨閻浮之報上生此天為諸天師在於此天用三種念處修八勝處為欲伏結清淨下閻浮提神通變化降伏天魔四辨說法破諸外道及一切衆生也此猶屬中忍之位問曰菩薩何意從初發心伏結至此伏而不斷耶答曰若斷結即不得受生化物觀無常伏結令諸煩惱脂消用清淨心修行六度令諸功德肌長也無脂肥羊輔行引大論云此菩薩雖有上妙五欲不生貪著以有無常等觀故譬如有王有一大臣自覆藏罪王欲罰罪語言若得無脂肥羊當赦汝罪大臣有智繫一羊養以水草日日三時以狼怖之羊雖得養肥而無脂王問云何得爾答以上事菩薩亦爾見無常空狼令結使脂消而功德身肥會釋二論斷伏不同輔行云三十四心者今取論意與諸經論明斷少別大論中云下地諸惑因時未斷至樹下時乃以九地九品思惑通名一九故云三藏菩薩位同凡夫以九無礙九解脫合為十八見道中八忍八智合為十六心總前合為三十四心俱舍婆沙意云下八地惑修初禪時先以斷竟唯非想地九品見思全在用九無礙九解脫以根勝故不復更修下八地定不同聲聞亦異緣覺此與俱舍不同什公翻譯及龍樹意俱不應誤不同意者今且以一意消通令二論理齊俱舍取修禪時已斷惑竟不復更斷智論依餘部雖有漏斷未名為斷至菩提樹但斷非想八地俱得名為無漏但是從部得名不同故使二論用義不等證四真諦方斷塵沙別行玄云言三十四心正習俱盡者頓證羅漢及以支佛亦三十四心無間而得但不以此頓盡正習一言於習有見思習及塵沙習菩薩修學塵沙法門治其劣慧於一一門用四諦觀伏其正使於一一門六度行熏見思習故樹王下三十四心於塵沙法上證四真諦故令正使及二習氣俱時而盡故能二諦皆究竟也方異三乘弟子遍彰佛眼佛智十種小劫法𢿘云一時二年三月四半月五日六夜七剎那八怛剎那九臘縛十目呼剌多拂石芥子劫輔行引金光明云梵天三銖天衣三年一拂拂盡畟方四十里石以為小劫八十里盡以為中劫百二十里盡名為大劫不於如此劫𢿘修學不名菩薩又云有一里劫二里劫乃至萬里劫又云有大方城周四十里滿中芥子不槩令平百年取一盡名為劫經劫無𢿘名阿僧祗從古釋迦緣四教義云發菩提心者如釋迦牟尼菩薩於過去世為師值釋迦牟尼佛供養彼佛又見彼佛智慧第一弟子名舍利弗神足第一弟子名目犍連多聞侍者名阿難爾時陶師供養佛已即便發菩提心作是誓願願未來世我得作佛還名釋迦牟尼智慧弟子名舍利弗神足弟子名目犍連多聞侍者還名阿難佛可其願從是初發菩提心即慈悲四弘誓願發也不生三惡道位不退等文句云約位行念論不退應四句分別不生三惡道位不退不生邊地諸根完具不受女身即行不退當識宿命即念不退具此名阿鞞跋致地三藏義也若六心已前輕毛菩薩信根未立其位猶退七心已上從初地至六地不退為凡夫二乘名位不退雖正使已盡而未能遍修萬行其行猶退至七地名行不退而猶起二乘念故有念退至八地道觀雙流入法流水名念不退此名阿鞞跋致此乃三乘共十地之義耳地師云十住是證不退十行是位不退十回向是行不退十地是念不退此是別教義若華嚴明初住得如來一身無量身具三不退此圓教不退此是一實事妙樂云第三祗橫得三不退故離五障時三義俱得即是第三僧祗通至百劫通是三不退也至此名為上忍故既云斷惑故知通佛行因之相妙玄云迹因多種或言昔為師值先釋迦佛三事供養藉草然燈石密漿發口得記父母名字弟子侍人皆如先佛即是初阿僧祗發心既不明斷惑知是三藏行因之相也或言昔為摩納值然燈佛五華奉散布髮掩泥躍身虗空得無生忍佛與受記號釋迦文大品亦云華嚴城內得記義與此同竝云斷惑故知通佛行因之相也或言昔為寶海梵志刪提嵐國寶藏佛所行大精進十方佛華供養既為寶藏佛父又是彌陀之師稱其功德不可思議故知別圓行因之相三祗等義輔行引俱舍云於三無𢿘劫各供養七萬又如次供養五六七千佛釋曰初僧祗初供養七萬五千佛二僧祗七萬六千三僧祗七萬七千頌曰三無𢿘劫滿逆次逢勝觀然燈寶髻佛初釋迦牟尼釋曰第一僧祗值釋迦牟尼第一僧祗滿值寶髻佛第二滿值然燈佛第三滿值勝觀大論第二僧祗名𦋺那尸棄第三名毗婆尸者彼此音異種相不拘前後輔行云初種何相答有云初種足下平初安立故然後種餘相有云紺眼先以大悲視衆生故雖有此語義不必然合時便種理無前後福義多途輔行云一思多思答一思種一相一相用百福問幾許為一福答有云輪王於四天下自在為一福有云如帝釋於二天自在為一福有云乃至六天有云除補處餘一切人所有為一福有云大千衆生共為一福有云大千衆生盲能治得差為一福有云大千人服毒治得差為一福有云大千人死救得為一福有云一切人破戒見能為說法令捨是事為一福有云無可譬菩薩入第三祗心思大行種相因緣故福無量唯佛能知論二十二云菩薩修十善各有五心六度滿相輔行云六度行者菩薩修此六度各有滿時初言檀滿者如釋迦菩薩本作王名毗尸得歸命救護陀羅尼視諸衆生如母𢜤子是時天帝知命將終求佛問疑遍求不得卻還天宮愁憂苦惱時天巧師名毗首羯磨問天主言何以愁惱答言我求一切知人而不能得毗首言有大菩薩滿足六度不久成佛天主偈答菩薩發大心魚子菴羅華三事因時多成果時甚少毗首答言優尸那種六度滿足不久成佛帝釋言當往試之是菩薩不汝作鴿我作鷹汝便詐怖入王腋下毗首言是大菩薩云何以是事惱之釋云我亦無惡心如真金須試即如所說變入王腋舉身戰懼動目作聲衆人皆言是王大仁慈一切宜救護如是鴿小鳥歸之如入舍菩薩相如是作佛必不久是時鷹在近樹而語王言還我鴿來王言我前受此鴿非是汝前受我先發願度一切衆生鷹言欲度一切衆生我非一切衆生耶而何奪我食王言汝須何食我先作誓若有衆生來歸我者必救護之鷹言我須新肉熱血王云無不由殺得之云何殺一與一思惟心定而說偈言是我此肉身恆受老病死不久當臭爛彼須我當與持刀自割股肉而授與之鷹言須逐道理令輕重等勿見欺也王言持稱來稱鴿如言稱之鴿身轉重王肉轉輕乃至身盡諸臣親戚卻諸看人王今如此無可看也王言任看若有成佛道當忍此大事王以血塗手攀稱欲上盡對於鴿鷹言何用如此以鴿還我王言喪身無量今是求易佛道之時肉盡筋斷欲上而墮乃自責言汝須堅固勿得迷悶衆生墮憂海應救護之何為懈怠尚不及地獄之苦十六分一我特精進猶患此苦何況地獄中無有智慧者時諸天讚言為小鳥能爾時天地六動海水揚波枯木生華天雨香水諸佛來讚必成佛也鷹與鴿言是真菩薩毗首言天主汝有神力可令彼平復釋言不須我也王自作誓感發一切帝釋語王言心不惱耶王言我心歡喜不惱不沒釋云誰當信汝菩薩言若心不惱以求佛道者使平復如故語已平復人天見之皆大悲喜歎未曾有必當作佛我當供養尸滿相者如須陀摩王是王精進常依實語欲入園遊戲始出城門有一婆羅門來從我乞云王是福德人愍我貧窮王言須待我還適至園中有兩翅鳥王名曰鹿足與山神共誓取一千王已得九百九十九王唯少須陀摩王從空飛來捉將王去諸女號哭哀動一園鹿足捉王至所住處置諸王中須陀摩王涕零如雨鹿足言大剎利汝何啼泣猶如小兒人生有死合會有離須陀答言我不畏死自恨生來不曾妄語而今失信許婆羅門行施辜負宿心自招欺罪是故啼耳鹿足言還去七日施竟便就死若不來者我有力取王還恣心布施立太子為王大會人民王乃謝云我智不周小不如法當見瞋怒我今身非己有當去人民親戚留之願王留意垂蔭此國勿以鹿足鬼王為慮也當設鐵舍奇兵衛護鹿足雖神而不畏之王說偈言實語第一戒實語升天梯實語小人大妄語入地獄我今守實語寧失身壽命於是發去至鹿足所見來歡喜汝實語人不失信要人皆惜命脫竟還來汝是大人時須陀王廣讚實語呵責妄語鹿足聞之信心清淨語須陀言汝能說此今相放捨諸王各還本國如是語已諸王各去云云忍成相者如羼提仙人在於林間修行忍辱時柯利王將諸綵女入園遊戲飲食訖已王少睡息諸女采華於其林間見此仙人加敬禮拜在一面立爾時仙人為諸女人讚歎慈忍其言美妙聽者忘厭久而忘去王眠覺已不見諸女拔劒逐蹤見女在於仙人前立嫉妬隆盛恚目奮劒而擬仙人汝作何事仙人答言我修慈忍王言我今試汝當以利劒斬截手足及以耳鼻若不瞋者乃知修忍仙言任意王即拔劒截其手足及以耳鼻而問之言汝心動不答言我修慈忍心不動也王言汝一身在此無有勢力雖口言不動誰當信者是時仙人即作誓言若我實是修慈忍者血當為乳即變為乳王大驚走將諸綵女而去時林中龍神為此仙人雨雷電霹靂王毒害遂不還宮精進滿相者如好施太子求如意珠如第一卷末得珠墜海而抒大海正使筋骨枯盡終不懈廢誓得如意以給衆生濟其身苦諸天問之答云生生不休諸天見此精進助其抒海海水減半諸龍見海水減恐海乾竭珠與之禪滿相者如螺髻仙人名尚闍𥠖有人畫像作僧形者非得第四禪出入息斷坐一樹下兀然不動鳥見不動謂之為木即於仙人髻中生卵仙人定起覺其頂上有於鳥即自思惟我若起行鳥母永不復來鳥必壞即更入禪定至鳥子飛去爾乃起行般若滿相者如劬嬪大臣分閻浮提地以為七分城邑聚落皆使均等為息諍故三十二相法界次第云今此三十二通云相者相名有所表發攬而可別名之為相如來應化之體現此三十二相以表法身衆德圓極使見者𢜤敬知有勝德可崇人天中尊衆聖之王故現三十二相也一足下安平如奩底二足下千輻輪相三手足指長勝餘人四手足柔軟勝餘身分五手指合縵網勝餘人六足跟具足滿好七足趺高好根相稱八如伊尼延鹿王腨纖好九立手摩膝十藏相如馬王十一身縱廣等十二一一毛孔生青色柔軟十三毛上向青色柔軟右旋十四金色光其相微妙十五身光面各一丈十六皮膚薄細滑不受塵水不停蚊蚋十七兩足下兩手兩肩項中七處滿十八兩腋下滿十九身上如師子二十身端直二十一肩圓好二十二四十齒具足二十三齒白淨齊密而根深二十四四牙最白而大二十五頰車如師子二十六咽中津液淂味中上味二十七舌大薄覆面至髮際二十八梵音深遠如迦陵頻伽聲二十九眼色如金精三十眼𮋵如牛王三十一睂間白毫相如𫥢羅綿三十二頂肉髻成道樹已前四波羅密滿輔行云此中明三祗百劫與俱舍小異俱舍則道樹已前四波羅密滿至佛果位二波羅密滿故頌云但由悲普施被折身無忿讚歎底迦佛次無上菩提六波羅密多於如是四位一二又一二如次修圓滿初一謂布施次二謂戒忍次一謂精進次二謂禪智如次對四句由讚歎底迦其超九劫故從毗婆尸佛九十一劫禪智二波羅密滿若凖大論三阿僧祗六波羅密滿不相違耶亦無相違大論三僧祗但是事禪智滿耳若至樹王下亦是緣理禪智始滿俱舍云因時已斷八地惑者既未斷有頂但用有漏故大論沒前有漏之名至樹王下方云用三十四心斷三界見修之惑故知爾時方得無漏今文且以大論所斥立三藏菩薩義故且存之名為伏道彌勒值佛必有超劫別行玄云若爾則無百劫義答任此法門則有百劫以精進力傳超住此法門者若任運行於六度法門則須百劫此據常途理𢿘而言若精進功倍亦何局於時分八相四教義云一𫥢率天下者菩薩將欲下生時用四種觀人間一觀時即是人壽百歲是佛出世之時二觀土地諸佛常依中國生迦維羅衛即是百億日月之中也三觀種姓生二種姓中一剎利姓勢力大故二婆羅門姓智慧大故釋迦牟尼佛生剎利姓也四觀生處何等母人能懷那羅延力菩薩唯中國迦毗羅婆淨飯王后能懷後身菩薩如是思惟已從𫥢率天下問何故作白象形非餘二明處胎即是正慧入母胎一切衆生邪慧入母胎菩薩憶念不失故名正慧入母胎中住則知中入胎時知入胎歌羅邏時知歌羅邏七日赤白精血合安浮陀時二七如繭狀伽陀時三七日如凝酪五胞時出生時皆憶念不失是名正慧入母胎復次餘人住中欲受生時於父母所生顛倒心生不淨心菩薩不爾正慧明識父母相續入胎是明正慧也三明出胎相者是菩薩滿足十月正慧不失從右脅而出胎生墮於地即行七步口自發言天上天下惟我為尊當初生時國內即有三十二瑞事在瑞應經具明乃至將示相師阿夷相太子具三十二相八十種好即便悲淚王恐不祥問阿夷曰我子不祥故悲淚耶仙人答曰吉無不利太子相好分明其若在家當作轉輪聖王飛行皇帝王四天下十善化世其若出家必成自然之佛度脫萬姓但太子相好分明必不在家作轉輪聖王其若出家必得菩提度脫天人傷吾年老不覩佛興故悲淚耳所以用三十二相八十種好莊嚴其身欲為得三菩提之品器也問何故現相三十二好有八十答成佛莊嚴法如此故四明出家者是菩薩年漸長大出四城門見老病死苦厭怖心生夜半踰城出家六年苦行食難陀婆羅門石密乳糜益身十六功德五明降魔相者即於菩提樹下破萬八千億鬼兵魔衆魔王敗績鬼兵退散六成道相者魔衆散已攝心端坐於第四禪住中忍修觀成中忍一剎那上忍一剎那世第一法一剎那發真無漏三十四心得阿耨多羅三藐三菩提三十四心者八忍八智九無礙九解脫也具足佛十力四無所畏十八不共法三達無礙三意止大慈大悲四無礙智一切諸法總相別相悉知故名為佛第九解脫具足一切種智竝在未來故名小乘佛七明轉法輪者於鹿野苑為拘鄰五人三轉生滅四諦法輪天人得道此為證三寶於是現世間次說十二因緣法輪次為菩薩說六波羅密法輪是則開三乘之教名修多羅藏十二年後佛在毗舍離國為須鄰那迦陀長者子作淫欲以是因緣結初大罪二百五十戒次佛在舍婆提城告諸比丘諸有五怖五罪五不除不減是因緣故作此世未來受無量苦是名佛自說毗曇教從此轉三藏法輪乃至涅槃教三乘弟子是名轉法輪也八明入涅槃相者於拘尸那城娑羅雙樹間逆順出入超越三昧於第四禪中入火光三昧燒身滅度唯留舍利為人天福田身智俱滅入無餘涅槃是為聲聞經中說大乘之位也止觀云三藏初伏四魔坐道場破煩惱魔得菩提道又得法性身破入魔此兩共破死魔道樹下得不動三昧變三玉女破八十億兵冠蓋劒各墮者是破天子魔輔行釋云具如大集云天主初令諸軍次遣太子次遣三妃皆不能壞後自領軍為佛所降大軍退敗王顛倒墮冠蓋劒三各在一處此竝大論第六文也三轉十二行法輪文句云十二行者一約四諦教二約十六行教十二者即示勸證是也行十二者三轉皆生眼智明覺又教十二為能轉行十二為所轉十二行是輪十二教非輪若作二輪義眼智明覺者約四十八法開此四心成十六心謂苦法忍為眼苦法智為智比忍為明比智為覺餘三諦亦爾故成十六心三根人各得十六心故成四十八行也十二諦是教法輪十二行是行法輪教輪則能轉唯是一權智所轉則有十二教也若行法輪能轉之教十二所轉之行亦十二或約三人或約一人今就見諦道三人利根聞示轉即生眼智明覺三人合舉故言十二也記釋云初文中云十二行者四諦各用示等為教一轉各生眼等為行言能所者四皆佛說故云能度入彼心故云所言是輪非輪者輪以摧碾為義唯教無行豈能摧惑若不摧惑亦無輪名佛知機知時亦不無行而徒轉也今言非者教從化主行從受者是故行輪從受者得功歸化主故從佛得以未盡理故重釋之若作二輪教行相循共能摧惑況復教行俱由佛轉是故教行俱得名輪但眼智等無別體故還指忍等故眼等行約於諦教而成十六故三根人聞三轉教各生眼等成四十八寬狹中云教輪等者是化他智但屬一祕則能轉惟一所轉十二則能轉名狹體寬所轉名寬體狹行法輪者教是能詮行是所詮故行隨教竝有十二雖俱十二寬狹則異教定十二行生眼等若以示等生於眼等數同名異次辨通別中所言或者不定辭也或三人各聞三轉或一人前後聞三初雖別簡今就下正釋初轉法輪得見諦解三乘之人方有十二度三根性文句云問初為五人云何作三根耶復有八萬諸天何故無三根為生三慧三根三道故記釋云問初為等者既云聲聞自有三根五人竝是聲聞根性既具三根復有諸天何意無三為生下答人天通有三義故謂慧根道聞等不同是三慧悟有前後即三根見修無學即三道色無色般義準亦有但非因轉法輪得耳老比丘妙樂云老比丘者從後異故以通教佛亦可言老而云𭘧者辨異前教三百由旬文句云三界果報處為三百有餘國處為四百實報國處為五百見惑為一百五下分為二百五上分為三百塵沙為四百無明為五百入空觀能過三百入假觀能過四百入中觀能過五百諸般若有二乘得道四教義云通者同也三乘同稟故名為通大品經云欲學聲聞乘者當學般若欲學緣覺乘者當學般若欲學菩薩乘者當學般若三乘同稟此教見第一義故云通教通有三義四念處云通義有八謂理教智斷行位因果理通者同緣即色是空故教通者同稟無生之說故智通者諸法不生般若生故斷通者須陀洹若斷同是無生法忍故行通者同乘摩訶衍乘故位通者同是乾慧地乃至佛地故因通者同學般若波羅密故果通者同到薩婆若故三人八義不殊故名通也復次通有三義一因果皆通二因通果不通三通別通圓因果俱通者如上八通說近通偏真四枯拙度因通果不通者乃是別果來接通因得見佛性成四榮雙樹通別通圓者別圓因果皆與通異藉通開導得入別圓因成非枯非榮雙樹之果也若通因果正是小大半滿分門亦是析體拙巧聲聞藏菩薩藏羊鹿異路何者三藏未斷惑猶是凡夫住下忍位伏見思惑以誓願乘五通住生死化衆生二乘斷正使拙度保涅槃不能前進故從此分門若三人同以無言說道斷煩惱者是滿字摩訶衍門多此含容藉通開導捨遺記云第三藉通開導者即於乾慧及性地中聞體法空不但空於二十五有亦乃空於涅槃之空此人雖藉通教談空開導其心而了此空體是中道乃以別圓內外凡觀同於二乘歷乾慧及後諸地至十地即成別圓初地初住八相之佛此乃通教通別通圓義也既在初地便知不空是故不受被接之名總相別相等智玄義云通教聲聞總相一門達俗即真緣覺能於一門總相別相達俗即真菩薩能於四門總相別相達俗即真又能遍四門出假教化衆生籤云聲聞緣覺於一門總相等者總謂但作苦集觀耳別謂觀苦七支觀集五支以自行故但依一門菩薩為他故於四門然七地前約自行邊亦但一門入假方便亦須遍習當教三乘共位止觀云乾慧地正是三賢位一五停心二別相念處三總相念處通是外凡故言乾慧地性者即是四善根位以總念處力發善有漏五名為暖增進初中後心得入頂忍世第一法通名內凡故言性地此兩位共伏見惑八人者八忍也從世第一轉入無間三昧故名八人見者見真斷三界見惑八十八使皆盡故言見地薄者除欲界思惟六品故名薄地離欲者除欲界九品盡故言離欲已辦者除色無色七十二品盡如火燒木為炭故言已辦地辟支弗者福慧深利道觀雙流斷習氣及色心無知得法眼道種智遊戲神通淨佛國土學佛力無畏等法殘習將盡如餘少灰佛地者大功德資利智慧得一念相應慧習氣永盡如劫燒火無炭無灰此即三乘共十地斷思惑之位也三乘共借一教玄義四下云別名者即是十信三十心十地之名也鐵輪位於通義即是乾慧地伏忍也三十心即望性地柔順忍八人見地即是初歡喜得無生忍也故大品云須陀洹若智若斷皆是菩薩無生忍薄地向果向即離垢果即明地大品云斯陀含智斷是菩薩無生忍離欲地向果向即𦦨地果即難勝大品云阿那含智斷是菩薩無生忍已辦地向果向是現前果是遠行大品云阿羅漢智斷是菩薩無生忍支佛地即不動侵習也大品云支佛智斷是菩薩無生忍即是善慧地十地當知如佛也菩薩借別一教止觀云四借別名名通家菩薩位者乾慧是外凡性地是內凡八人為初地十五心為二地十六心為三地此三皆不出觀而斷見惑四忍為初地四智為二地四比忍為三地四比智為四地皆不出觀而斷見惑薄地即五地斷六品思離欲即六地斷九品思已辦即七地斷色無色思支佛即八地乃至佛地斷習無知玄義云問初地至七地對果出何經論答經論非不對當但高下不同人師對之異或用見地止對初地如今所用或向取初三地併對初地仁王明四地併對初地此難定判但通教見地本是無間之道不出觀證須陀洹豈得初地斷見乃至三地或云四地耶若斷別惑不共二乘此義有之又或言六地斷結齊羅漢或云七地此難定執前後兩果經論對皆不定中間可以義得今以義推不可定執也別為菩薩立忍名玄義云初就三乘共位中菩薩別立忍名而義通二用別教名名別義通通義已如前說別立者別為菩薩立伏忍柔順忍無生忍之名也乾慧地三人同伏見惑而菩薩更加伏忍之名者菩薩信因緣即空而於無生四諦降伏其心起四弘誓願雖知衆生如虗空而發心度一切衆生是菩薩欲度衆生如欲度虗空故金剛般若云菩薩如是降伏其心所謂滅度無量衆生實無衆生得滅度者次三誓願降伏其心亦如是是為菩薩在乾慧地修停心別相總相念處觀時異於二乘故別稱伏忍復次三乘人同發善有漏五生相似解皆伏見惑順第一義而菩薩獨受柔順忍名者菩薩非但伏結順理又能為一切衆生伏心遍行六度一切事中福慧皆令究竟如三藏菩薩於中忍中三僧祗行六度不惜身命今菩薩亦如是以空無相願調伏諸根為衆生故滿足六度故名順忍也復次三乘人同發真無漏若智若斷同名無生而菩薩獨受無生法忍名者以其見諦理斷結使不生取證之心別受無生法忍之名也三處初𦦨玄義云問大論三處明初𦦨約別圓皆取發真為初𦦨通教何意取乾慧為初𦦨答別圓各逗一種根性餘如文云云又輔行云大論三處燋炷者意引乾慧別在菩薩斷惑之位若共二乘不名初𦦨初𦦨即是斷位故也論別立菩薩故以初地而為斷位故大論七十八燈炷品云十地有二一菩薩初地為初𦦨二聲聞見地為初𦦨若獨菩薩地即歡喜地為初𦦨論文既以菩薩初地而為初𦦨故今取之以為況釋於共伏道尚得以為菩薩初𦦨今但退取共斷位者為獨菩薩初𦦨有何不可故知此文別判通教菩薩位也三地據斷見初四地據斷見後止觀云別名名通家共位者舊云三地斷見或言六地斷思盡或言七地斷思盡今核此語若云三地四地皆斷見者此師不解通教義何者三乘共位同入無間三昧不出入觀而斷見那忽用三地四地皆斷見耶若但取第三地斷見者第四地應斷思若但取第四地斷見者第三地應未斷見若用兩地斷見為出入觀非斷見位人師救云經說如此此師不解經意今言經借別義顯通耳別見義長論三地四地通見義短不出入觀然名可借別義必依通若作不入出觀釋者若言三地者據斷見初言四地者據斷見後皆不出觀例如第十六心或言是見道或言是思道通雖二地斷時仍促等輔行云問當通教中判斷見位自分二地何須破他自立借別立斷見位還同通教答秪緣同通故得名通通雖二地斷時仍促三乘共故雖促復長是故須分三地四地或時借別別見更長仍有二意若約理說通至佛地若約教道云三四地雖二意各別見義竝長以別長故故借教道用判兩地無爽若依通義云不出觀若依別義但云地地皆能破見以此為異以別長故故後兩番通用四地皆斷見位人多不見謂通義足何須借別聲聞位齊七地輔行六云通教二乘七地已前與菩薩共名共聲聞乃至答云以初名後等三藏亦共聲聞何不立共名故又釋云三藏教中雖有二乘菩薩行遠始終伏惑永異二乘故不名共不聞別理復非不共十力法界次第云此十通名力者即諸佛所得如實智用通達一切了了分明無能壞無能勝故名力也大菩薩亦分得此智力但比佛小劣故沒不受名一是處非處力二業智力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力四無所畏法界次第云此四通名無畏者於八衆中廣說自他智斷既决定無失則無微恐懼之相故稱無所畏一一切智無所畏二漏盡無所畏三說障道無所畏四說盡苦道無所畏通教諸位妙玄明三乘共十地位一乾慧地者三乘之初同名乾慧即是體法五停心別相總相四念處觀事相不異三藏此三階法門體入界如幻如化總破見𢜤八倒名身念處受心法亦如是住是觀中修正勤如意根力覺道雖未得暖法相似理水而總相智慧深利故稱乾慧位也二性地位者得過乾慧得暖已能增進初中後心入頂法乃至世第一法皆名性地性地中無生方便解慧善巧轉勝於前得相似無漏性水故言性地也三八人地位者即是三乘信行法行二人體見假以發真斷惑在無間三昧中八忍具足智少一分故名八人位也四見地位者即是三乘同見第一義無生四諦之理同斷見惑八十八使盡也五薄地位者體𢜤假即真發六品無礙斷欲界六品證第六解脫欲界煩惱薄也六離欲地位者即是三乘之人體𢜤假即真斷欲界五下分結盡離欲界煩惱也七已辦地位者即是三乘之人體色無色𢜤即真發真無漏斷五上分結七十二品盡也斷三界事一一切智無所畏二漏盡無所畏三說障道無所畏四說盡苦道無所畏通教諸位妙玄明三乘共十地位一乾慧地者三乘之初同名乾慧即是體法五停心別相總相四念處觀事相不異三藏此三階法門體入界如幻如化總破見𢜤八倒名身念處受心法亦如是住是觀中修正勤如意根力覺道雖未得暖法相似理水而總相智慧深利故稱乾慧位也二性地位者得過乾慧得暖已能增進初中後心入頂法乃至世第一法皆名性地性地中無生方便解慧善巧轉勝於前得相似無漏性水故言性地也三八人地位者即是三乘信行法行二人體見假以發真斷惑在無間三昧中八忍具足智少一分故名八人位也四見地位者即是三乘同見第一義無生四諦之理同斷見惑八十八使盡也五薄地位者體𢜤假即真發六品無礙斷欲界六品證第六解脫欲界煩惱薄也六離欲地位者即是三乘之人體𢜤假即真斷欲界五下分結盡離欲界煩惱也七已辦地位者即是三乘之人體色無色𢜤即真發真無漏斷五上分結七十二品盡也斷三界事惑究竟故言已辦地八辟支佛地位者緣覺菩薩發真無漏功德力大故能侵除習氣也九菩薩地位者從空入假道觀雙流深觀二諦進斷習氣色心無知得法眼道種智遊戲神通淨佛國土成就衆生學佛十力四無所畏斷習氣將盡也齊此名小樹位也十佛地者大功德力資智慧一念相應慧觀真諦究竟習亦究竟如劫火燒木無復炭灰如象渡河到於邊底雖菩薩佛名異二乘通俱觀無生體法同是無學得二涅槃共歸灰斷證果處一故稱為通也布施攝衆生等淨名云當知直心是菩薩淨土菩薩成佛時不諂衆生來生其國深心是菩薩淨土菩薩成佛時具足功德衆生來生其國菩提心是菩薩淨土菩薩成佛時大乘衆生來生其國布施是菩薩淨土菩薩成佛時一切能捨衆生來生其國持戒是菩薩淨土菩薩成佛時行十善道滿願衆生來生其國忍辱是菩薩淨土菩薩成佛時三十二相莊嚴衆生來生其國精進是菩薩淨土菩薩成佛時勤修一切功德衆生來生其國禪定是菩薩淨土菩薩成佛時攝心不亂衆生來生其國智慧是菩薩淨土菩薩成佛時正定衆生來生其國等通教有合身義金光疏云丈六身佛住真諦丈六尊特合身佛雙住真中尊特身佛雙住俗中法身佛住中道此依二理故有二佛一金剛土臺成道四機所見不同文句云像法决疑經云一切大衆所見不同或見娑羅林地悉是土砂草木石壁或見七寶清淨莊嚴或見此林是三世諸佛所遊行處或見此林即是不可思議境界真實法體例知此義四見不同所住既然能住亦爾此則約教分別也八相稍異三藏文句云成道如上注釋入涅槃如後文七轉法輪權智開三藏生滅四諦法輪實智說摩訶衍無生四諦法輪通教三乘人也三種意生身楞伽云一三昧樂正受意生身二覺法自性意生身三種類俱生無作意生身三昧樂即三四五地心寂不動故也二覺法自性即八地普入佛剎故以法為自性三種類俱生謂了佛證法成之與生竝從果說此約通教及以別接初是入空位八地即當入假位種類即是入中一生實相二生法界大經佛說觀因緣智四種不同得菩提異說是語時十千菩薩得一生實相五千菩薩得二生法界章安云三乘同觀第一義智解不同一生二生乃是破無明一品二品實相是別理法界是圓理即是利根接入別圓列八二諦章安作七二諦消之釋籤云若欲憑教者然此七文散在諸經無一處具出唯大經十二四諦文後列八二諦章安作七二諦銷之初一是總餘七是別初云如出世人心所見者名第一義諦世人心所見者名為世諦疏云總冠諸諦世情多種束為世諦聖智多知束為第一義諦即是諸教隨情智也經云五和合稱名某甲是名世諦解無亦無名字離亦無是名第一義諦是實法某甲是假名即實有俗諦也無無名即假實空若離者名太虗空是故離亦無某甲及二諦名疏云名無名二諦也世諦有名真諦無名即生滅二諦經云或有法有名有實是名第一義諦或有法有名無實是名世諦幻化假名即空故實即真諦也秪指幻化但有假名故名世諦故疏云實不實二諦也真實幻化不實也即無生二諦也經云如我人衆生壽命知見乃至如毛兔等界入是名世諦苦集滅道是名真諦兔之俗與前不殊故成單俗四諦義含共為真諦即是含中真諦也故疏云定不定二諦也即單俗真俗是不定中道名定經云世法有五種謂名世句世縛世法世執著世是名世諦經文廣解於此五法心無顛倒名第一義諦五種世法名與前異大意不別亦是單俗於世無倒謂見實相教道但中雖未究竟此中究竟望前故實故疏云法不法二諦也法謂實相不法謂俗亦是含中二諦也經云燒割死壞是名世諦無燒割死等是名第一義諦地前方便皆屬無常故云可燒登地見常故無燒等故疏云燒不燒二諦也無常可燒常不可燒俗單中二諦經文有八種苦是名世諦無八種苦故是第一義八苦無常同前燒義無八苦真即是實相故疏云苦不苦二諦亦是俗單中教道有苦圓中無苦經云譬如一人有多名字依父母生是名世諦依十二緣和合生者名第一義諦依父母生即十二緣而分二者以大經中明十二緣即佛性故且據顯說即以佛性而為真諦依父母生即是無明名為世諦故疏云和合二諦真俗不二故名和合俗中二諦也後乃結云今七二諦來消此文佛㫖難知且用一師意耳七種二諦妙玄云一實有為俗實有滅為真二者幻有為俗即幻有空為真三者幻有為俗即幻有空不空共為真四者幻有為俗幻有即空不空一切法趣空不空為真五者幻有幻有即空皆名為俗不有不空為真六者幻有幻有即空皆名為俗不有不空一切法趣不有不空為真七者幻有幻有即空皆為俗一切法趣有趣空趣不有不空為真實有二諦者入界等皆是實法實法所成森羅萬品故名為俗方便修道滅此俗已乃得會真是為實有二諦相也幻有空二諦者斥前意也何者實有時無真滅真時無俗二諦義不成若明幻有者幻有是俗幻有不可得即俗而真是名幻有無二諦也通人隨智照真與前不異隨智照俗不同何者通入觀巧局照俗亦巧幻有空不空二諦者俗不異前真則三種不同一俗隨三真即成三種二諦其相云何如大品明非漏非無漏大經明空不空復次明一切法趣三人各各取解不同成三別是故說此一俗隨三真轉或對單真或對真或對不思議真若隨智證俗隨智轉智證偏真即成通二諦智證不空真即成別入通二諦智證一切趣不空真即成圓入通二諦三人入智不同復局照俗亦異云云幻有無為俗不有不無為真者有無二故為俗中道不有不無為真圓入別二諦者俗與別同真諦則異別人謂不空但理而已欲顯此理須緣修方便故言一切法趣不空圓人聞不空理即知具一切佛法無有減故言一切趣不空也圓教二諦者直說不思議二諦也真即是俗俗即是真如如意珠珠以譬真用以譬俗即珠是用即用是珠不二而二分真俗耳風流二諦止觀云通教三乘二乘體假入真秖入但空不能從空入假無化他用菩薩體假入真能從空入假化度衆生上根菩薩體假入真前入但空次入不但空則破無明見佛性與前真永別豈可同為一真諦也昔莊嚴家云佛果由二諦外得此片意而作義不成不知佛智別照何境別斷何惑若得今意出外義則成開善家云佛果不出二諦外不能動異二乘作意復不成若得此意不出義亦成古來明此為風流二諦意在此但空不但空合時秪是一真諦離時成兩真諦與三藏家異彼三藏第三諦但有中道名無別體眼無別見智無別知今則不爾第三諦亦名真諦亦名中道第一義諦有別體別見別知是為通教二諦三諦離合之相也輔行云莊嚴云出開善云不出此由三乘共學菩薩有但不但古人不曉利鈍兩根但諍佛果出與不出終未見今開合之意故使二家各朋已計今文竝破是故皆云作意不成故知二家各得今文利鈍一邊故云片意仍不能知出外別照中道之境用中道智進破無明故云片意若不能知鈍根依教與二乘人同證真諦是亦但得今文片意若全得今意出與不出義皆悉成古來名此等者任二家所說各謂幽深是非難分古來無判是故古人雙美二家名此二諦曰風流言風流者動止合儀故許出入無失於今被破出入俱非舉措失儀風流何在若依今用含中二諦進退咸美風流有餘一真含二中玄義云俗不異前真則三種不同一俗隨三真轉即成三種二諦其相云何如大品明非漏非無漏初人謂非漏是非俗非無漏是遣著何者行者緣無漏生著如緣滅生使破其著心還入無漏此是一番二諦也次人聞非漏非無漏謂非二邊別顯中道中理為真又是一番二諦又人聞非漏非無漏即知雙非正顯中道中道法界力用廣大與虗空等一切法趣非有漏非無漏又是一番二諦也大經云聲聞之人但見於空不見不空智者見空及與不空即是此意二乘謂著此空破著空故故言不空空著若破但是見空不見不空也利人謂不空是妙有故言不空利利人聞不空謂是如來藏一切法趣藏還約空不空即有三種二諦也復次約一切法趣非漏非無漏顯三種異者初人聞一切法趣非漏非無漏者謂諸法不離空周行十方界還如瓶處如又人聞趣知此中理須一切行來趣發之又人聞一切趣即非漏非無漏具一切法也寄三法以示三根解源釋籤云通寄三法以辨其相漏無漏本是通法為成接義故立雙非空不空本是別法一切法趣本是圓法於一一法各有三人取解不同者良由機發故所聞不同又通教菩薩由根利鈍發習不同故鈍同二乘直至法華方乃被會利者爾前接入中道故使同觀幻有之俗而契真各異所以別圓機發對鈍住空故成三別是以釋後二接須對通鈍共成三人同聽異聞故約漏等以示解源若得此意於一切法自在無礙四地為上六七為中八九為下輔行云通教前二地為俗後七地皆名為真除佛地別教前四十位為俗後十二位為真通教被接上根三四地中根五六地下根七八地圓接別接俗不接真即接賢不接聖三賢名俗十聖名真上根信住被接中根十行接下根十向接故云接俗聖位證道同圓故言不接不接三藏者有四義故一者接於可接三藏因拙不可接故二者得受接名方可用接謂前教有始無終已用七八不至九十即用後教有終無始但用向地不須住行中續接之故得名接三者不須接故亦不名接如初地初住已成真因亦破無明八相作佛任運流入何須更接四者得受接義謂約教分齊文中初義即此第一不可接故此第二義正當通教可接者是約證道邊唯明一接釋籤云七種二諦四正三接若止觀中為成理觀但以界外理接界外理故藏通兩教明界內理別圓兩教明界外理通別兩教是明兩理之交際是故但明別接通耳今前六重仍存教道於法華前逗彼權機故有圓接通別二義實道秪應圓理接權故釋今文應順教道復以圓中接於但中巧拙論體析止觀云所言大乘體法觀者異於三藏三藏名假而法實析實使空譬如破柱令空今大乘體意名實皆假自相是空本來虗寂譬如鏡柱本自非柱不待柱滅方空即影是空不生不滅不同實柱復次三藏所析名為隨情觀實理但隨情為真耳大乘體法名隨理色心如尋幻得幻師尋幻師得幻法亦如尋夢得眠尋眠得心尋幻色心得無明尋無明得佛性體法通理故明隨理觀對破外道汝析非正止觀破外鄰虗云此塵為有為無若有極微色則有十方分若無極微色則無十方分若析極微不盡則成常見有見若析盡則成斷見無見此外道析色也析心亦如是若有若無皆墮斷常此外道析心也論文仍明三藏析法之觀云色若粗若細總而觀之無常無我何以故粗細色等從無明生無明不實故粗細皆假假故無常無性即得入空又介爾心起必藉根塵無有一法不從緣生從緣生者皆悉無常或言一念心六十剎那或三百億剎那剎那不住念念無常是名析色心觀意析名本於外道對破邪析而明正析何但外析乃至圓四門生著亦須析破朱雀門中何妨民出入止觀引衍中云欲得聲聞當學般若者元此是菩薩法大能兼小𠊓狹聲聞譬如朱雀門天家所立正通王事不妨羣小由之出入雖通小人終是大門今摩訶衍亦如是正為菩薩體法入空雖有小乘終名為大儀注僃簡山家後學大惠集
