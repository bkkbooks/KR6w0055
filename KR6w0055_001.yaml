body:
  text: 天台輔行云天台者天者顛也云云至故以名焉又有云本名天梯謂其山高可登而升天後人訛傳故云天台又章安山記云本稱南嶽周靈王太子晉居之魂為其神命左右公改為天台山也若准孫公山賦云所以不列於五嶽闕載於常典者以其所立幽奧其路曠逈故未知章安所出西方風俗稱名為尊如子之名兼於父母佛當生彼預設斯儀使慕德稱名故也此方風俗避名為敬故以所居而顯其人此本俗名今依釋典輔行云今釋典中所言天者亦名最勝亦名光明文句四云天然自然樂勝身勝光明疏記引大經一者世間天如諸國王二者生天從四天王乃至非非想三者淨天謂四果支佛四者義天謂十住菩薩以見一法是空義故大論明三種天一假名天即世天也二生天三清淨天則兼三乘也此山即大師棲身入寂之所輔行云儀同沈君理請住瓦官開法華經題停瓦官八年講大智度論說次第禪門蒙益難紀爾後徒衆轉多得法轉少妨我自行化道可知羣賢各隨所安吾欲從吾志也吾聞天台地記稱有仙宮若息心茲嶺展平生之志于是陳太建七年秋九月從茲始入天台宣帝勑額云禪師創立天台宴坐名嶽宜號修禪云云安禪而化至五品等者此出臨終行位也不出禪定端坐取滅故云安禪而化開皇十五年自荊下鄴至十六年重入天台至十七年晉王請出至石城謂徒衆曰大王欲使吾來吾不負言而來吾知命在此故不前進於石像前口授遺書云云吾今最後策觀談玄最後善寂吾今當入於是教維那曰人命將終聞鐘磬聲增其正念唯長唯久氣盡為期云何身冷方復響磬言已跏趺唱三寶名而入三昧即其年十一月二十四日未時端坐入滅滅後祥瑞等具如別傳即是住觀行位首楞嚴定而入滅也頓等四教古師亦用妙玄云南三北七南北地通用三種教相一頓二漸三不定華嚴為化菩薩如日照高山名為頓教三藏為化小乘先教半字故名有相教十二年後為大乘說五時般若乃至常住名無相教此等俱為漸教也別有一經非頓非漸而明佛性常住勝鬘光明等是也此名偏方不定教此之三意通途共用也諸師述頓與不定不殊漸更為三云云藏等四教起自天台大師影𠊓經論立此四教也如三卷初四河入海四姓出家阿含云東殑伽河從阿耨達池銀牛口流出繞池一匝入東南海南信度河從阿耨達池金象口流出繞池一匝入西南海西縛芻河從阿達池琉璃馬口流出繞池一匝入西北海北徙多河從阿達池頗肢師子口流出繞池一匝入東北海此即此土黃河之源也四姓者一剎帝利是王種二婆羅門是淨行三吠奢是商估四首陀是農田約時破古妙玄云北地師亦作五時教而取提謂波利為人天教合淨名般若為無相教餘三時不異南方故約時破古云若言提謂說五戒十善彼經但明五戒不明十善唯是人教則非天教縱以此為人天教者諸經皆明戒善亦應人天教耶乃至云提謂長者得不起法忍豈是人天教耶又云復次釋論結集法藏初從波羅奈至泥洹夕所說小乘法結為三藏法從初生至雙樹凡說大乘結為摩訶衍藏奈苑之前不預小教攝何者爾時未有僧寶故不應用提謂為初時教也華嚴處會三十九品釋籤云龍宮三本上本十三世界微塵數偈中本四十九萬八千八百偈下本十萬偈四十八品今但有三十九品則經猶未盡舊經七處八會新譯更加普光明殿一會第一摩竭阿蘭若有六品一世主妙嚴二如來現相三普賢三昧四世界成就五華藏世界六毗盧那第二摩竭熙連河曲普光明殿會有六品一如來名號二四諦三光明覺四菩薩問明五淨行六賢首第三忉利天會說十住有六品一升須彌頂二須彌頂讚嘆三十住四梵行五發心功德六說法說令十住進後位也第四夜摩天會說十行有四品一升夜摩二夜摩讚偈三十行四無盡第五𫥢率天會說十向有三品一升𫥢率二升𫥢率讚嘆三十向第六他化天會說十地一品第七重會普光明殿說十地勝進行有十一品一十定二十通三十忍四阿僧祗五壽量明菩薩報生淨土隨時壽量六菩薩住處七不思議法明佛果德八相海九隨相光明功德十普賢行十一如來出現八三會普光明殿說六位一品謂離世間第九遊逝多林會說入法界品如是處會所明位行不出別圓但經意兼含義難分判始從住前至登住來全是圓義從第二住至第七住文相次第又似別義於七住中又辨一多相即自在次行向地又是次第差別之義又一一位皆有普賢行布二門故知兼用圓文接別昔生垂化之地大論云昔波羅奈王入山遊獵見二羣鹿數各五百各有一主一是釋迦菩薩一是提婆達多菩薩鹿王見王殺其羣鹿起大悲心直至王所不避箭矢曰王言若以供饌當差次送每日一鹿王善其言於是二主各差次送次當調達羣中有一母鹿白其主言我分當死而我懷子子非死次屈垂料理王怒曰誰不惜命次來但去母思惟曰我王無慈橫見嗔怒即至菩薩王所具白菩薩王言若我不理枉殺其子若非次差後次何遣惟我當代即自送身王怪問曰羣鹿盡耶鹿王曰大王仁慈人無犯者但有滋茂但彼羣鹿歸告於我我愍之故若非分差是亦不可若縱而不救無異木石是身不久必不免死慈救苦厄其德無量王聞是語而說偈言我實是畜獸名曰人頭鹿汝雖是畜生名曰鹿頭人以理而為人不以形為人我從今日始不食一切肉我以無畏施亦可安汝意諸鹿得安王得仁信鹿羣所居故名鹿苑譬喻一釋格他譬法不周光明玄云大師釋金光明題一譬喻二附文三當體初一順古立後二唯今義順古者蓋見古師雖用譬釋譬法不周屈此經所詮之義因茲大師同他用譬恐人疑云依文二釋既甚親切何須存譬故以被根利鈍為答鈍人不能直解三字是法性名乃以世間金有光明用比擬一切圓融三法也若依文二釋為利根人知其能譬世金光明本無名義聖則真法而作其名故云利人知即法作譬豈須以譬擬法然經所被非純利根故空品云為鈍根故起大悲心佛說茲典既被二根亦須兩說赴其利鈍勝鬘經佛降舍衛國波斯匿王遣使召女勝鬘對使說偈云如來現世間普為羣生出亦應愍我等宜速降此間未舉頭頃如來現身為說五種不法數云一祕密諸陀羅尼咒是祕密二多含薄伽梵含六義等三此方無故如閻浮樹此方無四順古阿耨菩提自古存梵音五生善般若尊重智慧輕薄圓教八義四教義云圓義略有八一教圓正說中道言教不偏也二理圓中道即一切法理不偏也三智圓一切種智圓也四斷圓不斷而斷無明惑斷也五行圓一行一切行也六位圓從初一地具足諸地功德也七因圓雙照二諦自然流入也八果圓妙覺不思議三德之果不縱不橫也如來乘如實道來成正覺文句云如來義甚多且明二三如來餘例可解二如來者成論云乘如實道來成正覺故名如來乘是法如如智實是法如如境道是因覺是果若單論乘者如如無所知單明實者如如無能知境智和合則有因果照境未窮名因盡源為果道覺義成即是乘如實道來成正覺此真身如來也以如實智乘如實道來生三有示成正覺者即應身如來也三如來者大論云如法相解如法相說故名如來如者法如如境非因非果有佛無佛性相常然遍一切處而無有異為如不動而至為來指此為法身如來也法如如智乘於如如真實之道來成妙覺智稱如理從理名如從智名來即報身如來故論云如法相解故名如來也以如如境智合故即能處處示成正覺水銀和真金能塗諸色像功德和法身處處應現往八相成道轉妙法輪即應身如來故論云如法相說故名如來也法身如來名毗盧那此遍一切處報身如來名盧舍那此淨滿應身如來名釋迦文此度沃焦是三如來若單取者則不可也華嚴後無等覺四念處釋別教中云衆經諸門列位位數增減華嚴初無十信後無等覺於十住中多明圓義於登地中多明別義華嚴經前列衆則有等覺法報不分二三莫辨妙樂云自古經論許有三身若言毗盧與舍那不別則法身即是報身若即是者一切衆生無不圓滿若法身有說衆生亦然若果滿方說滿從報立若言不離三身俱然何獨法報生佛無二豈唯三身故存三身法定不說報通二義應化定說若其相即俱說俱不說若但從理非說非不說事理相對無說即說即說無說情通妙契諍計咸失上品相好下品尊特四明云法華三十二相相相無邊亦即法身上品尊特也十六觀經八萬四千相中品尊特也華嚴樹王下丈六相現起舍那下品尊特也此約教分十華藏塵相上品相海也八萬四千相中品相海也三十二相下品相海也此約相分上品相好下品尊特此二皆是現起之相故云二現言之正當須現約二現釋三品相好境本定身輔行云一一文中皆云若見如來者皆以三藏如來而為境本於色相上四見不同故言境本定身華嚴三照涅槃五味玄籤云云何分別如日初出前照高山厚植善根感斯頓說頓說本不為小小雖在座如聾如啞良由小不堪大亦是大隔於小此如華嚴約法被緣緣得大益名頓教相約說次第名從牛出乳味相次照幽谷淺行偏明當分漸解此如三藏本不為大大雖在座多哆婆和小所不識此乃小隔於大大隱於小約法被緣名漸教相約說次第名酪味相次照平地影臨萬水逐器方圓隨波動靜示一佛土令淨穢不同示現一身巨細各異一音演說法隨類各得解恐畏歡喜厭離斷疑神力不共故見有淨穢聞有褒貶嗅有薝蔔不薝蔔花有著身不著身慧有若干不若干此如淨名方等約法被緣猶是漸教約說次第生酥味相復有義大人蒙其光用嬰兒喪其睛明夜遊者伏匿作務者興成故文云但為菩薩說其實事而不為我說斯真要雖三人俱學二乘取證具如大品若約法被緣猶是漸教約說次第名熟酥味相復有義日光普照高下悉均平土圭測影不縮不盈若低頭若小音若散亂若微善皆成佛道不令有人獨得滅度皆以如來滅度而滅度之具如今經若約法被緣名漸圓教約說次第醍醐味相玄初文五味者還約華嚴日照三譬開為五味問應取涅槃本文何以𨚫取華嚴文耶非但數不相當亦恐文義各別答涅槃五味轉變而秪是一乳華嚴三照不同而秪是一日今演華嚴平地之譬以對涅槃後之三味數雖不等其義宛齊又涅槃以牛譬佛乳從牛出譬佛初說大乳出已後其味轉變猶成分譬故此下文義立五味皆從牛出未若華嚴日譬於佛光譬說教日無緣慈非出而出衆機所扣非照而照故使高山幽谷平地不同同稟教光終歸等照故用兩經二義相成籤十二部經華梵名義妙玄云一修多羅此云法本亦云契經亦線經二祗夜此云重頌三和伽羅那此云授記四伽陀此云不重頌五優陀那此云無問自說六尼陀那此云因緣七阿波陀那此云譬喻八伊帝目多伽此云如是語亦云本事九闍陀伽此云本生十毗佛略此云方廣十一阿浮陀達摩此云未曾有十二優波提舍此云論議部者部別各有類從也如聾若啞觀音玄記云舊經三十七云時舍利弗袛園林出不見如來自在莊嚴變化及生意念亦不樂說不能讚嘆以聲聞人出三界故此即如聾如啞之文也領解如來擬宜之時文句云擬宜勸誡二門即遣旁人疾走往捉領上勸門之擬宜窮子驚愕領上勸門之無機強牽將還領上誡門之擬宜窮子自念無罪至悶絶躃地領上誡門之無機從父遙見下併領勸誡之息化此探取佛意佛勸門擬宜無機意猶未息更作誡門擬宜事不獲已然後息化也後分則有等妙玄云後分等者準不思議境界經云舍利子五百聲聞皆是他方極位菩薩故今在此逝多林會迹示聲聞據華嚴經文殊師利逝多林出時舍利弗語五百言汝等且觀文殊師利相好威儀等觀彼經中舍利弗語辭似如己聞諸大乘竟如在方等般若會時未能悟故狀當聾啞以後分之言時仍長遠亦可通在鹿苑之前今且判在華嚴會時木樹草座皆表三藏詮生滅故玄籤云通教七寶天衣為座表無生別教盧舍那七寶臺為座表無量圓教毗盧那虗空為座表無作今藏教木草為座正表生滅也一酬釋尊行因本願妙樂云歌利王割截之時佛發大願我若得道應先度之輔行云願者佛昔於饑世化為赤目大魚閉氣不喘示為𣦸相木工五人先斧斫肉佛時誓言於當來世先度此等先願與其無生故也二赴五人本願先悟妙樂云迦葉佛時九人學道五人未得果誓於釋迦法中最先開悟本願所牽前得無生故也三報今日侍奉之勞妙樂云前者太子棄國捐王入山學道父王思念遣五人追侍所謂拘鄰迦葉二是母親頞鞞跋提俱利三是父親二人以欲為淨三人以苦行為淨太子勤行苦行二人便捨之去三人猶侍太子捨苦行還受飲食酥油暖水三人又捨去太子得道先為五人說四諦也最先得度在一切人天羅漢之前妙樂云第三說法時拘鄰五人八萬諸天遠塵離垢五人得無生佛三問知法未即三答云已知地神唱空神傳乃至梵世咸稱已知拘鄰最前初見佛道相初聞法鼓初服道香初嘗甘露初入法流初登真諦閻浮提得道最在一切人一切天一切羅漢前故十二遊經云佛成道第一年度五人第二年度三迦葉第五年度身子目連當知阿若在前明矣方便文句云方者法也便者用也法有方圓用有差會三權是矩是方一實是規是圓若智指於矩則善用偏法逗會衆生若智詣於規則善用圓法逗會衆生舉偏法釋方便蓋隨衆生欲非佛本懷如經令離諸著出三界苦是故如來殷勤稱嘆方便此釋他經義也又方便者門也門名能通通於所通方便權略皆是哢引為真實作門真實得顯功由方便從能顯得名故以門釋方便此釋他經義也又方者祕也便者妙也妙達於方即是真祕點內衣裡無價寶珠與王頂上唯有一珠無二無別指客作人是長者子亦無二無別如斯之言是祕是妙如經唯我知是相十方佛亦然止止不須說我法妙難思故以祕釋方以妙釋便此釋法華方便品意也今云以方便者蓋以前方法便用之方便也四大弟子齊已分領文句云將欲誘引下是密遣二人誘引一齊教近領三車救子遠領波羅奈施權次取意領法身地久照方便今初且釋齊教領者譬喻文有四一用方便擬宜二知先心三嘆三車四適其所願方便品亦四今領亦四密遣二人者四大弟子齊已分領等餘如本文云云二乘各有十智仁王經云一世俗智二法智三類智四苦智五集智六滅智七道智八他心智九盡智十無生智以上十智二乘各有故成二十智也彈偏折小嘆大褒圓釋籤云方等折小如弟子品彈偏如菩薩品如觀衆生品是歎大稱嘆文殊及淨名是褒圓又弟子品用折不同有用三教如訶目連是歎大有用圓訶如訶身子是褒圓修空觀用事識見生身住權理等妙宗云相起之本其本乃是權實二理空中二觀事業二識就此分之則生身尊特如指諸掌故金光疏云丈六身佛住真諦丈六尊特合身佛雙住真中尊特身佛雙住俗中法身佛住中道此依二理故有二佛衆生二識有二觀因故感二佛事業二識為見相之本起信論云言二識者佛用有二種一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能盡知故二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身身有無量色色有無量相相有無量好所住依果亦復無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不毀不失如是功德皆因諸波羅密等無漏行熏及不思議熏之所成就具足無量樂相故說為報恣殃掘之譏妙玄云殃掘之經彈斥明常分明餘教釋梵四王及十弟子乃至文殊皆被訶斥籤云殃掘偈云云何名為一謂一切衆生皆以如來藏畢竟恆安住云何名為二所謂名與色此是聲聞宗斯非摩訶衍云何名為四所謂四聖諦是則聲聞宗斯非摩訶衍一切諸如來第一畢竟常是則大乘諦非苦是真諦云何名為五所謂彼五根是則聲聞宗斯非摩訶衍所謂彼眼根於諸如來常等具如止觀七引乃至增十亦復如是如是等文彈訶聲聞明於常住最為顯著餘如彼經任淨名之折維摩經中問病辭不堪往棄鉢然等乃密彈也禮空王之座去花招譏當座訶也四無常偈仁王經云初無常偈劫火終訖乾坤洞然須彌巨海都為灰揚天龍福盡於中淍喪二儀尚殞國有何常二苦偈生老病死輪轉無際事與願違憂愁為害欲深禍重瘡疣無外三界皆苦國有何賴三空偈有本自無因緣成諸盛者必衰實者必虗衆生蠢蠢都如幻居聲嚮俱空國土亦如四無我偈識神無形假乘四蛇無明保養以為樂車形無常主神無常家形神尚離豈有國耶三根解源妙玄云一俗隨三真轉或對單真或對真或對不思議真三人入智不同復局照俗亦異偏真照幻俗不空真照恆沙佛法之俗實相真照界外不思議俗別圓機發對通鈍根成三別二接對通共成三人同聽異聞故約漏等以示解源如大品明非漏非無漏初人謂非漏是非俗非無漏是遣著何者行人緣無漏生著如緣滅生使破其著心還入無漏此一番二諦也次人聞非漏非無漏是非二邊別顯中道中理為真又是一番二諦也又人聞非漏非無漏即知雙非正顯中道法界力用廣大與虗空等一切法趣非有漏非無漏又是一番二諦也大經中約空不空三人取解不同即有三種二諦也復次約一切法趣非漏非無漏顯三種異是故說此一俗隨三真轉長者十德文句云世間長者一姓貴二位高三大富四威猛五智深六年𦒿七行淨八禮僃九上歎十下歸姓則三皇五帝之裔左貂右插之家位則輔弼丞相鹽梅阿𢖍富則銅陵金谷豐饒侈靡威則嚴霜隆重不肅而成智則胸如武庫權奇超年則蒼蒼稜稜物儀所伏行則白圭無玷所行如言禮則節度庠序世所式聸上則一人所敬下則四海所歸出世長者佛從三世真如實際中生功成道著十號無極法財萬德悉皆具僃十力雄猛降魔制外一心三智無不通達蚤成正覺久遠若斯三業隨智運動無失具佛威儀心大如海十方種覺所共稱譽七種方便而來依止法身無病隨機權示維摩經云文殊問疾居士是疾何所因起其生久如當云何滅維摩詰言從癡有愛則我病生以一切衆生病是故我病若一切衆生得不病者則我病滅所以者何菩薩為衆生故入生死有生死則有病若衆生得離病者則菩薩無復病十八空大品般若云內空外空內外空空空大空勝義空有為空無為空畢竟空無際空散空一切法空本性空自相空無相空無性空自性空無性自性空
