body:
  text: 空門二十七賢聖成論二十七賢聖開果向為三謂信行法行無相行及初果為四五第二果向六第二果七第三果向八第三果於此果中又開為十一謂中生行不行樂定樂慧轉世現信解見得身證并前七為學人十八開無學為九謂退護住思死不退慧解脫俱解脫不壞法賢人有二聖人有二十五四教義云空門入道二十七賢聖者信法二行即是兩賢在方便道空門發真斷見惑未盡行即須陀洹近向見惑盡名須陀洹果空解增明斷欲界思一品乃至五品名斯陀含向斷六品即是斯陀含果斷七品八品盡名阿那含向欲界九品下分盡即是阿那含果阿那含有十一種𢃄果行向即是阿羅漢向進斷上二界思惟也非想九品盡即是阿羅漢是阿羅漢有九種賢人有二聖有二十五合二十七賢聖具出成論信行法行止觀云薩婆多明此二人位在見道因聞入者是為信行因思入者是為法行曇無德云位在方便自見法少憑聞力多後時要須聞法得悟名為信行憑聞力少自見法多後時要須思惟得悟名為法行若見道中無相心利一發即真那得判信法之別然數據行成論據根性各有所以不得相非今師遠討源由久劫聽學久劫坐禪得為信法種子世世熏習則成根性各於聞思開悟耳身證止觀云身證位者還是信解見到二人入思惟道用無漏智斷上下分結發四禪四無色定即用共念處修八背捨八勝處十一切處入九次第定三空事性兩障先已斷盡又斷非想事障滅緣理諸心心數法入滅盡定得此定故名身證阿那含也何者入滅定似涅槃法安置身內息三界勞務身證想受滅故名身證也若約初果解身證者但以先於凡夫用等智斷結得四禪四無色定後得見諦第十六心證那含果即修共念處還從欲界修背捨勝處一切處入九次第定身證也俱舍則無身證俱舍云世尊說學人十八謂四向三果信行法行信解見得家家一間五含謂中生行不行上流無學九謂退護思住達不動不退慧脫俱脫此二十七名為福田賢者善直舊云隣聖為賢此語太高今言善直曰賢應作四句一隨𢜤見破戒亂心此非直非善如無目無足不能到清涼池二持戒修禪而生邪見此善而不直亦不名賢如有足無目亦不能入清涼池三信心正見而破戒心亂此直而不善此亦非賢如有目無足不能入清涼池四信解正智得佛教意持戒清淨修安般不淨等觀心得停住名直名善有目有足能入清涼池五停心通於四教四念處云藏教停心如文通教停心者覺觀多者當觀入息不生出息不滅不生不滅息即是空無能觀所觀皆不可得不可得即真真即心停也多貪欲者當觀貪欲非垢無貪欲非淨非垢故不生非淨故不滅不生不滅故即空空即真真故心停多嗔恚者當觀於慈慈恚即不生亦不滅如上著我多者當觀其身如屠牛四分但見四大六根五十二入十八界何處有我即破我見愚癡者對因緣觀三世破斷常二世破果報我一世破性實善用五治心心即安住得觀無生別停心者前三藏數息不淨等停心疎遠事偽通以觀息不生不滅停心即事而理近密真今別教以持戒之根本若我住世無異此也即佛依此而住即僧雖爾望於三藏是密是真望於實相非近非密非真非理與前別後別居季孟之間此義可知云云能持五支諸戒云云釋論十種戒云云於一戒中具足爾許法門即是別停心戒是法本道之根源故以戒為停心也圓五停心者私謂五品是也即事而理其相自彰何者初教以數息事停散圓家以信理除疑惑又信是道元故當初品又信順不動即是第一停心初教以不淨事停貪圓家以讀誦除穢染若著文字染污法性文字性離即是解脫清淨是第二停心也初教以慈停嗔圓以慈故有說說無秘悋悋有秘恚則非慈相是慈說第三品停心也初教以因緣停痴圓以六度度六蔽闇去明生是第四品停心也初教以念佛停逼迫圓以即事而理理即法佛法佛豈逼迫佛法無能逼所逼無逼無逼者無逼法是第五品停心當知信事即理文字即解脫慈即𡩖洪度蔽彼岸一切平等是圓五品停心也五停心對圓五品妙玄云私謂五品位是圓家方便初欲令易解凖小望大如三藏之五停心初品圓信法界上信諸佛下信眾生皆是隨喜是圓家慈停心徧對治法界上嫉妬第二品讀誦大乗文字文字是法身氣命讀誦明利是圓家數息停心徧治法界上覺觀說法品能自淨心亦淨他心是圓家因緣停心徧治法界上自他癡痴去故諸行去乃至老死去兼行六度品是圓家不淨停心六蔽初名貪欲若捨貪欲欲因欲果皆捨捨故無復報身非淨非不淨也正行六度品是圓家念佛停心正行六度時即事而理理不妨道事妨於道即事而理無障可論大意如此云云五停心名五門禪禪門中明內善者即是五門禪一阿那波那門二不淨觀門三慈心門四因緣門五念佛三昧門此五法門通攝一切諸禪發諸無漏故名為內善問曰內善無量何得但說五門答曰五門雖少而行通諸禪所以者何一阿那波那門者此通至根本及特勝通明等諸禪三昧二不淨觀門者此通九想背捨超越等諸禪三昧三慈心門者此通四無量等諸禪三昧四因緣門者此通至十二因緣四諦等慧行諸禪三昧五念佛門者此通至九種禪及百八三昧復次初數息門即是世間凡夫禪次不淨門即是出世間禪諸聲聞人所行次慈心門即是凡聖二人為大福德修慈入無量心次因緣門者即是支佛人之所行次念佛門功德廣大即是諸菩薩之所行此則畧明五門次第淺深之相轉兼具治輔行云所言轉者或轉用尸乃至般若或次第超超一至四逆順間雜病去便止五度為頭但越本位餘同於檀此病不轉而治轉也一度轉用餘之五度即成五句六度合有三十句治若藥病俱轉名亦對亦轉成三十句是轉非對亦三十句又是轉是對是轉非對一往且立為三十句若超襍等句相不定行者自知豈可具記又一度轉用至二三四亦可名轉亦可名兼若至五度名轉名具不得具名者以轉用故若言具者不得云轉但具用六以治一蔽亦以轉故復失兼名故雖兼具但名為轉故轉至五不名具者轉則單用具則兼俱故不同也若病轉藥不轉不名轉治亦非兼具或第一義名一向治亦有超順逆間等也隨其病轉以為五蔽亦成三十句一向治也所言兼者藥兼一兩乃至三四至五名具是故但四度別四句成二十四一度至五但成六句正名具治三種貪禪門明貪欲中即有三種發相一外貪欲煩惱發者若行人當修定時貪欲心生若是男子即緣於女若是女人即緣於男子取其色貌姿容威儀言語即結使心生念念不住即此是外貪媱結使發相二內外貪欲煩惱發者若行人於修定之時欲心發動或緣外男女身相色貌姿態儀容起於貪著或復自緣己身形貌摩頭拭頸念念染著起諸貪𢜤是以障諸禪定此即內外貪欲煩惱發相三徧一切處貪欲煩惱起者此人𢜤著內外如前而復於一切五塵境界資生物等皆起貪𢜤或貪田園屋宅衣服飲食於一切處貪欲發相九想觀治貪欲輔行云又此九想通能治於六欲若別治者死想治威儀言語二欲脹壞噉三治形貌一欲血塗膿爛青瘀三治色一欲骨燒二治細滑一欲九想又復通治所著人欲散治人相欲能動九十八使山故所治最強六種欲大論云有人著赤白黃黑等色或著相貌端嚴或著威儀姿態或著語言嬌𡡾或著細滑肌體或著可意之人三種嗔禪門明瞋恚發相即有三種一非理嗔違理嗔發者若行人於修定時瞋覺歘然而起無問是理非理他犯不犯無事而瞋是為違理邪瞋發相二順理瞋順理正瞋發者若於修定之時外人實來惱觸以此為緣而生瞋覺相續不息亦如持戒之人見非法者而生瞋恚故摩訶衍中說清淨佛土中雖無邪三毒而有正三毒今言順理正嗔者即其人耶三諍論嗔行人於修禪時著己所解之法為是謂他所行所說悉以為非既外人所說不順己情即惱覺心生世自有人雖財帛相侵猶能安忍少諍義理即大瞋恨風馬不交是名諍論瞋發相慈悲喜捨四無量心法界次第云四通名無量心者從境以得名以所緣眾生無量故能緣之心亦隨境無量故悉受無量心名一慈無量心能與他樂之心名之為慈二悲無量心能抜他苦之心名之為悲三喜無量心慶他得樂生歡悅心名之為喜四捨無量心若緣於他無憎無𢜤之心名之為捨四師𢿘息禪門明用𢿘息不同者一師教繫心𢿘出息所以者何數出息則氣不急身不脹滿身心輕利易入三昧有師教𢿘入息何故爾𢿘入息一者易入定隨息內斂故二斷外境故三易見內三十六物故四身力輕盛故五內實息貪恚故有如是等勝利非一應𢿘入息有師教𢿘入出無在但取便而𢿘無的偏用隨人心安入定無過即用三師所論皆不許出入一時俱𢿘何以故以有息病生在喉中猶如草吐則不出咽則不入此患生故又師依四時用𢿘今所未詳用息明六妙門謂𢿘隨止觀還淨法界次第云此六通言妙門者涅槃為妙門謂能通六法次第相通能至真妙泥洹故云妙門一家所明有十種六妙門今但畧出次第相生一科六門以為次者此六門既是亦有漏亦無漏禪於餘亦有漏亦無漏禪中淺而且局故以為次也一𢿘息門攝心在息從一至十名之為𢿘行者為修無漏真法先須調心入定欲界麤散難攝非𢿘不治故須善調身息從一至十則麤亂靜息心神停住是為入定之要故以𢿘息為妙門也二隨息門細心依息知入知出故曰為隨行者雖因𢿘息心住而禪定未發若猶存𢿘則心有起念之失故須放𢿘修隨心依於息入時知入出時知出長短冷煖皆悉知之若心安明淨因是則諸禪自發故以隨為門也三止門息心靜慮名之為止行者雖因隨息心安明淨而定猶未發若心依隨則微有起想之亂澄渟安隱莫若於止故捨隨修止是中多用凝心止也凝心寂慮心無波動則諸禪定自然開發故以止為門四觀門分別推析之心名為觀行者雖因止證諸禪定而解慧未發若住定心則有無明味著之乖故須推尋檢析證禪定是中多用實觀四念處也若觀心分明則知五眾虗誑破四顛倒及我等十六知見顛倒既無無漏方便因此開發故以觀為門五還門轉心反照名之為還行者雖修觀照而真明未發若計有我能觀析破於顛倒則計我之惑還附觀而生同於外道故云是諸外道計著觀空智慧不得解脫若覺此患即當轉心反照能觀之心若知能觀之心虗誑無實即附觀執我之倒自亡因是無漏方便自然而朗故以還為門六淨門心無所依妄波不起名之為淨行者修還之時雖能破觀之倒若真明未發而住無能所即是受念故令心智穢濁覺知此已不住不著泯然清淨因此真明開發即斷三界結使證三乗道故云其清淨得一心者則萬邪滅矣以淨為門意在此也一念十二因緣禪門云一念十二因緣善根發者亦於欲界未到靜定心中忽然自覺剎那之心無人無我性本無實所以者何一念起時必籍因緣言因緣者即具十二因緣緣無自性一念豈定有實若不得一念之實即破世性邪執心與定相應智慧開發猶如涌泉身口清淨離諸邪行是十二因緣善根發相剎那十二緣妙玄云一剎那十二緣者若以貪心殺生彼相應愚是無明相應思是行相應心是識起有作業是名色起有作業必有六入彼相應觸是觸彼相應受是受貪即是𢜤彼相應纏是取彼身口作業是有如此諸法生是生此諸法變是老此諸法壞是死束十二為三道輪轉相生輔行云束十二緣以為三道十二因緣輪轉相生是故三道亦輪轉相生大論第二十二因緣論婆沙十地經等竝同俱舍云三煩惱二業七事亦名果畧果及畧因由中可比二從惑生惑業從業生於事從事事惑生有支理唯此初四句是以畧攝廣故論云應知緣起雖有十二而二三為性三謂惑業事二謂因果就中又二初兩句正明相攝下兩句釋妨妨曰何故過未畧而現在廣釋曰由中可以比知現在名中故也次從惑生惑謂𢜤生取從惑生業謂取生有及無明生行從業生事謂行生識及有生生從事事惑生者謂從事生事即識生名色乃至生受從事生惑謂受生𢜤業道輔行云論十不善業道品問云何名業道答意即是業於中行故故名業道前行後三中後行前七中三是業非道七亦業亦道此是具錄論文人未見論祗見續在十二緣後便作十二因緣釋之甚不可也今先銷論文次會三道論品雖題名業道品今文引用意通三意意中即是業者意地思也於中行者行身等也故知身等為意所行名為業道業之道故業即道故名為業道前行等者辯起先後將教所列對起先後文列次第身口居先意三居後起之次第意三在先身口居後先起意地故云前行文列在後故云後三後動身口故云後行文列在前故云前七中字但是助句而已云在此七及三中耳亦如五文列與起麤細更互四諦四果亦復如是然論文意三是業非道者非身口故亦業亦道者身口二業為意業所行故復名為道今文義立意為能通亦得名道是故後三通至身口故云而能通七前七是業復為意行是故論云亦業亦道今文前七復立二義一是所行如論文意故云是業復是道二是能通通至後世故復名道三種障念三身治禪門云念應佛者於三十二相中隨取一相或先取毫相閉目而觀若懸作不成當對一好端嚴形像一心取相緣之入定若不明了即開眼更觀復更閉目如是取一相明了次第徧觀手相使心眼開明即破沉闇之心念報佛者以正念之心緣佛十力四無所畏十八不共一切種智圓照法界常寂不動普現色身利益一切功德無量不可思議如是念時即是對治念法佛者即是觀法性平等不生不滅無有形色空寂無為無為之中既無境界何者是逼迫之相知境界空故即是對治若念三十二相即非對治何以故是人未緣相時已為境界惱亂而更取相者多因此著魔狂亂其心觀體非念觀是其慧四念處二問四念處是慧云何反從念受名耶答為初學用念持慧不妄受異緣念為增上從念受名也七賢位人明識四諦玄義云又天魔外道𢜤見流轉不識四諦此七位人明識四諦大經云我昔與汝等不見四真諦云云見四諦者識屬𢜤四諦識屬見四諦皆能明了若解四諦則所見真正無有邪曲故是賢人相也從此生煖法等四句俱舍論云從此生煗法者謂從總相念住後成就已生煗法名聖道如火能燒惑薪聖火前相故名為煗已觀四諦修十六行名煖位也此善根分位長故能具觀四諦及能具修十六行觀無常苦空無我乃至道如行出次辯頂位者從此頂善根有下中上至成滿時有善根名為頂亦觀四諦修十六行同前煗位煗頂二善根俱名動善可退動故動善根中頂為最勝如人頂故名為頂法忍位是進煖位是退此頂是進退兩際猶如山頂故名為頂煖頂忍世第一各有三品妙玄云煗有三種謂下下下中下上頂有三中下中中中上忍有二種上下上中世第一有一種謂上上此四善根以三言之煗是下頂是中忍世第一是上復有說者煖有二謂下下下中頂有三謂下上中下中中忍有三謂中上上下上中世第一法有一謂上上亦以三言之煗是下下頂是下中忍是中上世第一是上上瞿沙云煖有下三頂有六下下乃至中上忍有八下下乃至上中世第一但上上以三言之煖法一種謂下頂法二種謂下中忍有三種謂下中上世第一有一種謂上釋籤云對下三善根以為料揀第二師文似四品意但在三然越次取者例前九品亦越次故言但三者下下下中秖是下中上秖是中上上秖是上耳煖頂於下三品中是下下下中雖有二品但在於下忍取中三品之上世第一取上三品之上瞿沙說九品上能兼下故頂有六忍有八世第一近真故不可兼多故唯上上九品既以上兼下三品亦然故煗有一乃至忍三世第一亦唯一種意亦如前世第一三品釋籤云問世第一法有三品否答一人無多人有身子上目連中餘皆下就佛支佛聲聞為三品世第一法者此心心數法於餘法為最為勝為長為尊為上為妙中忍減緣行釋籤云所言緣者上下八諦名之為緣是所緣故各十六行故三十二名之為行能緣行故應知七周減緣二十四周減行謂四行觀欲苦乃至四行觀欲道乃至三行觀上界道名一周減一行如是一一諦下各有三行與緣名異從行為名故三八二十四周減行一一諦下各有一行與緣名同亦與緣同減從緣為名但名減緣是則上界四諦下界留苦唯減三緣上四下三名為七周緣之與行皆從後減故使欲界最後留苦都有三十一周減緣行後但有一行二剎那心觀於欲苦名中忍滿唯有一行一剎那心觀於欲苦名上忍成就此中忍位未減道時雖減行相未減道故故得具觀四種諦也頌云下中忍同頂者約此說也若此中忍減道諦時但修十二行既減彼道心無忻慕故彼道下四行亦不起得由此道理減滅諦時但修八行除減道下各四行故減集諦時但修四行故於中忍具修十六十二八四行相於上忍中亦修四行雖起一行一剎那心以觀苦故起能得得修彼苦下四行相故所留一行隨行者所宜釋籤云隨緣一行一剎那不住故似見道所以者何行人有二種一𢜤行二見行𢜤行有二一我慢二懈怠見行亦二謂我及我所著我慢者修無常行入世第一法懈怠增者修苦行入著我者修無我入著我所者修空行入十六行義輔行云苦下四行謂無常苦空無我觀緣生念念生滅故無常為無常所逼故苦一相異相不可得故空我我所不可得故無我集下有四謂集因緣生有漏和合能招苦果故名為集觀於六因能生苦果故名為因觀於四緣能生苦果故名為緣還受後有苦故名為生滅下四行謂滅盡妙離一切苦盡故名為盡諸煩惱滅故名為滅一切第一故名為妙超過生死故名為離道下四行謂道正迹乗能至涅槃故名為道非顛倒法故名為正聖人行處故名為迹運至三脫故名為乗八番減緣行妙玄云忍法觀者正觀欲界苦色無色界苦欲界行集色無色界行集欲界行滅色無色界行滅斷欲界行道斷色無色界行道如是三十二心是名下忍行者後時漸漸減損及緣復更正觀欲界色無色界苦乃至觀斷欲界行道除觀斷色無色界行道從是中名中忍復更正觀欲界苦觀色無色界苦乃至觀色無色界行滅除滅一切道復正觀欲界苦色無色界苦乃至觀欲界行滅除色無色界行滅復正觀欲界苦乃至觀色無色界行集除滅一切滅復正觀欲界苦乃至觀欲界行集除色無色界行集復正觀欲界色無色苦除一切集復正觀欲界苦除色無色界苦復正觀欲界常相續不斷不遠離如是觀時𣸧生厭患復更減損但作二心觀於一行如似苦法忍苦法智如是正觀是名中忍復以一心觀欲界苦是名上忍復次生世第一法世第一法後次生苦法忍盡是色界法住定地法玄籤云頂法者色界善根有動不動住不住有難不難斷不斷退不退就動乃至退者有二下者是煖上是頂彼不動乃至不退者為二下者是忍上者是世第一法此等諸文全同論文論云有云欲善根有二下是煗上是頂色善根有二下是忍上是世第一評家云不應作是說應云盡是色界法住定地法聖行法好今依評家故云色界此等秖是判四善根以有動等之異對四不同故也動乃至退分二不動乃至不退分二雖同在色界由善根𣸧淺異故使差降不同動謂猶為外緣所動住謂久住煗頂難謂煖頂有難斷謂斷於善根退謂退為五逆等不動等是後二善根凖此可知
