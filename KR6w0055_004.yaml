body:
  text: 世出世間禪妙玄云定聖行者略為三一世間禪二出世禪三上上禪世禪復二一根本味禪隱沒有垢無記二根本淨禪不隱沒無垢有記根本者世出世法之根本也大品云諸佛成道轉法輪入涅槃悉在禪中若能深觀根本出生勝妙上定故稱根本也隱沒者暗證無觀慧也有垢者地地生𢜤味也無記者境界不分明也此有三品謂禪也等也空也即十二門禪也根本淨禪不隱沒無垢有記與上相違此又三品謂六妙門十六特勝通明等也二出世間禪者即有四種謂觀練熏修觀禪者謂九想八背捨八勝處十一切處通稱觀禪練禪者即九次第定也熏禪者即師子奮迅三昧也修禪者超越三昧也三出世間上上禪者即九種大禪一自性禪二一切禪三難禪四一切門禪五善人禪六一切行禪七除惱禪八此世他世樂禪九清淨禪如地持所釋今不具論支林功德禪門中釋支名者初禪有五支覺者初心覺悟名為覺觀者後細心分別名為觀慶悅之心名為喜恬淡之心名為樂寂然不散名一心二禪有四支一內淨支者既離覺觀依內淨心發定皎潔分明無有垢穢故名內淨二喜支者定與喜俱發行者深心自慶於內心生喜定等十種功德善法故悅豫無量故名喜支三樂支者行者受於喜中之樂恬淡悅怡綿綿美快故名樂支四一心支者受樂心息既不緣定內喜樂復不緣外念思想一心不動故名一心三禪五支一捨支者得三禪樂定生時捨喜心不悔亦得言捨離三過二念支者既得三禪之樂念用三法守護令樂增長三智支者善巧三法離三過四樂支者快樂樂遍身受五一心支者受樂心息一心寂定四禪四支一不苦不樂支者此禪初發與捨受俱發捨受心數不與苦樂相應故言不苦不樂支二捨支者既得不苦不樂定捨下勝樂不生厭悔復次真定以發未得成就若心進勝定則便隨念動轉不名無動定是故定發心不念著自能捨離故名捨支禪定分明等智照了故名念清淨支定心寂靜雖對衆緣心無動念名一心支釋支義者如纓絡經說禪名支林此即據總別之明義也言支者支離為義如因樹根莖則有枝條根莖是一枝條有異禪中支義亦爾從一定心出生五支此是總中別義所言林者如林因衆多樹得有林名禪義亦爾五支和合總受禪林此即據別中之總故知若說禪即知有五支如聞林名必知有樹及以枝條復次有人言支持為義如欲界未到地中雖有單靜定心未有覺觀等五支共相支持則定心淺薄易失若得初禪即有覺觀等法則定心安隱牢固難壞也廣如禪門及法界次第娑婆世界主梵天王尸棄大梵文句云娑婆此忍其土衆生安於十惡不肯出離故稱為忍悲華經云云何名娑婆是諸衆生忍受三毒及諸煩惱故名忍土亦名雜雜九道共居梵者此離欲除下地繫上升色界故名離欲亦稱高淨尸棄者此頂髻又外國喚火為樹提尸棄此王本修火光定破欲界惑從德立名然經標梵王復舉尸棄似如兩人依釋論正以尸棄為王今經舉位顯名恐目一人耳住禪中間內有覺觀外有語言得主領為王單修禪為梵民加四無量心為王也初禪有梵衆梵輔大梵今舉王攝諸也離喜而純樂受唯識論云五識相應適悅受恆名為樂意識相應適悅受若在初二禪近分名喜二禪根本名喜名樂三淨慮近分根本俱名為樂無想天唯識云無想天者謂修彼定厭粗想力生彼天中違不恆行心及心所想滅為首名無想天故六轉識於彼皆斷彼天唯在第四靜慮下想粗動難可斷故上無無想異熟處故即能引發無想定思能感彼天異熟果故無煩雜無熱惱等輔行云無煩之始得無煩名伏煩惱故名為無熱果易彰故名為善現見清徹故名為善見色中無上名色究竟四空定法界次第云通言空者此四定體無形色故名為空各依所證之境為處境法持心心無分散故名定也一空處定若滅三種色緣空而入定者名空處定二識處定若捨空緣識而入定者名識處定三無所有處定若捨識處心依無所有法而入定者名無所有處定四非有想非無想定若捨二邊之想而入定者名非有想非無想定滅三種色輔行云三種色者一可見有對二不可見有對三不可見無對大品云為過一切色相滅有對色相不念種種相入無邊空處過一切色滅可見有對色滅有對色滅不可見有對色不念種種色相滅不可見無對色一切色法唯十一種謂五根塵法入少分少分者無表色也阿毗曇云一可見謂色是二有對有十謂五根塵若云不可見有對應但云五根四塵三不可見無對謂法處少分大經二十一云眼見色壞名為過色五根塵壞名過有對於二種餘及無教壞名過異相此之三色竝在色界欲入無色故滅此三今此應云及背捨勝處一切處中八色等也若無表色雖非今文空觀所過得空觀時必定離於表無表色又於可見有對等中復應明於三有對義非今正義是故不論滅色方便具如禪門先想此身如甑如籠如網乃至漸空大論十九云如鳥在瓶瓶破得出無色界色玄文問無色無身云何具四念處引毗曇答無色有道共戒云云當知小乘明義即有兩意大經云無色界色非諸聲聞所知若爾四念處無色何妨合經墻壁譬文句釋法華堂閣等云堂譬欲界閣譬色無色界墻壁譬四大頺落譬減損傾危譬遷變柱根譬命梁棟譬意識妙樂釋文句云墻壁四大者應通三界無非損減無色雖無四大造色定果所為皆是墻壁云云色是無教法戒疏云戒是色住無作是假色亦言無教非對眼色發隱云亦言無教者亦名無教也非對眼色者非與眼相對之色明與常色不同即非色非心也五衰相涅槃云大五衰者頭上花萎腋下汗出衣裳垢染身體臭穢不樂本座小五衰衣服絶香身光忽滅浴滴沾身本性囂馳兩目眴動四空瘡癰病箭觀等禪門云離四空定說八種觀如病如癰如瘡如刺無常苦空無我前對治方法便是事觀後四即是緣諦理觀此八觀中有總別總則用此八法總觀空處定四和合故有此定可患無實別觀者用此八法前四對治觀四事病治受癰治想瘡治行刺治識復次四無常等即對觀四理相無常觀識苦觀受空觀想無我觀行百八見等輔行引五十校計經云若眼見好色中有有集見惡色中有有集見平平色中有有集乃至意緣法亦如是一根有三三中有六六根具三十六三世合百八歷六十二見八十八使各各百八當知舉心動念浩然無際昏而且盲都無見覺止觀中諸菩薩問云何百八佛言有所念不自知心生心滅中有有集不知為癡轉入意地亦如是識亦如是是為意三見好色中色惡色不自知著不自知滅有有集乃至觸亦如是彼經但列六根各六雖無三世之語而結云百八故知是約剎那而為三世也既以心意識三為意地三故通三世如云集起名心籌量名意別知名識意三既爾故使所依五根亦爾三世三箇三十六故故有百八經又問云我設知百八癡滅為癡為𭶑佛言未𭶑諸菩薩言何故爾耶佛言猶有百八疑乃至未得百八盡力以念念中不離六根剎那三世故一一見皆一百八乃至五十箇百八煩惱故彼經云舉心動念生死無盡五利使輔行云一身見使若於名色入界中妄計為身名為身見若以無明不了則於五中起二十種身見則身見有二十種見諦所斷一行中歷三界有二身見也二邊見使執邊之心名為邊見若於四邊不了隨見一邊為實餘邊悉為𡚶語如其所見互執一邊悉墮邊見歷三世五即有六十二見竝是見諦所斷合六十二見同是一邊見攝也又約見諦所斷一行中歷三界即有三邊見三邪見使邪心取理故名邪見若無明不了四諦因果邪心推劃謂無此理因斷滅出世間善根乃至世間善根作闡提行是為邪見見諦所斷三界四行中有十二邪見是也四見取使於非真勝法中謬見涅槃生心而取故曰見取若行道之時雖入種種觀門而真明未發無明不了便謬計所得以為真為勝生心取著皆名見取也見諦所斷三界四行有十二見取是也五戒取使於非戒中謬以為戒取以進行故曰戒取若取雞狗牛戒乃至九十五種外道所行之戒以為真戒皆名戒取若人雖持佛戒見有戒相亦是戒取見諦所斷三界二行有六種戒取是也五鈍使輔行云一貪欲使引取無厭名曰貪欲分別其相具如貪毒中說見思所斷三界五行中十五貪皆是貪使二瞋恚使忿怒之心名之曰瞋分別其相具如瞋毒中說見思所斷欲界五行中五恚即是恚使也三癡使迷惑不了之心名為無明若以迷心緣境隨有所起則念念永失而不知慙愧者皆是癡也見思所斷三界五行下十五癡即是無明使四慢使自恃輕他之心曰慢若自恃種姓富貴有德才能輕蔑於他即是慢也慢有八種在下別出乃至見思所斷三界五行下十五慢皆是慢使也五疑使迷心乖理猶豫不决曰疑分別其相具如疑蓋中說三界四行十二種疑竝是疑使也二十五冥諦法數云冥初世間本生覺中我心我慢五塵色聲香味觸五大地水火風空十一根眼耳鼻舌身五知根手足口大小遺根五業根心平等根神我主諦能生所生能依所依六諦法數云一陀驃諦此云主諦五大及時方神意此主為萬物所依故二求那諦此云依諦為色等五塵依故三羯摩諦此云作諦俯仰屈伸出入去來等故名作四三摩若諦總相諦為總相萬法如一有故五毗尸沙諦別相諦如森羅萬象各各不同故六摩波夜諦為五塵成就不相妨礙等見中思推利思背上思輔行云三種見惑一俱生五鈍中有利如獸凡夫亦能起我我所即是利從鈍背上起故屬鈍二推理未發禪來雖有世智推理辨聰見想猶弱所有十使同屬於鈍三發得從因定發見心猛盛所有十使從強受名皆屬於利也三種思惑一俱生與形俱生如男女託胎妄於父母生𢜤惡心此是邪思還歸於見惑二依見如外道依見而起嗔此利上鈍名背上使見諦斷時正利去背亦去三界繫即三界九品思此名鈍使亦名事障號正三毒十纏俱舍云無慚無愧睡眠昏沉掉舉惡作嫉妬慳吝忿覆三結輔行引大論云又或時為鈍但說斷三婆沙云如昔一時有毗𥠖子佛法出家時佛已制二百五十戒令族姓子隨所樂行彼人聞已乃生憂慮誰能守護如是諸戒便詣佛所頭面禮佛白佛言我不堪護如是諸戒爾時世尊現親善相而不訶責以軟美語而𢠢喻之善哉善哉為能善持三戒不耶謂戒心慧彼人聞已即大歡喜我能善持如是三戒斷惑亦爾若世尊說斷八十八使及無量苦名須陀洹則受化者心生憂慮何能拔除八十八樹度八十八大河竭八十八大海摧八十八大山修八十八對治若佛但說斷三結者則受化者生大歡喜言二十者五各四謂色大我小我在色中我大色小色在我中即色是我離色有我四亦爾故此二十名為身見八十八使具如前釋釋籤云由二不超欲謂貪嗔由三復還下謂身見戒取疑六度攝三十七輔行明六度攝道品者擅攝二覺謂除捨也尸攝三謂正語業命忍攝四謂念根念力念覺正念進攝八謂四勤進根進力進覺分正精進禪攝八謂四如意定根定力定覺正定慧攝十謂四念處慧根慧力擇覺喜覺正見正思合三十五餘有二信通三十五一切諸法信為本故當分道品相攝道品止觀云當分者未必具品方能得道三四二五單七隻八當分是道故云當依念處得道又云是道場又云是摩訶衍念處既爾餘品亦然是為當分道品相攝者如念處一法皆攝諸品引釋論文云念處既攝餘品餘品亦攝念處是為相攝道品道品通正助漏無漏等止觀云問道品是二乘法云何是菩薩道耶答大論呵此問誰作是語三藏摩訶衍皆不作是說那得獨云是小乘法淨名云道品善知識由是成正覺道品是道場亦是摩訶衍涅槃云能修八正道者即見佛性名得醍醐大集云三十七品是菩薩寶炬陀羅尼如此等經皆明道品何時獨是小乘又有漏道品欲界二十二未到三十六初禪三十七皆有漏道品如乳三藏道品如酪通教道品如生酥別教如熟酥圓教如醍醐或言三十七品是助道或言是正道大論云是菩薩道此文似正也淨名云道品善知識由是成正覺此文似助也又若言三十七品是有漏者云何言七覺是修道法華云無漏根力覺道之財云何八正在七覺前此應三句分別一三十七品皆有漏二皆是無漏三亦有漏亦無漏如大論云修八正道得初善有漏五善有漏五即是暖法暖法之前尚得修於八正道云何修邪初從師受法繫心憶念名念處為求此法勤而行之名正勤一心中修名如意足五善根生名根根增長名力分別道用名七覺安隱道中行名八正道能如是修得善有漏五當知道品皆是有漏皆是無漏者即是見諦思惟所行道品一向是無漏法華之文意在此也從來雖言有漏中得修八正七覺等未有文證而毗婆沙云若八正在七覺後亦得是有漏亦得是無漏何以故依八正入見諦即是亦無漏若八正在七覺前一向是無漏此則可解引婆沙文證成二意又亦漏無漏即是對位意也通大地數九心數等俱舍云通數者謂想欲觸慧念思脫憶定受此十隨王能作一切善惡之事故得名為通大地數觀慧數即煩惱道觀餘數是業道言九心數者以大地中受在觀受是苦攝故九心數中想即想攝餘八數行攝惡數有十恚恨讒誑憍忿怒慳癡妬善數十信進念定慧喜猗捨覺戒四如意足法界次第云通言如意者四念處中實智慧四正勤中正精進精進智慧增多定力小弱得四種定攝心故智定力等所願皆得故名如意足智定力等能斷結使故云斷行成就也定力若成能於諸禪互無妨礙輔行云雖用欲界語法而不礙初禪支林或住初禪覺觀之法而不礙於二禪內淨或住二禪與喜相應而不礙於三禪樂受或與四禪捨受相應而能教化一切衆生縱妨四禪不妨諸定妨謂妨礙礙謂止縱有因緣不入四禪不妨一切禪定自在總而言之祗是諸定互不相妨藏別不即通圓談即玄籤云藏教滅色入空則真不即俗俗不即真故云不即通教即色是空則即真而俗即俗而真故云即別教離二邊以顯中故不即圓教即二邊以顯中故即四諦分對真俗釋籤云佛說二諦者謂世諦第一義諦或云世諦謂苦集第一義諦謂道滅前合四為二正用此意復有說世諦謂苦集滅第一義謂道諦評者曰四諦亦是世諦亦是第一義諦如苦集是世諦苦空無常集因緣生是第一義諦滅是世諦者如佛說言如城園林是第一義諦者盡止妙離道是世諦者佛說道諦如筏如山如梯如樓是第一義諦者道如跡乘若四諦盡是第一義諦世諦說界入第一義諦亦說界入彼小乘中尚開四諦為世諦第一義諦況復大乘儀注僃簡山家後學大惠集
